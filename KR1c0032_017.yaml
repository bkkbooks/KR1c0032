body:
  text: 詩纘緒卷十七元劉玉汝撰周頌於穆清廟肅雝顯相濟濟多士秉文之徳對越在天駿奔走在廟不顯不承無射於人斯頌詩多用於字以致詠歎形容不盡之意此首言於穆猶商頌首言猗與也詩形容多在一字一辭之間故語簡要而意精深周頌之體也秉文之徳傳以此文字爲指文王愚謂此只多士之文徳耳句法與共武之服同蓋頌稱文王未嘗獨稱文者雖於武王亦未嘗單以武稱之况清廟詩祀文王而畢稱爲文非所以尊之也夫人臣之文徳即文王之文徳矣何必指言文王而後爲文王之徳邪首歎廟次述在廟奉祭之人此篇皆以人心詠文王之徳雖廟之穆清亦以此不顯申詠廟穆清相肅雝士秉徳不承申詠對越奔走與大雅文王篇重詠不顯不時同致詠嘆也無斁於人斯不止在廟之人而廣及民人矣此反覆歎詠言不盡意於文王未嘗明言而自有不可名之妙非聖不能作也𫝊以文王之徳言者釋經之辭其實通篇不言文王而皆文王之徳斯字無義竊疑爲畢曲聲也音近蘇音首以於起調以人字畢曲音不叶故用斯字以致詠歎亦三人從歎之聲歟此詩祀文王而天子視學養老則升歌清廟下管象舞大武饗諸侯亦用之盖詩有為一事而作而用之不一事者如天作祀太王用之祭先王先公執競祀武王用之成康思文豐年載芟良耜等篇用之爲豳頌而蜡振鷺用之大饗而徹閔予小子四篇用之嗣王朝廟桓用之講武類禡此皆可得而考者亦有傳記可考而尚有可疑者如維清之爲文爲武思文三詩之爲三夏是也若他篇未必無他用者但經傳無文豈可强附哉登歌樂章也上歌謂堂上歌也維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王曽孫篤之天命即天道流行付與萬物者此理無窮盡無止息以文王與天對言見聖德與天無間也語天曰不已語聖德惟用一純字贊美已極精至而又將言不已先以於穆歎詠之將言純先以於乎不顯歎詠之於是贊美形容有不盡之妙矣假以者相親而深有望之辭其收者或得而不敢慢之辭有愛敬之心焉駿惠責已而欲大順則無一事之不遵曽孫戒後而欲其篤則無一時之或息有慰悦之意焉皆孝子孝孫所當盡之誠也故傳以二當字言之維清緝熈文王之典肇禋迄用有成維周之禎清緝熈皆勉力用力之辭故傳以所當二字指主祭之人而言典謂文王之典章法度祀典在其中不可專指為祀典肇禋說者謂文王始祀竊謂肇禋即生民之肇祀謂上自初封始祀而來以至于今武王成王時以用文王之典有成也后稷可言肇祀文王豈始祀者乎清緝熈猶言儀式刑極言當遵也禎亦指典而言於有成之下言雖既成而今之清緝熈其典皆吉之先見而未有已也言此以深明其當遵所以遵祖法述已責以慰神靈而勉後人也按文王世子升歌清廟下管象注云象武王伐紂之事疏云下管奏此象武之曲大武即象也又云詩維清奏象舞武王作樂稱象也既謂大武即象又以維清為象二說已自不同朱子於管象亦從鄭說以象爲武舞故於維清見其言文王之典又無象字故謂未見舞象舞之意然序言維清舞象舞必有所傳授左傳見舞象箾者杜預謂是文王之舞象既爲文王舞則武舞自當用武詩維清自當爲文王象舞之詩矣先儒因是遂謂象有二有文王之象文舞也有武王之象武舞也象名一而實二也杜又云象箾是象文王之武盖杜見維清奏象舞而言文王禮記下管象而舞大武故合二說音箾爲朔以爲象文王之武然文王之舞不象文王之文而象其武乎非所以象文王之德也左傳箾韶象箾同此箾字而一音簫一音朔豈非杜欲合詩禮二家之說而兩從之歟今若以此爲文王之文舞二箾字皆音簫不惟不必改字音又象舞而非武實一大證據也烈文辟公錫兹祉福惠我無疆子孫保之無封靡于爾邦維王其崇之念兹戎功繼序其皇之無競維人四方其訓之不顯維德百辟其刑之於乎前王不忘烈文頌德之詞言有光輝之文德也錫兹三句歸功之詞言錫我福而及我子孫也無封四句戒飭之詞言汝有儉德則當尊汝而念此功也繼序言繼世次序念爾功而亦及爾子孫也歸功而致戒天子待諸侯之體也無競六句勸勉之詞人謂人道解見抑詩於乎歎美之詞歎嗟以致感發欲諸侯不忘文武亦使人不忘已而用此道也詩不叶韻句長短不齊者周頌之體其問有韻叶句齊者與商頌相類其監二代與說者謂商質周文今以頌觀之周頌之詞視商頌爲簡質韻叶句齊者亦視商頌為簡質是則周豈嘗過於文哉周樂之情文得其中皆於頌可見季札親聞其聲而極贊頌之美其有得於此與宗廟始祼獻次朝踐次饋獻次再獻然後諸侯行助祭之禮焉天作高山大王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之太王之德莫盛於遷岐故祭太王惟以岐山言上作字屬天下作字屬天與太王彼指岐山謂天作岐山而太王始治之彼岐山既以天與太王而作矣至文王又由此而康之必言文王者推文王之盛以尊太王見太王之功至此而益大也子孫保之戒後來以慰太王而欲其來厚也與前曽孫篤之意同時祭太王故上本天眷下逮文王後及子孫皆爲太王言之太王遷岐為興王之地子孫尤所當守其後平王棄岐而東遷周不復西豈非其驗與序言祀文王又言祀先王先公盖此上言太王下言文王王季固在其中故亦可用以祭王季與其用之先公者又推太王之意而尊之與序爲此言必有所傳授故傳不以為非而姑從之與昊天有成命二后受之成王不敢康夙夜基命宥宻於緝熈單厥心肆其靖之推天命文武以及成王當天下已安之時不敢自安而益致其自强不息之功盖成王由學以成其徳其用功實在於此故頌成王首以是稱之下文基命承上天命而以積徳言緝熈承上二后而以廣業言既夙夜又宥宻既緝熈又單厥心此即不敢康之實也宥謂用功於外寛廣以酬酢而不淺露也故曰宏深宻謂用功於内静定以存養而不粗疏也故曰静宻心則兼内外動静而言盡則内外交養動静兼致而無間雜遺缺也非積德無以為廣業之本非廣業無以見積德之成故傳曰是能然皆以心爲主故特以於而歎美之也愚嘗謂成王天資純粹學力精勤自湯武而下爲君而能學以有成者成王一人而已其用功成德之實備見於頌諸詩最人君守成好學者所當取法也肆其靖之言致治之效也肆字兼二義故也今也此合言之故曰故今盖兼成王康王時而言我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右享之我其夙夜畏天之威于時保之按此篇永樂大典缺卷時邁其邦昊天其子之實右序有周薄言震之莫不震疊懐柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之時謂廵守之歲四仲月也祭告者祭神告至也其者不敢必而應以一實二允則實可信矣右謂尊爲天子序謂次代有商與下序義不同先人後神者先致力於人而後致力於神也明昭有周與右序有周雖若相對而亦不同明昭謂光明昭顯承上言周家之氣象光輝也式法式謂典也式序謂明黜陟之典以次序在位諸侯之賢否也戢櫜偃武也求肆修文也懿德兼人已言謂修已德用德人也廵守在天下大定之後故此篇所言皆已然之事而以二允言然前明言人神皆歸固可信後則寓勸戒兼意盖欲諸侯信已實能而專尚德也周禮九夏之三鄭註引韋昭云肆夏一名繁昭夏一名遏又引吕云一名繁遏樂名分合已不同又肆夏既一名繁何爲而重舉其名邪然猶只見其爲昭夏未嘗言其爲某詩也叔玉以時邁詩中有肆夏字思文詩中亦有夏字又祀后稷配天有渠大義執競雖無夏字而在二詩中間又穰簡有繁意故以三詩為肆夏繁遏渠之詩又文王大明緜既有見在詩篇則肆夏繁遏渠亦必有見在詩篇也然若以字求之則雅有南陔思齊亦可以爲陔夏齊夏乎以義求之則尸牲出入何取乎時邁執競之義四方賓來何取乎思文之義乎以是而求何可附㑹哉又若以文王大明爲例則笙詩無詞何嘗不與魚麗諸詩並列邪傳以執競爲昭王以後所作則周公制作時未有執競詩安得以爲韶夏乎然則叔玉之說非朱子所取矣然猶録於此者姑存之以見一説歟或曰九夏之樂謂之金奏蓋與笙詩言奏同禮記投壺所記爲投節周禮九夏所記爲鐘節實非有詩與又或曰九夏即二十所舞皮弁素積裼所舞之大夏夏禹之樂也九夏即九歌之節也其詩亡又或曰樂歌之大者稱爲夏故季札稱秦風爲夏聲以是數者而論則三詩之爲三夏篇章皆未有據朱子雖存之以備一說然以愚意論之吕說削之可也執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明鐘鼔喤喤磬筦將將降福穰穰降福簡簡威儀反反既醉既飽福祿来反此於成康不稱王而止稱其諡又連稱三諡下文又言自彼似非所以尊成王康王也蓋上係武王故下連稱二諡殺所尊也自彼謂自彼時成康已極著明見其相繼致治四十餘年之久也不顯咏其德之在已者明著咏其德之著於四方者包制作之禮樂在其中故下承言鐘鼓磬筦舉大小以見全樂威儀所以行禮舉威儀以見備禮既以樂降福又降福以禮反覆以禮樂言雖本咏祭祀之禮樂而亦以見自彼時至今禮樂福禄之盛如此固爲成康不顯之德是亦武王無競之功也周頌無言樂與禮者此獨言之又與成王制作之意有相關者宜與商頌言祭祀禮樂者不同也醉飽謂神與尸禮曰祝侑尸曰皇尸未實也未實者未飽也楚茨曰神具醉止皇尸載起是神與尸亦有醉飽也此祭時樂不當以祭後燕時之醉飲而言之也此祭武王成王康王不知合祭乎各祭於其廟乎若祭武王則下及成康所以推尊武王言其功施後王者如此若祭成王則推武王而本之也鐘鼓而下則統言祭祀可通用也通典以執競爲祭武王詩今謂昭王以後詩則成王祭武王非執競也頌中雖有祭武王詩然乃獻助祭者求成王正祭武王詩則無有豈有司佚其𫝊邪抑先儒之𫝊詩者失之邪思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏首不稱天止稱后稷配天之德至下方言帝命者尊天而不敢直情徑言也極稱后稷立我極至之德貽我徧養之功而言其爲帝之所命豈非尊后稷以尊天歟天以形體言故曰彼天帝以主宰言故曰命天體徧覆故后稷徧育而無彼此之限所以體天廣大使五常之陳皆本於此則后稷之德亦未嘗不與天一其推尊配天之實德如此雖不明贊天之尊而尊天之意亦已至矣明堂圜丘其祭同類故其樂章亦頗相類我將饗帝而言天思文祀天而言帝天與帝一之意又有以互明焉而或者謂𫝊於思文不言祀天之樂歌疑只爲豳頌耳然明堂圜丘皆爲大祭明堂有樂歌而圜丘無之可乎愚特取𫝊不非序郊祀之意見此篇之爲郊祀之樂歌也序以此爲郊祀傳無說又以爲豳頌而蜡蓋移用此詩也嗟嗟臣工敬爾在公王釐爾成来咨来茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鎛奄觀銍艾對百官以戒農官言百官王既與汝以成法而猶有可效者則當來咨詢之有難依者則當來茹度之不可専也保介以下則専戒農官舉副則戒正可知言暮春之時不可違新畬之田至難治何求如何發問以警動之辭食之大者莫如麥而兆豐年之祥者亦惟在於麥故以於皇歎美之將受於前迄用於後而以二明字言之所以見天賜之甚明而可必使之競勸也康年銍艾皆以新畬言之見新闢難治者既豐他可知矣命我衆人者官之責也既具而奄觀言收成之易而速見命衆治田之宜早而疾則即見收成矣此戒農官而先勅百官亦欲百官知農事之爲重農官知已事視百官之事爲特重亦戒農官之微意百官有成法而不可以自専農官於農事則不可少緩不必禀命而後行暮春時至則先求新畬以治其事康年兆見則速命衆人以成其功皆以農事之重與國家所以重農之意所以深敕戒之也噫嘻成王既昭假爾率時農夫播厥百榖駿發爾私終三十里亦服爾耕十千維耦按此篇永樂大典缺卷振鷺于飛于彼西雝我客戾止亦有斯容在彼無惡在此無斁庻幾夙夜以永終譽烈文載見諸侯助祭詩振鷺二王之後助祭詩有客微子來朝見祖詩烈文明見助祭振鷺𫝊言助祭而曰來見祖廟亦助祭可知此篇雖爲二王後作然詩意在宋爲多蓋周代商宋正爲客又爵上公尊於杞杞雖亦爲賓而其序則當爲次又越一代之逺故此詩辭意兼杞而尤切於宋未段前說兼杞宋陳說於宋爲切陳爲三恪何杞得爲賓助祭亦有詩而陳不與邪今止據此詩稱二王之後則陳不得列于二客助祭之次止在諸侯助祭之中歟按禮記大享徹以振羽注謂即振鷺則此詩又移用之爲大享之徹歟豐年多黍多稌亦有高廪萬億及秭爲酒爲醴烝畀祖妣以洽百禮降福孔皆彼多此少亦有先民後已先農後公田之意焉惟以黍稌言惟以宗廟言舉重也皆徧也記所謂祭必有惠惠必均境内之民無凍餒之類即福之徧也言祭而受福者由收多之故以見田祖先農方社之功而於此報賽之也觀可將字可見有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼔鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聽我客戾止永觀厥成瞽樂官也樂得其官則和故詩首言之然成一代之樂而不頌祖之德者此告樂成而已故止以樂言再言有瞽者稱美之也言周者見其非商之舊也蓋樂始成故言周以别於商焉庭者宗廟之庭也合乎祖者合樂器而奏之於祖廟之庭禮記所謂大合樂者是也非合諸侯之樂器也夏簨虡殷崇牙周璧翣而垂五采羽樹之於簨角夏足鼔殷楹鼓周懸鼓而懸之於簨虡此詩舉樹羽縣鼓以見樂設之異於前代所以爲周樂也三句相連䝉上設字記曰賜諸侯樂則鼗將之孔氏曰鼗以導樂作馬氏曰兆奏鼔者鼗也應聲者鞞也磬石磬愚謂業虡已見鐘磬此當爲特磬玉磬所謂玉振之者也鼗以導之磬以收之柷以合之敔以止之而簫管在其中故言之於後鞉磬柷敔質簫管文鐘鼓大簫管小先質後文先大後小曰奏曰舉而兩言其備以見樂節之全樂既備而聲不和何以爲樂故喤喤以下言樂聲之和肅雝我客以下言其人神之和也先祖以下則言聽樂者祖聽客觀所謂神人以和也樂至此極盛而盡美矣永謂可行之久逺舉我客之永觀則當時後世之觀者可知矣成而可觀觀而可永則樂之始作也豈可以淺易觀之哉此篇詠樂鋪敘有法而末語尤深逺也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福鎬京之水非一而獨言漆沮者蓋漆沮由豳岐而至豐鎬乃周家興王之地言漆沮亦不忘本之意也首以猗與歎美之則薦廟之際豈獨爲魚而興感哉潛當以潛藏之說爲長蓋鱣鮪魚大非積柴簿圍所能取月令天子親漁蓋先王饗親牲必親牽獵必親殺殺必親射所以致其敬也故四時薦新常事也魚則牲類也非常薦之物故漁必親徃薦獨有樂所以重之也詩言享祀非獨爲薦可知有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀假哉皇考綏予孝子宣哲維人文武維后燕及皇天克昌厥后綏我眉夀介以繁祉既右烈考亦右文母有起辭也下有所指如有瞽有客本句即見有駜次句見此至第三句方見文法也其稱天子豈以先祖既享祭俎將徹爲徹者之言歟又豈武王始有天下故爲諸侯助祭者而言歟竊謂上言辟公則下言天子措辭當然又前段未祭以前則稱天子後段既祭乃稱孝子與又此詩先述諸侯次說天子先說助祭次言已祭然後稱頌祖德既以錫福終之而又言奉祭大抵此詩皆倒說又是一體豈以徹自下始而義亦有取於此歟此篇見爲武王祭文王者以言天子言皇考文母也見其爲徹者以周禮論語證之而甚明矣詳詩之意所言爲助祭受釐以後事其爲徹時所歌亦可見然祭將畢矣俎將徹矣而君臣猶同其敬既受福矣而猶有親愛不已奉承無窮之意焉當此之時安有既灌以往不足觀之患哉載見辟王曰求厥章龍旂陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉夀永言保之思皇多祜烈文辟公綏以多福俾緝熈于純嘏曰求厥章來朝之事也龍旂以下來朝之儀也休有烈光總上三言而形容稱美之也率見必因其來朝而率以見也振鷺之戾止有客之來見皆助祭皆有樂歌則此諸侯可知以孝以享奉祭者之心也以介而下言辟王所受之福烈文而下言諸侯助祭使我得之之福也所謂歸德之辭也福多而不純未足爲至故既綏我以多尤必復俾我以純則無雜而不已矣緝熈謂續明孝享之心也此篇與烈文同而此稱昭考故知爲祭武王烈文在祭文王詩後疑當爲祭文王然朱子釋大學以前王爲文武而於烈文不指言爲何王也按頌有祭文王之詩四皆宗廟所用也宗廟祭禮有時祫大祫其祫也有祼獻朝踐饋獻再獻等節載之通典皆有樂始有升歌則清廟是也終有徹則雝是也若維天之命維清二詩其用之於何節則於經傳未有考也助祭之詩四說具于前有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言授之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷白馬乗殷之舊故曰亦萋且美客之敬慎敦琢美其從者之賢美其君并及其臣敬愛之也采菽美諸侯亦然宿宿信信言客有信宿之留不及而將去也言授之縶將去而不欲其去也左右綏之已去而復還之也末二句頌美之也此篇序言來見祖廟而不言其助祭以詩中無祭辭也然賓來祖廟無不祭而徒見之禮其祭也亦未有不從主祭而自祭祀之禮故詩雖無祭意而說是詩者何可不以祭言邪竊意此詩必祭畢而將去故獻之而歌此詩焉然其敬愛之無已如此則無惡斁之意亦藹然於其中矣於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功於皇嘆武王武功之大一戎衣而有天下不惟當時莫能敵從古以來莫强焉故無競雖二字而形容極至文王之德止用一文字尤極簡要文王以文德開之武王繼嗣而以武功受之此武字與允文之文字相對謂武功也首既稱武王則此只當以爲武功對文德而言之不可指此武字爲武王之諡字也勝殷者功也遏劉者德也定即天下大定克定厥家之定言天下治安也以勝殷之功遏劉之德致天下之定爾無競也無競維烈統言之下文即無競之實也按文王世子下管象舞大武注云象周武王伐紂之樂疏云大武即象也明堂位下管象注云謂周頌武也疏云下管象謂吹大武詩說象不同一以象爲維清詩一以象爲武詩又豈象一名而有文武二詩如萬舞總文武二舞之名邪朱子于維清言詩中未見象舞意今武詩中亦未見象舞意小序注䟽要皆必有所𫝊矣閔予小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維予小子夙夜敬止於乎皇王繼序思不忘前三句見除喪於乎以下見朝廟言皇考能盡孝以念皇祖已則惟當盡敬以繼祖考繼祖考必本於孝而行孝尤在於主敬主敬行孝斯能盡繼祖考之道矣觀孝敬二字即見成王資禀純粹學問勤敏年雖㓜沖而學已成人雖百世之思繼其祖考者其道無以易此且其思慕嗟嘆尤可使人感發此後嗣嗣王之朝廟者所以必用之也庭止敬止雖韻相連然庭止意屬上皇考敬止意屬下皇王詩有此體訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶判渙維予小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身道逺非已所能及將欲就之又不能以有合蓋欿然慊然不敢自足以期人之盡忠樂告已也况已未足以當國家之多難則當如之何亦維繼武王之治國齊家者以保明吾之身而已蓋身者家國之本也武王身修而後家齊國治者也吾惟即其在庭在家者而紹之則庶乎身可保明而武王之休在我矣又何有國家之難哉既謙已之所未能復示已之所欲爲不惟得訪臣之道尤能知勉已之方以是而思繼其祖安有不足以致治者哉前篇庭字兼家庭朝廷言此篇庭對家言則専指朝廷敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹維予小子不聰敬止日就月將學有緝熈于光明佛時仔肩示我顯德行頌皆美聖人之德惟敬之一篇見王者之學堯舜禹湯文武之德莫不以敬爲先今羣臣亦以進戒而成王乃能取是言而述之且詳述所以不可不敬者而歎已之未能焉又知在已之當學必取人以自輔則庶幾其能敬以明天道而保天命焉其論學也尤得日新不已之要雖前聖後聖之論學亦無以踰此非成王天資極其粹輔導得其人進修得其正其能若是乎其後進德益高而幾於聖人周家致治不愧于二代豈非王者善學之明效大驗歟予其懲而毖後患莫予荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難予又集于蓼愚謂此篇當云賦又比也蓋予其未堪二句爲賦荓蜂桃蟲集蓼爲比大序六義三爲經三爲緯考之頌有興體者惟振鷺有比體者惟此篇則振鷺當爲興此篇中當有比不然頌無比興之緯其義不備矣莫無也無我使蜂者猶言無我使此惡人皆我自取其害乎所謂見不賢而不能逺也若信其小善而不知其有大惡是以其小者信其大者奚可哉此爲病之最大者故家既多難而身又集于辛苦之地家與身俱病何可以不懲乎極言已所當懲而謹者而有望於羣臣之助焉然成王除喪朝廟之時管蔡之變既平矣而猶不忘戒懼以此謹始雖終身誦之可也此嗣王朝廟所以必用之也前篇欲繼文武于家庭朝廟之間次篇欲繼文武而訪之於臣敬之則欲即日用而修之于已小毖則欲因患難而謹之于心蓋雖一時所作而實可爲萬世嗣王之法所以備録之歟懲前毖後者詩之意懲大謹小者命篇之意也載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯彊侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百榖實函斯活驛驛其達有厭其傑厭厭其苗緜緜其麃載穫濟濟有實其積萬億及秭爲酒爲醴烝畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹首言芟柞耕耘之事繼言芟柞耕耘之人爲田之處視畛爲卑濕故亦名爲隰非原隰之隰也有略其耜再起述耕耘穫積之事見百榖生成之盛多爲酒以下備言百榖之用莫重於祭宗廟次則燕賓客養耆老大者既備則小者可知振古如兹兼匪且匪今而言𫝊於序謂二詩祈報之異蓋以二詩辭意相似未見孰爲祈報也今詳詩中所云皆有報意無祈意而𫝊又謂與豐年相似其用應亦不殊則其爲報賽詩可知畟畟良耜俶載南畝播厥百榖實函斯活或來瞻女載筐及筥其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人二詩所述有或詳或略之殊而大意相似考之周禮籥章蜡祭吹豳頌以息老物今二篇既見其爲報賽又前篇言胡考之寧此言婦子寧止皆有息老物之意意者終歲勤動至此而始收息故於勞之息之時而歌之歟意與周禮合又視豐年爲詳用亦應不殊然又安知報賽則歌豐年息老物則歌此二詩不殊之中亦自有不同者歟絲衣其紑載弁俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩㫖酒思柔不呉不敖胡考之休按此篇永樂大典缺卷於鑠王師遵養時晦時純熈矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師此篇頌武王之功孰頌之成王頌之也頌之而并述已繼武王之事亦所以頌武王也於武王維以時爲言者蓋聖人之取天下雖有其德而無其時不能以成大功武王之有天下適當其時盖時者天命人心之所寓也時未至不可先時既至不可後故時非聖人所能爲聖人惟能知而順之耳武王時晦則退自循養時熈而未純則猶晦也時既大明而後用之此即張子所謂此事間不容髪者是也非聖人灼見天命人心之妙豈能與於此哉我龍以下成王自述已繼武王之事受者受其所已爲嗣者繼其所未畢造爲也公事也武王維順時故所爲無不成而事無不可法今我受此武王順時之所已爲者則用此而有以嗣之亦惟以武王順時之事而信法之耳盖此篇上言時包所爲所事在其中下承上意曰造曰公亦包時在其中其意以為武王之用武創業者前王時純熈之事也我之制禮作樂者今時純熈之事也我雖以制作爲繼述然莫非時純熈之所宜爲者故我受而嗣之者亦惟以此爲師耳一篇大意皆在時字蓋成王損益大舞爲勺樂上頌武王之功而下述已事者皆武王之事也故名樂爲勺而詩亦名爲酌皆取酌時之義謂酌時以繼武功也序詩者不察以爲酌先祖之道以養天下宜𫝊之不取也先儒謂周公作武又作勺勺者斟酌大武之樂而參用之豈以賚桓在其端故爲此說也綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以間之綏萬邦統言之桓桓武王而下詳言之保有見積累之業士謂熊羆之士克定能定之謂非天下大定不足以言能定前言邦此言家至是以天下爲家矣爲天下皇王必如商之致治歴年而後可謂之皇而後可爲之代綏萬邦屢豐年從下說向上言武王得天下也天命匪解而下從上說向下言天命武王也互言而極道之謂武王除害故天屢以豐年報之然天命未厭故武王功足興周而德足代商也屢豐者武王數致其祥於一初方興之應也匪解皇問者天欲大其業於萬世無疆之休也武王既得天矣而天命武王又必使其徳足代商爲皇王非屢豐而已此所以爲匪解此所以爲頌武王之功𫝊謂春秋傳以此爲大武之六章今之篇次已失其舊𫝊從春秋傳今亦從集𫝊移置於賚後閔予小子前然已逸其第二第四第五凡三篇杜預以左𫝊所言武賚桓之次爲楚樂歌以其與詩不合故爲此說歟集𫝊不取也文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思此頌文武之功而詩中不言武王蓋上推文王下言我則武王固在其中矣故凡文王之所勤與我之所受所敷所求所定者莫非武王已成之功且於中言凡此皆周之命而非商之舊則非武王而誰哉蓋前詩明舉武王此詩暗藏武王并暗藏其封功事又頌之一體所以知爲封功者以樂篇名而知之又此詩爲大武之章象武王之樂觀武聽歌而頌武之意自有不言而可知者又樂之一意也敷文王之可思與諸侯之當思文王者固武王之功亦武王之心也若君臣始終皆能以文王之心爲心是亦以武王之心爲心也其頌文武用意深矣於皇時周陟其高山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命時邁爲武王廵狩祭告之樂歌此雖言廵狩然不知爲廵狩所歌乎抑述其事以頌乎未詳其所用也時周之命與賚同内則曰十三舞勺董子曰樂莫盛於韶勺𫝊謂酌即勺則是以酌爲勺矣於賚桓則取春秋傳以爲武之樂章惟般未有以處之則止當從元次居詩之末也
