body:
  text: 詩纘緒卷十四元劉王汝撰大雅二皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅作之屏之其菑其翳修之平之其灌其栵啓之辟之其檉其椐攘之剔之其檿其柘帝遷明徳串夷載路天立厥配受命既固帝省其山柞棫斯拔松柏斯兌帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受禄無喪奄有四方維此王季帝度其心貊其徳音其徳克明克明克類克長克君王此大邦克順克比比于文王其徳靡悔既受帝祉施于孫子帝謂文王無然畔援無然歆羡誕先登于岸密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤于周祜以對于天下依其在京侵自阮疆陟我高岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王帝謂文王予懐明徳不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉臨衝閑閑崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂皇矣至式廓即大明明明赫赫之意而此則詳盡曲折尤見天人之心焉葢大明言天監徳此言天觀民民之定即徳之騐言徳則所本者切言民則所關者廣葢各一意也二國四國承求民而言天於夏商非無意焉而二國無定民之政故不得不舍之言天不輕廢也於四海則廣求而詳擇之苟得其人而耆致之則増大其規模而後眷之言天不輕予也天之心惟欲求民之定而大王有焉於是乃眷而顧之篇首泛論起辭就入太王然一篇大意皆不出此此章祇言大王居岐下章乃言遷岐大王之徳莫大於遷岐故凡詠大王惟以遷岐為言大王之遷岐也天以其有明徳而遷之也凡不得已而遷者莫難於固而大王内外之治如此是遷之者所以固之也上文八句只言芟除草木而始遷漸盛漸廣之意具見此善詠也而大王既受而能固者自有其實矣必及立配者國之本在家又遷岐姜女實來又詩人欲為後大伯王季張本大明思齊皆然𫝊言成王業者通後章言也前章言帝遷者固之也此則天欲興之矣故曰帝作邦作對因心則友謂王季之友其兄根于至性𤼵於至誠自然而無勉强大伯之讓王季之受讓皆隠㣲而無迹於此特以為王季之徳非周公孰能知之王季之徳莫盛於此故首言之下文修徳篤慶後章六徳書言其勤王家皆由此而推之也大伯未讓之時王季之本心惟知友愛而已王季受讓之後惟知周家之慶當厚之而已所謂篤慶非他有篤之之道惟因孝友之徳而益修之即所以篤其慶矣所謂錫之光者亦非别有以為之光也能篤其慶即所以彰其兄之讓矣篤慶錫光皆不在因心之外也四章専詠王季之徳謂王季心能制義而事得其宜徳能致譽而人無間言故治國而有此六者之徳皆因心之所推修徳之所致也王此大邦追稱之也維此王季一語兩章重見前由大王轉入王季此反由王季轉入文王皆於章半承上起下與文王藎臣大明武王同一機軸也此下二章承上章文徳靡悔之意止以文王二事言之詠徳之法也章首以二帝謂對舉起辭真若上帝親與文王言真若文王周旋唯諾面受帝語者以見天與文王為一文王與帝無間與前帝遷帝省帝度之意迥異葢前述賢君事功此詠聖人徳業也密人不恭為可怒文王因其可怒而怒之文王之怒得性情之正故首言文王無人欲獨能於天理先知先覺也王師所至皆以我言見仁者無敵罔有敵於我師而我即天也伐密言在京密小遣師取之而已伐崇言同爾兄弟崇大蓋親往也其親往也雖以兵行而實以徳服故始欲致其來附不至則退修徳而復伐之肆之待其自降然後絶滅其國皆天理之當然順而行之不見有為之迹者也文王以徳行師最難形容詩人首言其外則不大聲色中則不識不知末述聖人致之附之乃其本心伐之絶之非有私意緩徐迅速各盡當然皆得冺然無迹之意至言四方無侮無拂尤得天下自然心服之意其形容徳不形功無迹之妙有不容言者非聖知聖孰能作此哉按周公追王三王而此篇專敘三王之徳豈作此詩以述其所以追王之本意歟故于三王皆本之于天于帝而于王季則曰王此大邦其追述可見于王季言之者舉中以見前後也又此詩終篇皆本首章帝臨求定增其式廓之意于天于帝于賢于聖循實致詠各盡形容又皆于中章轉入又暗説大王顯稱王季文王又奄四方施孫子既結復起又各章中或二句連或三句連或一句韻或三句韻或連用韻參差不齊皆變文法自然之體也惟大雅為然首章言天亡殷興周中言施于孫子孫子成王與焉疑亦周公戒成王之詩歟經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍虡業維樅賁鼓維鏞於論鼓鐘於樂辟廱於論鼓鐘於樂辟廱鼉鼓逢逢矇瞍奏公文王始作靈臺辟廱而有臺池鳥獸鐘鼓之樂周人樂文王之有此樂也故詩人述民樂之意以見文王得民之樂之者如此然詩中所言者皆文王之樂未見民之樂所以知者以庶民子來一語知之也東萊之說本於孟子孟子之言亦本於此語政詩之本㫖也又詩首章既𤼵此意則後章皆含此意詩有比體與棫樸同首章重在庶民子來一語一篇意皆本此王在囿中而物各適其性安其所有天地物各付物之意則文王之樂何如以築臺而民猶樂之如此則於此而樂文王之有其樂可知先言鼓鐘後言辟廱者言文王奏樂行禮於辟廱也於樂非謂文王樂此亦非謂民樂蓋言樂作而倫理之聲𤼵於鐘鼓和樂之氣充乎辟廱也前言物自適于囿沼此言人同樂於禮樂皆文王之樂也以文王之樂在彼民猶樂之况其樂之在此民其有不樂者乎葢知池臺之樂者常人也知禮樂之樂者文王之民也故觀後三章之言祗見文王之樂推首章之意則民之樂固在文王所樂之中矣此詩人所以為善述也故觀此詩者有三意一見文王之樂二見民樂文王之樂三見詩人之善述民樂兼此三意而涵泳之則得之矣奏曰方奏葢言樂方奏而人已和樂不待樂之終所以甚言樂能感人心之和樂如此也凡詠樂先說陳器而後說奏樂如有瞽之先設後舉那之先置後奏皆然葢序事之法自然如此不可以見聞分也謂虡業為見則於論非聞乎謂逢逢為聞則奏公豈必非見必分見聞則泥矣下武維周世有哲王三后在天王配于京王配于京世徳作求永言配命成王之孚成王之孚下土之式永言孝思孝思維則媚兹一人應侯順徳永言孝思昭哉嗣服昭兹來許繩其祖武於萬斯年受天之祜受天之祜四方來賀於萬斯年不遐有佐詩美武王纘三王之緒故首稱文武次說三王下復歸武王見詩為武王作也王配于亰繼其位也世徳作求繼其徳也求徳為配亰之本原配命為求徳之極至而成孚則求徳配命之明效也求徳貴於興起不興起則不能有為配命貴於永言不永言則不能終合暫合暫得皆為不永者言之武王纘三后之緒約言之則維孝而已前二章其言畧盡故此二章惟以孝思一語重言對舉而深美之中庸稱武王繼志述事惟以逹孝言之政此詩意傳說亦祖于此下土之式謂為法維民之則謂可為法上句實下句虛二意不同媚應承維則之意而言順徳謂孝程子曰孝弟順徳也維民之則覆說成王之孚昭哉嗣服覆說世徳作求反覆詠歎之也昭哉昭兹皆歎聲後二章言孝道之極致前言孚謂當時此二章謂來世傳言武王之道道謂孝道言武王之孝可傳於來世來世而能繼祖武以行此孝道于萬年則此萬年可以受福也於字承上斯字起下於字傳無音只當如字也來世受天之祜而四方皆來朝賀于萬年則此萬年豈不有助於國家乎四方來賀即孝經所謂明王以孝治天下得萬國之懽心者言孝道不特可傳子孫于無窮亦可感人心于無窮也此孝道之極效為子孫者不可以不知其亦寓戒後人與次章而下每承上章末語而疊用之惟媚兹不然然中間對舉上章永言孝思一語血脈上斷而中連又媚兹接意永言疊文變文成體自然之妙也皇矣述大王王季文王靈臺詠文王下武詠武王後篇又兼詠文武血脈通貫葢謂此若間以康王以後之詩則不相通貫矣然傳曰文意曰文體曰血脈亦何嘗不以文論哉文王有聲遹駿有聲遹求厥寧遹觀厥成文王烝哉文王受命有此武功既伐于崇作邑于豐文王烝哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后烝哉王公伊濯維豐之垣四方攸同王后維翰王后烝哉豐水東注維禹之績四方攸同皇王維辟皇王烝哉鎬京辟廱自西自東自南自北無思不服皇王烝哉考卜維王宅是鎬京維龜正之武王成之武王烝哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉有聲二字形容文王未可泛觀有聲即令聞聞只聞於人聲則有振𤼵感動逺揚深入之意堯之光舜之華文王之聲皆聖徳之事虞芮之質成江漢之純被皆聲自然之致也孟子仁言不如仁聲之入人深也正是此意詩人猶以此意之不足猶恐已意之不白故復申言重詠以為甚大乎其有聲也然則此所謂聲豈可以尋常之聲例觀哉曰寧曰成即有聲之實也愚謂求觀當屬詩人成功見後章次章述得豐之由言文王受天命而有此伐崇之功也三章述作豐之志乃文王欲追先王之志而致其奉先之孝也匪棘即靈臺勿亟之意文王之本意也出有武功入有孝道致孝仁也致武義也文王之全徳也伐崇之功甚大而作豐之制不大文王之小心也四章述文王都豐之事葢至此而寧成之功濯濯乎著明矣五章詠豐水而推禹績者本往聖之功而大豐水之地文王言維翰武王言維辟見文王未王武王始王也極言豐水之盛所以著遷鎬之由也四方同而地不能容所以遷也鎬京為四方之極辟廱為風化之原武王遷都立學而天下化鎬京莫大之美也考卜本其初而言定遷之事詒謀要其終而言傳後之計葢遷非特為四方攸同之故實欲為萬世無疆之休也詠鎬而猶及豐故興之説為長又言芑以小興大意尤深逺翼子者敬事之子也以是稱武王葢周公之詞也亦足為周公作之證文王追王故先言王后武王實王故言皇王追王故先言文王後言王后實王故先言皇王後言武王言各有當而先後相變相間亦作文之體也哉者歎辭八言申重以深歎之也其單句無韻葢合八章重韻為韻與麟之趾同皇矣言孫子下武言來世文王有聲言翼子疑亦周公戒成王之詩歟厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子誕寘之隘巷牛羊腓字之誕寘之平林㑹伐平林誕寘之寒冰鳥覆翼之烏乃去矣后稷􅈱矣實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食蓺之荏菽荏菽斾斾禾役穟穟麻麥幪幪𤓰瓞唪唪誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實𤼵實秀實堅實好實穎實栗即有邰家室誕降嘉種維秬維秠維穈維芑恒之秬秠是穫是畝恒之穈芑是任是負以歸肇祀誕我祀如何或舂或揄或簸或蹂釋之叟叟烝之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歲卬盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今按此篇永樂大典缺卷敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗爵奠斝醓醢以薦或燔或炙嘉殽脾臄或歌或咢敦弓既堅四鍭既鈞舎矢既均序賔以賢敦弓既句既挾四鍭四鍭如樹序賓以不侮曾孫維主酒醴維醹酌以大斗以祈黄耉黄耉台背以引以翼夀考惟祺以介景福此詩首章言兄弟末言黄耉故知為兄弟耆老既言曽孫又後篇言公尸故知為祭畢而燕勿莫禁止辭最詩人用意處葢兼人與已平日與今日而言兄弟本至戚既戒其逺又欲其邇邇則或筵或几而得以敘親戚之情於既燕而又述其戒焉所以為慇懃篤厚也燕飲之詩多先敘其情盖情既相洽而禮得以行故其言之序如此伐木蓼蕭裳裳者華皆然次章承上章筵几而言設席緝御見其情意之益勤獻酢見其禮樂之咸備六或字與上章二或字同舉一以見其餘又語不齊對文法也三章既均止言射中如樹則既中而又貫革燕射非主皮而此言之者見其射藝之精也中而貫革易以病人故尤以不侮為徳焉按祭畢而燕無射儀禮將射則先行燕禮非祭畢之燕也此祭畢而燕乃言及射其禮未考又耆老不以筋力為禮而貫革非耆老所能傳所以疑者其以此歟豈詩人於此追述其祭前射中之事歟又豈儀禮之燕為諸侯禮天子禮逸今不可得而知歟以引以翼祈耆老之皆夀也或引導於前或輔翼於左右無非夀者葢耆老非一人欲夀者之相與以夀則無一人不夀矣而其所以致夀之道皆在其中此祈禱之至也既祈其夀又願其福葢有夀而無福無益也既醉以酒既飽以徳君子萬年介爾景福既醉以酒爾殽既將君子萬年介爾昭明昭明有融髙朗令終令終有俶公尸嘉告其告維何籩豆静嘉朋友攸攝攝以威儀威儀孔時君子有孝子孝子不匱永錫爾類其類維何室家之壼君子萬年永錫祚𦙍其𦙍維何天被爾禄君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子行葦備言燕禮之盛而此專以酒言燕以飲為主故止言酒而筵几禮樂皆在其中徳言恩意即情意之相感者非徒事飲食所能致者故特以此言之燕有殽烝政燕禮所用者故與酒並言昭明兼内外徳業言身心家國天下皆在其中即明昭有周之意言其徳業昭著光明盛大也融猶今言融化融液皆盛極之所致故以為明之盛髙朗則復歸君之身心言其身處崇髙而心極昭徹高謂崇高富貴首出庶物以位言朗謂聰明睿智足以有臨以徳言令終即洪範考終命五福之一古人以此為福故臣以此祝其君後人則以此為諱矣父兄答君而述公尸語即楚茨末章述嘏辭而以為慶辭也祭祀莫重於禮儀言籩豆則禮備可知言朋友威儀則君敬可知言君子有孝子則君之禮儀誠敬可知室家之壼言家齊也深邃嚴肅非齊乎祚𦙍承上章君子有孝子而言既錫福禄又錫以子孫人君之福莫大於此故下二章惟此意而已接上章𦙍字言然下復言福者葢必君先有福而後有賢子孫故此將言𦙍而復言福以終上章祚字之意釐爾女士謂天與爾女子之有士行者為孝子之配又生賢子孫則君之福無窮矣故言此以終上章𦙍字之意鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福禄來成鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福禄來為鳧鷖在渚公尸來燕來處爾酒既湑爾殽伊脯公尸燕飲福禄來下鳧鷖在潨公尸來燕來宗既燕于宗福禄攸降公尸燕飲福禄來崇鳧鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱按此篇永樂大典缺卷假樂君子顯顯令徳宜民宜人受禄于天保右命之自天申之干禄百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑徳音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸塈假樂君子言美哉樂哉之君子也嘉言其徳之美樂言其心之樂也即下文所謂令徳也令徳顯而又顯故能宜民人宜民人故能受禄于天而天眷顧之不厭保佑命申皆出自天而言自天於中間文法也上章言令徳受禄故此言干禄豈弟之意又公尸言干禄含祭祀意言君以祭得福有若干然亦子貢答陳亢意也干禄而得百福故子孫既多而且賢千億多也自穆穆至羣匹賢也既有穆穆皇皇之徳又必率由乎舊章正孟子徒善不足以為政之意然太過則愆違不及則遺忘無過不及適合乎中斯得率由舊章之道矣既有穆穆皇皇之徳故此惟以抑抑秩秩徳之見乎外者言之舉外以見内也既有威儀聲譽又必率由羣賢即舜兢業無曠庶官之意然私怨因人而生私惡由已而出無私怨惡一出於公斯得率由羣匹之道矣不愆不忘特為遵祖而言無怨無惡特為任賢而發八句辭意正相對章斷而意連故傳以為皆稱願其子孫之辭受福無疆總遵祖任賢而言四方之綱則福及乎民矣末章語疊之綱意承羣匹言君能綱紀斯民而民頼以安故臣以其君能勤身安民為已愛上之道所謂以安社稷為悦者也臣欲其君如此則民安而君臣皆得常安矣三章之文意血脈接續通貫只是一段意思皆稱願其子孫之辭於是祝君得福之意至矣傳以不解屬君欲君不解屬臣吕氏以上四句為君臣交泰以不解為君臣處泰二說不同然傳以後二章稱願君之子孫則責難於君與子孫之為君者其意為切其說為備故傳先已說後吕說亦隠然於中可得而兼也既醉以臣答君故致其頌禱假樂之公尸尊也故於頌禱之中寓規戒之意不愆不忘無怨無惡不解于位皆規戒之辭且不特寓戒時王并寓戒其子孫用意尤篤厚而深逺與既醉不同而各得其體矣東萊燕字當從傳釋為安義亦可也篤公劉匪居匪康迺埸迺疆迺積迺倉迺裹餱糧于槖于囊思輯用光弓矢斯張干戈戚揚爰方啟行篤公劉于胥斯原既庶既繁既順迺宣而無永歎陟則在巘復降在原何以舟之維玉及瑶鞞琫容刀篤公劉逝彼百泉瞻彼溥原迺陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之篤公劉既溥既長既景迺岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒篤公劉于豳斯館渉渭為亂取厲取鍛止基迺理爰衆爰有夾其皇澗遡其過澗止旅乃宻芮鞫之即按此篇永樂大典缺卷泂酌彼行潦挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行潦挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉豈弟君子民之攸塈詩有以三句興一句者此以三句興二句以小喻大以彼明此以賤形貴則人易知而必信也子夏之言全釋此詩豈弟父母之意故居先大學止釋父母而無豈弟意故居後子夏言父母屬民大學言父母屬君然君能使民有父母之尊親則亦民之父母矣為民父母足該民有父母意即元后作民父母之意也此言有豈弟之徳者必民之父母欲君盡子民之道也詩人以此一言為簡要故始則托興三句以起其辭後仍前興而以攸歸攸塈明其效葢欲王深信此言而益勉之也後章反覆一再皆以明此一言所謂一言居要一篇警䇿者又大雅之體也民之父母與南山有臺同特此託興𤼵揚舉效贊詠意尤𤼵越而顯煥使人有所感悟葢此言豈弟彼言樂只彼美其已然之徳是賛美之辭此詩有戒勉意非頌禱也故不言樂只有卷者阿飄風自南豈弟君子來游來歌以矢其音伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有徳以引以翼豈弟君子四方為則顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人鳯凰鳴矣于彼高岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈君子之車既庶且多君子之馬既閑且馳矢詩不多維以遂歌此詩首述地形次述天氣然後述人事見詩本意其言來游歌以陳歌音不惟成王之情性氣象可想而作歌之意度亦可見矣首章乃此詩所由作故總敘發端而應在末章見詩之有起結如此矣次章承接首章游字而語有次第游休指成王此身而言身閒暇而下大土宇上受天命皆成王所已有者故只以伴奐優游昄章孔厚長康等字形容其盛彌終也又滿也故有夀意身雖閒暇而似先公之始終為難葢先公自后稷以來庶無罪悔文武聖人俱有夀考似之實難既有土宇而幽能主神則明而人物可知茀禄安康而有常則不止安康而已皆成王所難致者故又以俾爾而極言其盛所以發此者欲成王之心開濶廣大知人君福禄之盛如此歆歆然先有感動慕向之意然後下文之言易入而心樂從此召公所以善於開𨗳君心歟馮翼與孝徳互文指賢者引翼言用賢者此言得賢以輔徳則四方以為法則體貌尊嚴則有令望徳行純潔則有令聞此言得賢之助而已徳可成則四方以之為綱非止取則而已綱有維持固結之意賢人瑞世之鳯凰也當是之時鳯烏適至成王所親見藹藹多士又成王所素有以所親見之鳯凰喻所素有之吉士託興至為親切且其言鳯凰之集止於下而賢人上媚天子鳯凰上傅於天而賢人下媚庶人止下前後抑揚交互以見賢人無不可用其託興尤有微意葢士患不多多患不吉吉患不用用患不盡今士多矣吉矣惟所用而無不可用矣然則王其可不命之使之以盡其用乎維命維使則立賢無方矣四章託興婉切辭意藴藉飛動真足使人歆慕而感發前章託興鳯凰而用賢之意已盡故上章惟以鳯凰為比而臣遇君之意自見合末章為興而君禮賢之意自明詩固有此體又况是時王在卷阿召公從之鳯凰梧桐皆在眉睫髙岡朝陽近在指顧曰車曰馬亦在左右則託興於菶萋雝喈之梧鳯而措意於庶多閑馳之車馬固可以心領神㑹超然而得之矣故言不盡意意不盡言詘然而止即述矢詩賡歌之意以結之矢詩不多自謙之辭又以見所陳如前非有他說欲成王之思之也遂歌與首章來歌相應見此詩為賡歌而作其有起有結尤為明白謂詩無法豈其然乎
