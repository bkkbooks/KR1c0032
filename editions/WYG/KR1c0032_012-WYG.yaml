body:
  text: 詩纉緒卷十二元劉玉汝撰小雅四瞻彼洛矣維水泱泱君子至止福祿如茨韎韐有奭以作六師瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室瞻彼洛矣維水泱泱君子至止福祿既同君子萬年保其家邦周公營洛為朝會之所於是洛之形勢氣象非復前日之洛矣諸侯朝會者覩洛都之盛大而歎美之然毎章之首止言水者洛本以水名舉水之深廣而都之盛大可知矣此福祿指實迹而言蓋諸侯以天子之至此其道徳光華威靈顯赫諸侯雲集而四方輻湊國勢隆盛而人心齊一以是為天子之福祿而頌美之作起也武事貴奮揚又時平武備易弛故以作為美次章鞞琫有珌即韎韐有奭之意包福祿在其中末章福祿既同即福祿如茨之意而作六師之意亦在其中反覆含蓄而申詠之泱泱本句疊字重韻又合後章重韻為韻裳裳者華其葉湑兮我覯之子我心寫兮我心寫兮是以有譽處兮裳裳者華芸其黄矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黄或白我覯之子乘其四駱乘其四駱六轡沃若左之左之君子宜之右之右之君子有之維其有之是以似之按此篇永樂大典缺卷交交桑扈有鶯其羽君子樂胥受天之祐交交桑扈有鶯其領君子樂胥萬邦之屏之屏之翰百辟為憲不戢不難受福不那兕觥其觩㫖酒思柔彼交匪敖萬福來求鶯只詠桑扈之羽與領有文章耳舊説以為詠諸侯之有文章如此則是比而非興矣此篇四章皆頌中寓禱意先言樂只後言君子以徳言此先言君子後言樂胥以心言祜言素所受之福屏言素所任之職天以見其福之大萬邦以見其任之重皆頌也所以知其為頌者以先受福而後任職也此承屏而始言徳承祜而申言福有德而不矜故戢有徳而益謹故難惟戢惟難所以受福豈不者已然之辭尤可見其為頌也末章乃言燕飲之事觥觩酒柔言無失禮也百辟為憲下交之徳也燕無失禮上交之徳也彼于上下交際無所傲慢如此故未嘗求福而福自來求之此篇本稱諸侯之有福以為燕飲之樂然天子之待諸侯専頌美而無戒勉古人無是也故受天之祜受福不那萬福來求頌美之中有祝願之意鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乘馬在廏摧之秣之君子萬年福祿艾之乘馬在廏秣之摧之君子萬年福祿綏之此篇四章皆禱中寓頌意正與前篇相對大抵人臣受君恩意而無以報答則惟有祝其福壽而已祝之不足故其辭繁復再三而不能自已如樛木天保瞻彼洛矣與此篇皆是而此篇尤與樛木相似不稱其徳止願其福而徳自可見尤得臣下尊君不敢讃述之體故此篇頌意實寓於禱之中或曰鴛鴦乘馬不以興天子當以興福祿曰不必然也古人託興多隨所觸而借以興詞凡物之美者皆可取不屑屑較也後世多忌諱嫌疑故奉君之辭非取比於靈異則託意於珍竒其意甚尊敬其詞甚華美而古意逺矣此篇若在正雅則篇後當􅄣什内篇章而以頍弁為後什之首例在正雅有頍者弁實維伊何爾酒既㫖爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松柏未見君子憂心奕奕既見君子庶幾説懌有頍者弁實維何期爾酒既㫖爾殽既時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲既見君子庶幾有臧有頍者弁實維在首爾酒既㫖爾殽既阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴頍弁為賦而興蓋即燕飲所戴之服以起興與采芑泮水同彼云賦其事以起興此云賦而興足以互相明矣首章當云賦而興又比與後章同蓋缺興又二字當補此詩前言兄弟後言甥舅故知為燕兄弟親戚之詩而皆以豈伊異人一語喚起蓋詩人以兄弟至親親戚至厚欲先致其感發也言兄弟者再兼甥舅者一親疎之辨也於兄弟則言匪他以見至親言具來以見當親要必有纒綿依附之意是以未見而憂不必有憂患既見而樂不待銜杯酒也末章言老至将死則不久相見欲以是而勸飲焉其禮意篤至情義懇惻而詞氣和平所以為處常之道治世之音也末又呼君子而稱其宴亦勸飲之辭君子即未見既見之君子疑此篇為冠而飲酒之詩冠禮三加𤣥端皮弁爵弁首句稱弁賦其事以起興也女蘿松柏以比弱冠者必依附長者以立死喪無日以冠有著代之義故言此意以勸飲焉又合下篇為冠婚燕飲之詩按家語諸侯世子天子元子行冠事必於祖廟以祼享之禮将之以金石之樂節之公冠以卿為賔公自為主醴賔如士饗以三獻之禮酬幣于賔則束帛乘馬大戴冠禮祝詞云兄弟具在公冠既祼有樂酬有幣則饗豈無樂乎卿有同姓異姓同姓則為兄弟異姓則為甥舅冠而賔之則饗而親之不稱兄弟甥舅而何以哉祝詞舉親見疏頍弁則二者可通用其言具在具來則其與於冠與饗者疑非止賔一人矣又娶婦三日不舉樂而傳以車牽為燕樂新昏之詩蓋天子諸侯之禮亡惟據詩詞意以定之也今取車牽例以頍弁為冠而醴賔之酒之詩不亦可乎間關車之牽兮思孌季女逝兮匪飢匪渴徳音來括雖無好友式燕且喜依彼平林有集維鷮辰彼碩女令徳來敎式燕且譽好爾無射雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無徳與女式歌且舞陟彼髙岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心寫兮高山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心禮娶婦之家三日不舉樂此燕新昏而有詩歌意者娶婦三日後或三月廟見後燕飲所歌歟首章前四句言親迎時事下言今日燕飲次章前四句言成婦後事下乃言今日燕飲前曰會初至而始相見也此曰敎則成婦後婦徳婦言皆可見也故好爾無射不特且喜而已三章専言今日燕飲四章言我心輸寫則燕飲之終也末章則舉始終而言所以總結之此詩燕樂新昏而皆以徳言徳音令徳美彼之以徳親已也無好友㫖酒嘉殽謙已而以禮親彼也無徳與女尚徳而欲彼已交勉也及親迎自我好爾自我與女亦自我得男先於女陽倡隂和之義至於燕飲之樂則止曰我心寫兮曰以慰我心皆無宴昵之私也蓋夫婦人倫之始而昏姻又夫婦之始是詩深得正始之道所謂樂而不淫者也正雅夫婦之詩僅此而已烏可列之變雅哉營營青蠅止于樊豈弟君子無信讒言營營青蠅止于棘讒人罔極交亂四國營營青蠅止于榛讒人罔極構我二人王汝按毛傳青蠅賔筵在魚藻采菽前今從傳以魚藻采菽接車牽為正雅青蠅賔筵居采菽後為變雅蓋雅之正變實于此而分也或曰毛𫝊以六月為變雅之首今從集𫝊移置毛𫝊所次二十篇于菁莪後六月前乃以青蠅首變雅而不首六月其有説乎曰詩有正變其變必以漸而以正風相反者惟邶最明而且備故邶首變風然風之變非一日也邶首莊姜之詩而鄘衛首共伯武公之詩則武公之初風已變矣變大雅之中有厲王詩武公之抑列于其中則厲王之時大雅四變矣而小雅武公之賔筵乃列于幽王之後而以宣王六月首變雅豈得其序乎夫六月固雅之變然宣王之前已有變雅六月焉得為始又鹿鳴六月不見正變之所以異而可以六月對鹿鳴為變雅之首乎今若以青蠅賔筵之詩為首既得小雅先後之序又青蠅信讒非復君臣和樂之情賔筵沈耽無復禮樂宴飲之意角弓非常棣伐木之兄弟昏姻菀栁非天保之下下保上正與鹿鳴以下五詩相反則此數篇固當為變雅始而皆厲王時詩矣若六月為宣王征伐夷狄之詩既不足為正變之别又黍苗乃隔越于六月以下數十篇之後豈非其錯簡乎以此推之則六月又焉得為變雅首乎且大雅崧髙在烝民諸詩之前則黍苗亦當在六月之前何疑以此次第其先後之序又豈不甚順甚明邪賔之初筵左右秩秩籩豆有楚殽核維旅酒既和㫖飲酒孔偕鐘鼓既設舉醻逸逸大侯既抗弓矢斯張射夫既同獻爾發功發彼有的以祈爾爵籥舞笙鼓樂既和奏烝衎烈祖以洽百禮百禮既至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賔載手仇室人入又酌彼康爵以奏爾時賔之初筵溫溫其恭其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞僊僊其未醉止威儀抑抑曰既醉止威儀怭怭是曰既醉不知其秩賔既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側弁之俄屢舞傞傞既醉而出竝受其福醉而不出是謂伐徳飲酒孔嘉維其令儀凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又此篇為飲酒悔過而作其先燕射而後及祭者蓋祭雖飲酒非如燕禮止為飲酒而設又古者将祭則射以擇士将射則先行燕禮既擇而後燕即以賔筵言祭無賔筵故首以樂言其中賔載手仇乃助祭之賔非燕飲之賔也燕自設席至舉酧同為燕飲始時事其禮樂固盛矣若祭畢而燕雖亦始燕之禮樂然此所謂始時則非指燕蓋以祭時行獻酧之禮為飲酒之始事也故自籥舞至康爵其禮樂為尤盛首章歴言燕飲而終曰以祈爾爵是欲辭爵辭養意不在飲也次章歴言祭飲而終曰以奏爾時言欲以奉時祭意亦不在飲也觀二以字可見前章先言燕而後言射是兩事其肆筵陳器和酒安賔設鐘鼔舉醻爵抗大侯張弓矢而衆耦拾發皆循其序次章先言祭而後言飲其用樂衎祖備禮受嘏亦循禮序唯子孫酌獻尸尸酢而卒爵即嗣舉奠之事本在佐食加爵後今乃言之于賔助祭室人復爵之前此不循其序者詩主詠歌惟述其意非敘其事如楚茨笑語者詩有此體也或又謂鄭氏以禮説詩不免有泥于禮者若以各奏爾能為子姓兄弟羣昭羣穆咸在宗廟而以有事為榮者亦似可通三章言始治終亂専以威儀言四章専言終亂而極言威儀言語之失福則賔主共之伐徳則自害已徳豈能害人哉末又兼二者言不臧大怠威儀之失匪言匪由言語之失也不識又兼二者言前章皆知過而悔之詞末章則悔而戒之詞過而知悔者鮮矣知悔而能戒則終無悔矣夫然後謂之悔過末致丁寧為戒深矣凡首二句無韻則與後章重韻為韻後章無叶則本章自叶此篇右叶羽已秩叶尺熾反又秩秩疊字重韻叶號叶呼交呶叶呼毛反唯溫溫其恭無叶未詳或云溫叶泓恭叶肱詩之時世不可考然亦有可據者韓詩謂賔之初筵衞武公所作集𫝊從之考之史記年表武公即位于宣王十六年卒于平王三年在位五十五年國語言武公年九十有五猶箴儆于國今止以年九十五為斷則武公生于厲王時至宣王初年年已二十有六至即位之時年已四十有一矣其作抑戒則當在平王時然大雅列抑于厲王詩中而在宣王之前豈以武公生長厲王時實為厲王時人于今為前朝元老于徳為睿聖故推其所生之時尊之而列之厲王詩中邪若賔筵之作安知非處厲則有過遇共和而知悔也邪又安知抑詩所言夙知者非武公自述其知過之早邪今大雅之抑既在厲王詩列而小雅賔筵以下歴角弓菀栁都人士采綠四篇而後至黍苗為宣王時美召公之詩則自青蠅賔筵至采綠皆當為宣王以前詩矣黍苗隰桑之後乃續以六月而同為宣王時詩其次序豈不甚明邪魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居此篇只見王與諸侯在京燕飲之樂殊不見其所美然詳味王在在鎬之辭其中固自有王者無為京師尊安四方向化諸侯賔朝之意焉豈樂飲酒之詞其中自有天下無事王心至正君臣交通上下歡洽之意焉不必言德而德在其中至於末章有那其居則又有居所星共之意有萬年永安之意言不特樂飲於今日而已所以包前章飲酒之意以結之也然王在在鎬一語以魚在在藻興之而三章不易其詞又藻鎬自相叶韻蓋此篇之意尤在此語而𫝊又言何在一問一荅以盡其曲折彌覺詞簡而有味采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乘馬又何予之𤣥衮及黼觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所届赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福祿申之維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福祿膍之優哉游哉亦是戾矣二何字辭極懇至前三章皆以二句興二句下文乃承上意而申言之二章喜見其車馬之至以為榮即為龍為光之意三章𫝊曰賦也愚謂當云興也取邪幅交纒以興諸侯交際言赤芾在股則邪幅交纒而在下矣諸侯交際匪紓則上為天子所予也蓋赤芾則特取在下之邪幅者以其與下彼交之意相關故知當如前後章作興也匪紓方見諸侯之徳故下文樂只君子一再歎而稱美之四章末章則皆以二句興四句柞枝興君子葉盛興殿邦受福此方見諸侯之職故既咏歎之而併及從臣之賢蓋君行卿從於燕而稱美之亦所以勉勵之也前章先美諸侯而歎詠之此再歎咏之而後及其臣言之序也三章樂只君子六致嘆咏而終以優㳺戾矣之辭所以結全篇也蓋優㳺二字有悠久從容之意亦是二字有源源而來之意二亦是字不同前言臣之從君此言後之繼今蓋天子欲諸侯君臣相與於無窮也匪紓鎮邦率從戾矣皆寓戒勉按毛傳楚茨至隰桑二十篇在鼓鐘後白華前其中魚藻采菽在青蠅賔筵後魚藻采菽既從集𫝊以類而從前則青蠅賔筵角弓以下八篇自當仍依毛𫝊元次而居采菽之後矣然此二十篇前既有以見正雅至采菽而終後尤有以見變雅自青蠅而始其序其義皆若有不可易者玉汝此説雖出鄙陋實本集𫝊正雅錯脫黍苗宣王時詩之言故且存之於此以待他日博雅之君子去取之然此說前人未有及此者似亦非偶然之故也願更詳之騂騂角弓翩其反矣兄弟昏姻無胥逺矣爾之逺矣民胥然矣爾之敎矣民胥傚矣此令兄弟綽綽有裕不令兄弟交相為瘉民之無良相怨一方受爵不讓至于已斯亡老馬反為駒不顧其後如食宜饇如酌孔取母敎猱升木如塗塗附君子有徽猷小人與屬雨雪瀌瀌見晛曰消莫肯下遺式居婁驕雨雪浮浮見晛曰流如蠻如髦我是用憂角弓反興興辭蓋詩之託興多以彼然興此不然此以彼不然興此當然故曰反興首章言無逺者汎言兄弟之當然次章乃言王不然則民将傚其然三章至五章申言民之相逺六章至末章申言王之相逺民由相逺故相瘉而各據一方以相怨至有以此受爵者然受爵已過其任則宜飽矣而又孔取則太甚矣民即王之兄弟宗族不敢戚君而自稱為民也此三章一意相連然民之相逺由王之相逺兄弟既胥為不令矣而王又爵讒以來之是敎猱塗塗也苟王有善道則不令者亦将傚之反為善道而相附屬宗族兄弟皆可相依相保矣今既無善道而又不肯貶下受爵者遺棄不令者所以自處者惟益長其驕慢是使民益為不讓無禮義而相殘賊如蠻髦然則王之國必有大可憂者豈獨兄弟宗族之受其禍哉此作詩者所以為王憂也此三章一意相連曰無曰有有敎戒於王之意曰與屬有開悟不令者之意泛言君子舉下以見上泛言小人舉疏以見親毛𫝊楚茨之隰桑二十篇相連集𫝊謂楚茨十二篇當為正雅黍苗隰桑當為宣王時詩今以楚茨十二篇上接菁莪黍苗二篇下接六月固主集𫝊也中間青蠅而下六篇乃在元次者從毛𫝊也不特六篇雖二十篇本相連在後今移於前而仍相連亦用毛𫝊也凡詩中篇次之移置或依儀禮周禮或仍毛𫝊或主集𫝊或用孔疏各有所據玉汝何敢以私意臆說僣移妄易以亂聖經哉有菀者栁不尚息焉上帝甚蹈無自暱焉俾予靖之後予極焉有菀者栁不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁焉有鳥髙飛亦傅于天彼人之心于何其臻曷予靖之居以凶矜按此篇永樂大典缺卷彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望彼都人士臺笠緇撮彼君子女綢直如髪我不見兮我心不説彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結彼都人士垂帶而厲彼君子女卷髪如蠆我不見兮言從之邁匪伊垂之帶則有餘匪伊卷之髪則有旟我不見兮云何盱矣三代王都之盛非徒以民物繁富而已名卿賢相世家宦族聚廬於其間禮儀典則文物衣冠言貌威儀足為四方表式者於是乎在焉故當盛時惟是為可稱及其衰也亦惟是為可思若思盛時而惟在于繁富則亦末矣豈有得於先王之餘風遺俗哉是以都人士之詩人及見昔日之盛者首専稱士而次兼士女其稱士也惟舉貴顯之人有言行而為民望者其稱女也惟舉君子女為舊姓而有禮法者蓋天下之士女莫多於王都而王都之所以盛則以累聖之澤深而士女多賢也詩人惟有感于此而思之故其所思誠可思也至其稱士女之容飾則臺笠緇撮小服也充耳琇實常服也帶垂髪卷之美亦嘗有之而乃以此為歎則詩人之意重在士女之徳禮可知矣不然容飾如此而果足以盡前日之盛乎果足以重今日之思乎以西都之炫燿不若東都之法度曾謂詩人而無見於此乎此其詩所以為雅也有餘謂多威儀旟者揚也謂竦敬也即采蘩所謂僮僮彼編髪為之此不必編而自竦揚二者皆謂有禮容非止垂與卷之美而已也云何猶言無可奈何蓋不為怨懟之辭惟歸之氣運世道而悵望之云耳末章承用上章二事申言而極詠之尤有餘味亦詩之一體此篇若與下三篇俱移置六月前乃與後鴻鴈詩相應蓋此離散彼安集亦一錯簡之證也見鴻鴈篇末終朝采綠不盈一匊予髮曲局薄言歸沐終朝采藍不盈一襜五日為期六日不詹之子于狩言韔其弓之子于釣言綸之繩其釣維何維魴及鱮維魴及鱮薄言觀者婦人以夫不在家不為容故髪曲局今歸沐以待其還者知君之歸期故也與後章過期相應五日六日言其過期耳非止五日六日也狩釣預言歸時事綸繩徃觀皆託言末章與前篇末章同但前篇承用上二事而竝言此則止承用其一又一體也此篇若從前後移置則篇後當􅄣什内篇章而以黍苗為後什之首芃芃黍苗隂雨膏之悠悠南行召伯勞之我任我輦我車我牛我行既集蓋云歸哉我徒我御我師我旅我行既集蓋云歸處肅肅謝功召伯營之烈烈征師召伯成之原隰既平泉流既清召伯有成王心則寧此行者歸而作此詩其曰我故知為行者所作曰歸哉歸處曰成之有成故知其歸而作召伯營謝城邑雖有旅從而非征伐故征為征行成之有成謂成營謝之功黍苗為營謝方畢而歸之詩崧髙為營謝既成申伯出封之詩此二詩之表裏先後也隰桑有阿其葉有難既見君子其樂如何隰桑有阿其葉有沃既見君子云何不樂隰桑有阿其葉有幽既見君子徳音孔膠心乎愛矣遐不謂矣中心藏之何日忘之桑阿葉難以興其樂若此則以比君子之徳盛故比不如興為長樂對愛言樂主發散在外愛根於中故始言樂終言愛發之遲謂遐不謂存之久謂末一句愛非言所能盡故發之遲藏者或不能久何日忘之則存之久矣此愛之久晏平仲交久而敬此愛賢彼敬友此由見賢而樂故専以愛言此詩在黍苗後豈以宣王任賢使能以致中興故當時之人亦皆喜見賢者如此歟𫝊於序謂此非刺詩則此在黍苗後固當在六月前也白華菅兮白茅束兮之子之逺俾我獨兮英英白雲露彼菅茅天步艱難之子不猶滮池北流浸彼稻田嘯歌傷懷念彼碩人樵彼桑薪卬烘于煁維彼碩人實勞我心鼓鐘于宫聲聞于外念子懆懆視我邁邁有鶖在梁有鶴在林維彼碩人實勞我心鴛鴦在梁戢其左翼之子無良二三其德有扁斯石履之卑兮之子之逺俾我疷兮按此篇永樂大典缺卷緜蠻黄鳥止于丘阿道之云逺我勞如何飲之食之敎之誨之命彼後車謂之載之緜蠻黄鳥止于丘隅豈敢憚行畏不能趨飲之食之敎之誨之命彼後車謂之載之緜蠻黄鳥止于丘側豈敢憚行畏不能極飲之食之敎之誨之命彼後車謂之載之黄鳥有好音故為其自言緜蠻即其自言之聲也止于丘阿而下皆黄烏之言也我黄鳥自我也為鳥自言以比己止丘阿而道逺我勞如之何而可前乎其止其前皆飢乏而不能自給故思有飲食之者庶幾有以養其生乎孤陋而無以自修故思有敎誨之者庶幾有以進其德乎微賤而無以自致故思有命車載之庶幾有以達其道乎謂後車者自謙而無厚望之詞也凡人處微賤勞苦之中其所思不出於此三者苟能有之則得所託矣而求誨之意常存其間則所思不失其正必無嗟來斯濫詭遇之病矣此詩所以為雅也畏包道逺我勞而言凡詩明言于前則後不再言而意自見幡幡瓠葉采之亨之君子有酒酌言嘗之有兔斯首炮之燔之君子有酒酌言獻之有兔斯首燔之炙之君子有酒酌言酢之有兔斯首燔之炮之君子有酒酌言醻之獻酢醻燕飲之大節也詩人将述物薄禮至之意止以獻酢醻三者言之足矣今於首章先以物之尤薄者而致其先嘗之意然後别即一物以敘三者之禮則雖物薄而尊賔敬賔殷勤篤至之情藹然可見此詩善道主意之體也漸漸之石維其高矣山川悠逺維其勞矣武人東征不遑朝矣漸漸之石維其卒矣山川悠逺曷其没矣武人東征不遑出矣有豕白蹢烝涉波矣月離于畢俾滂沱矣武人東征不遑他矣高山石路巉巖險峻登歴者最為勞苦故特以此為言山川悠逺謂路經幾山幾川非止一山一水而已故曰悠逺逺行逢水最苦又遇大雨則苦愈甚故于末言之朝言天時出言地勢他言人事兼此三者則備嘗矣東征由西周而東也破斧漸漸之石皆言東征破斧之武夫不知其勞此詩之武夫不勝其怨以此見地非有險夷事非有難易惟繫人心之欣戚而人心欣戚又繫在上之賢愚明暗而國之盛衰治亂可觀矣苕之華芸其黄矣心之憂矣維其傷矣苕之華其葉青青知我如此不如無生牂羊墳首三星在罶人可以食鮮可以飽何草不黄何日不行何人不将經營四方何草不𤣥何人不矜哀我征夫獨為匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃者狐率彼幽草有棧之車行彼周道按此二篇永樂大典缺卷
