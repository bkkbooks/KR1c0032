body:
  text: 詩纘緒巻十八元劉玉汝撰魯頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭思無疆思馬斯臧駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車袪袪思無邪思馬斯徂𫝊謂閟宫一篇蓋僖公詩無疑則以前三詩未可必爲僖公故此僖公二字當作魯侯牧馬之盛然略舉而極盛自見於詠也舉牡則牝者未言也在坰則不在坰者未述也薄言則略言而未詳也舉所有之馬則馬有名而未數者不可勝數也而况無名而不足數者乎楚丘騋牝三千之句法本於此矣古人用馬以駕車駕車爲馬之大用故此以駕車言能左右之曰以見馬之閑習也馬盛有力而徃來不絶矣然以健爲貴不健則雖盛有力而易乏心之所思牧馬之所本也所思雖無窮而不厭矣然以無邪爲主邪則所思皆非矣臧言徳才言才而又奮起矣然以善行爲至不善行則雖有徳有才不足稱也易乾爲馬坤爲牝馬乾曰天行健坤曰行地無疆有駜有駜駜彼乗黄夙夜在公在公明明振振鷺鷺于下鼔咽咽醉言舞于胥樂兮有駜有駜駜彼乗牡夙夜在公在公飲酒振振鷺鷺于飛鼔咽咽醉言歸于胥樂兮有駜有駜駜彼乗駽夙夜在公在公載燕自今以始歲其有君子有榖詒孫子于胥樂兮𫝊不言君臣蓋謂君燕飲臣而頌禱之可謂君燕其臣而臣禱其君亦可故所乗謂托興於君臣之馬皆可夙夜勤也而又辨治美其徳也勤而後燕飲也鷺鼔美其樂舞也末乃頌禱之辭有歲而無善以及人是富而無教也歲歳有而無賢子孫亦非有道之長有善則得所以處有歲之道善詒子孫則得所以處歲歲有之道矣此能感天休而又能盡人道者也以此爲禱至矣于胥樂兮美其燕飲之樂樂而至于有善詒後斯其爲樂大矣思樂泮水薄采其芹魯侯戾止言觀其旂其旂茷茷鸞聲噦噦無小無大從公于邁思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜穆穆魯侯敬明其徳敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其徳既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚濟濟多士克廣徳心桓桓于征狄彼東南烝烝皇皇不吳不揚不告于訩在泮獻功角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲翩彼飛鴞集于泮林食我桑黮懐我好音憬彼淮夷來獻其琛元龜象齒大賂南金首章言侯將至而人皆樂從之次章言侯既至而人皆歎美之音謂聲譽歎美之聲既著而侯又能身教故人樂從而稱譽之者尤在於此蓋侯能身教斯不愧於泮宫矣三章言侯飲酒於泮政此詩所由作蓋因其飲酒而頌禱之也祝夀者多祈其老而夀今曰難老則常少而不老又永錫之以此則夀豈可量乎順彼衆人所共由之大道以服此魯國之羣衆衆豈有不服者乎慎儀者明徳之事也皆以敬爲主文武者昭假祖考於素者也昭假之際則以孝為主能敬能孝則修身奉先之道得矣有不足爲法於民而得福於已者乎此魯侯身教之本也允文含上在泮身教事允武含下服淮夷事四章五章言敬以明之則能明矣獻馘獻囚言将臣此克明故彼克廣徳之能感人如此于征既歸而獻功言士卒七章總言将帥士卒戎車將臣也徒御士卒也孔淑不逆固猶卒獲雖聖人制夷服逺之道不過於此矣前以兵服此于篇末言作泮以徳服故淮夷貢琛而心服矣好音謂徳音承上明徳廣徳而言閟宫有侐實實枚枚赫赫姜嫄其徳不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稺菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之届于牧之野無貳無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啓爾宇爲周室輔乃命魯公俾侯于東錫之山川土田附庸周公之孫莊公之子龍旂承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犧是饗是宜降福既多周公皇祖亦其福女秋而載嘗夏而楅衡白牡騂剛犧尊將將毛炰胾羮籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾夀而臧保彼東方魯邦是常不虧不崩不震不騰三夀作朋如岡如陵公車千乗朱英緑縢二矛重弓公徒三萬貝胄朱綅烝徒増増戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾夀而富黄髪台背夀胥與試俾爾昌而大俾爾耆而艾萬有千嵗眉夀無有害泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功保有鳬繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若天錫公純嘏眉夀保魯居常與許復周公之宇魯侯燕喜令妻夀母宜大夫庶士邦國是有既多受祉黄髪兒齒徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寢孔碩新廟奕奕奚斯所作孔曼且碩萬民是若愚按𫝊云魯頌獨閟宫一詩爲僖公詩無疑今從傳說則閟宫前三詩安知非僖公以前詩乎僖公之前伯禽之後魯豈皆無賢君歟又泮水舊以爲頌僖公故與閟宫言服淮夷事皆以爲願望僖公之辭可也今泮水既未見爲僖公詩則自伯禽以後至於僖公之前豈其淮夷始終未嘗有一日服從中國之迹乎故愚不能無疑嘗讀史記魯世家載孝公之事若有與泮水詩合者竊以爲泮水一詩魯人頌孝公之詩歟周宣王伐魯問為魯後者樊穆仲曰懿公弟稱肅恭明神順事耆老賦政行刑必問於遺訓而咨於故實不干所問不犯所知王曰然則能訓治其民矣乃立爲魯侯是爲孝公今泮水言魯侯至泮而飲酒是養老乞言也其能問遺訓咨故實可見昭假烈祖敬恭明神也淑問如皐陶行刑也桓桓于征賦政也獻囚獻功而在泮亦必問咨而行之矣載色載笑匪怒伊教豈非能訓治其民者乎孝公終諡爲孝又豈非以靡有不孝之故歟又按常武宣王親征淮夷而徐方來其征徐方魯必帥師以從前乎孝公伯禽伐淮夷後乎孝公僖公從齊桓伐淮夷安有宣王親征有功而魯不與乎又况孝公賢而適當其時則伐淮夷而淮夷服魯人以是美其君不爲過矣以此觀之泮水所言似皆是實事似未可與閟宫無其事而願之者例視也又頌禱其君之福徳者雅體也竊意魯人之意其初蓋取雅中之頌體以美其君故名其詩而謂之頌非擬周頌也故其詩體非周頌視雅體亦不純蓋其意専以頌美爲主觀其首詩有頌而無禱最可信其次三詩皆頌多而禱少如泮水一詩最近雅體舊說禱頌多少以愚觀之其中禱辭惟永錫三言孔淑四言而已前後皆頌辭也若頌不勝禱恐非魯頌之體亦豈魯人名頌之本意哉蓋頌本欲效雅惟以天子嘗賜之樂又不采其詩遂假頌之名名其詩以是尊魯而美其名然僭名之罪容得逃乎首序作詩本意只二句下文即推本魯事至末章方與首句相應又是一體前三章純是頌辭至第三章末降福福女方爲禱辭四章五章皆前頌後禱前美其祭祀後美其軍旅與棫樸奉璋六師意同齊桓伐楚而以美其君亦頌辭也兩章俾爾之下方爲禱辭六七二章亦前頌後禱二山魯國所有大東海邦淮夷南夷魯君所無所有爲頌所無爲禱合二章則前以泰山起辭中語相對後以莫敢二句結亦是一體首述先王次稱大祭禮樂末又效商頌蓋用成王尊魯之意而不知非所以爲尊也八章禱中有頌末乃頌修廟以終首句之意一篇始終皆頌多於禱商頌猗與那與置我鞉鼔奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作温恭朝夕執事有恪顧予烝嘗湯孫之將商人尚聲故首發歎嗟亦尚聲之意也此下即述奉祭之樂先置後奏未祭時樂也和平穆穆正祭之樂也萬舞陳庭祭畢之樂也始終爲敘樂舞尚聲之意可知自古至末皆敘奉祭之敬商稱湯孫武丁孫子周稱曾孫稱孝子成王稱小子商質周文也此詩有二意𫝊引記以爲樂三闋然後出迎牲如此則此詩即樂三闋所奏之詩按記言有虞氏尚氣商人尚聲周人尚臭商人尚聲者謂於未迎牲之前以聲音詔告於天地之間也若於此奏此詩則詩意當是備道其祭始中終之盛樂以達吾自古在昔之敬恭庶幾湯知爲湯孫之將蓋先以此聲此意告神於陰陽之間而求其降也𫝊又引舊說以爲祀湯之樂如此則此詩乃正祭所奏之詩詩意當以奏假思成爲重而終之以所𫝊之恭庶幾湯歆我湯孫之將蓋當祭時述此聲此意而欲湯之享之也二意不同而有先後則𫝊意必有所在然其尚聲之意則一也嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酤賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉壽黄耉無疆約軧錯衡八鸞鶬鶬以假以享我受命溥將自天降康豐年穰穰來假來饗降福無疆顧予烝嘗湯孫之將按此萹永樂大典缺卷天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旂十乗大糦是承邦畿千里維民所止肇域彼四海四海来假来假祈祈景員維河殷受命咸宜百禄是何此詩首述契次湯次先后次武丁無適主故傳曰祭祀宗廟宅殷土芒芒或曰湯以後方稱殷此句當屬下或曰殷土追稱當屬上愚謂自契宅此至湯而地始大屬上爲是先后或曰湯也愚謂言湯以後之先后故曰受命不殆不殆非所以語湯也武丁孫子主祭者自稱猶言湯孫武王靡不勝主祭者自述龍旂大糦述助祭者邦畿四海言由内而外域于四海者極其廣四海維河言由外而内朝于京師者極其多景員維河言京師也諸侯來朝至景山四面之河則達于京師矣猶禹貢言九州之貢達于河則至堯都矣蓋覆說邦畿也若曰語形勢則在徳不在險况邦畿千里而民止所包更大奚止形勢四海之諸侯來假則四海之人可知或曰前篇約軧受命此篇武王靡不勝而下皆若主祭者自述其功徳又或曰邦畿至末再述先王之功徳言國勢之大人心之一以見自昔以來殷之爲君者受命咸宜而百祿是荷也或又曰邦畿而下通今昔而言謂在昔在今國勢人心之盛如此先王以此而受命咸宜故已以此而奉祀百禄是荷也𫝊以長發言契相土湯故謂宜爲祫詩愚按𤣥鳥言契言宅殷土即契以後之君言湯言先后武丁則湯以後之君亦似宜爲祫詩然不可考也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商𤣥王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍受小球大球爲下國綴旒何天之休不競不絿不剛不柔敷政優優百祿是遒受小共大共爲下國駿庬何天之龍敷奏其勇不震不動不戁不竦百祿是總武王載斾有䖍秉鉞如火烈烈則莫我敢曷苞有三蘖莫遂莫達九有有截韋顧既伐昆吾夏桀昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王首句統說世世之君長承上發起下禹敷土方四句只見禹之時爾所謂長也有娀方將二句所謂發也桓撥謂武治也猶言勇於自治也桓撥率履猶言克己復禮也受小大國契爲司徒也海外有截疏謂相土爲王官司馬也齊謂生之時徳之成皆與天命㑹也生有聖徳而不與天命㑹伊尹周公孔子不有天下是也所謂湯齊下文所言即是也湯之生不遲固已應期而與天命㑹矣而湯聖敬日躋事天不息至是而復其性又與天㑹是生之期徳之盛皆與天命㑹夫是之謂齊此帝所以命之也受小球大球至百祿是總敷政所以發政施仁奏勇所以除殘去暴敷政有餘然後武功可進四不見湯之執中前先言四不後及敷政後先言奏勇後及四不者變其文法也駿釋爲大則音峻釋爲馬則音俊駿馬也庬雜也綴旒爲敷政而言故爲諸侯所係屬駿庬爲奏勇而言故爲諸侯所歸往言諸侯從往征伐如衆多之馬雜色而往進也旒先言綴駿後言庬亦變文法也六章因上言奏勇乃遡言伐桀之事末章因上言伐桀有九有又遡言湯以前中衰至湯興王得相之事然此篇惟述祖徳全不見祭祀等意又左右商王似非結語傳謂商頌多闕文疑義者其在此篇歟撻彼殷武奮伐荆楚罙入其阻裒荆之旅有截其所湯孫之緒維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常天命多辟設都于禹之績歲事來辟勿予禍適稼穡匪解天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寧以保我後生陟彼景山松柏丸丸是斷是遷方斲是䖍松桷有梴旅楹有閑寢成孔安先儒言周以農開國商以武興王觀前篇長發頌湯信然故此頌高宗亦首以殷武言之其言撻言奮言罙可見神速勇勁之勢未服則入其阻而致其衆既至則定其地而安其民又見其寛仁安靜之意此湯用武取天下之道而高宗似之故曰湯孫下乃以湯服逺之事言之次章言外夷狄之來朝三章言内諸侯之畏服四章言高宗勤身心謹刑賞以治民五章言高宗政治整飭於内聲靈赫顯于外夀康兼備于身以保後人末章始見廟成始祔而祭作此詩也
