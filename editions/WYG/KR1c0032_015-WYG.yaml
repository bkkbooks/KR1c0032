body:
  text: 詩纘緒卷十五元劉玉汝撰大雅三民亦勞止汔可小康惠此中國以綏四方無縱詭隨以謹無良式遏冦虐憯不畏明柔逺能邇以定我王民亦勞止汔可小休惠此中國以為民逑無縱詭隨以謹惽怓式遏寇虐無俾民憂無棄爾勞以為王休民亦勞止汔可小息惠此京師以綏四國無縱詭隨以謹罔極式遏冦虐無俾作慝敬慎威儀以近有徳民亦勞止汔可小愒惠此中國俾民憂泄無縱詭隨以謹醜厲式遏冦虐無俾正敗戎雖小子而式𢎞大民亦勞止汔可小安惠此中國國無有殘無縱詭隨以謹繾綣式遏冦虐無俾正反王欲玉女是用大諌此必同列有惑於詭隨者盖詭隨之人乃無良無畏惽怓繾綣而欲為冦虐者為之人多以其柔順善從而喜之不知其行詭隨之道實有冦虐之心也故冦虐易識詭隨難知能知其為詭隨而勿縱之則其冦虐無所施而自止矣故此篇雖以冦虐對詭隨而意實在詭隨也首章言民勞矣庶幾其可小康乎小康則惠此中國而可以綏四方然所以致此無他惟勿縱詭隨之人使無良肅而㓂虐止然後柔逺能邇而王室定矣以謹無良使不得進也小休則民猶可聚不惠則民散矣詩人稱此人有前勞則必嘗用力於國家者豈其無定見無堅志一得志而變其所守者歟敬慎則詭隨無所施近有徳則詭隨逺矣此教以勿縱詭隨老成忠厚之心也冦虐不知明命而不畏雖民皆受害已自作慝而正道猶存其害尚小若詭隨之積使正道敗壊敗壊之積至於全反則有大可憂者矣故女雖小子而所為關係甚大則我述王意以相諌亦不得不大矣盖詭與正相反小與大相對詭隨不已必致正反小休難望必致大敗此老成所以憂也謂之大諌者非特為同列也為王也為國天下也故前言以定我王又言以為王休終又推原王之本心而託以告盖王雖無道而其相愛之本心豈欲女縱詭隨以敗國家哉文武君臣以徳化政治平天下大雅諸詩以其大體言之其後衰㣲君臣之所為不一皆不與治同道故民勞諸詩亦以其大體言之周之興也君聖臣賢而其得人也盛君仁臣忠而其為謀也敬及其衰也君昏而臣詭隨矣君臣自聖而謀不逺矣方其治也天命人歸而天下和平及其亂也民勞民怨而帝疾威矣此其相反者其大體皆如此至其所以救則惟惠民敬天而鑒殷終不出於大雅之正道此又小雅之所未備者也故即此而論二雅之正變大小豈不尤可歎乎上帝板板下民卒癉出話不然為猶不逺靡聖管管不實于亶猶之未逺是用大諌天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣我雖異事及爾同僚我即爾謀聽我囂囂我言維服勿以為笑先民有言詢于芻蕘天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曽莫惠我師天之牖民如壎如箎如璋如圭如取如攜攜無曰益牖民孔易民之多辟無自立辟价人維藩大師維垣大邦維屏大宗維翰懷徳維寧宗子維城無俾城壊無獨斯畏敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍出話不合理則為謀無逺慮皆由不法徃聖而心無依據不出誠實而心皆欺罔此謀所以未逺也為猶未逺總合上文而與卒癉相對易不為未者將諫而欲其從言能從而猶可逺也大諫説見篇末憲憲者欣欣然踴躍而喜事泄泄者沓沓然怠緩而廢事不過於動則不及而息此出話為猶所以不然不逺也參合聖道而不乖謂之輯紬繹義理而可悦謂之懌辭能如是而依於聖本於誠則民無不定無不合矣無然者戒其不可為輯懌者教以所當為前章言其不善謀此下三章言其不聽人之善謀言我以同寮情義之厚而從爾謀爾既不聽而又笑之然猶不責之而戒之又舉先民之言謙已而冀其從焉忠厚之意也四章言不特見笑而且見謔不一則棄善人侮老成而憂愈甚矣故直言以戒之然小子本指此人而若泛言自稱老夫而又曰耄忠厚之詞也多字對首章未字未猶可也多則去道逺而禍愈近矣故下文言禍將及身後章則言禍及於民五章傳謂戒小人愚謂前後皆戒同列不應此忽戒小人只當以戒同列夸謂大言而為夸誕毗謂卑論而為附㑹惟靡聖不實故如此憲憲泄泄囂囂謔謔威儀之迷可知笑謔老耄善人載尸可知莫我敢葵無善人故也故民遭喪亂以終卒癉之意六章以下泛言導民修徳敬天之事盖導民在于修徳修徳在于敬天也六章言導民之易若自立辟以導之則民易于辟矣以起下章价大也愚謂价兼介助意盖言大徳之輔臣也价人大師以上下言大邦大宗以内外言懐徳即夫子所謂君子懐徳言常思念其徳也宗子賅价師邦宗舉親以見疏也維城賅藩垣屏翰舉大以包小也此即中庸九經之目帝堯俊徳九族百姓萬邦之序也無自無俾無獨無敢皆戒辭難蹶虐懠以天意言牖民明旦以天道言語天意而每章必以無戒之其意已諄切矣至末章而總言之謂天難天懠之時憲憲謔謔而無能禁止固將見絶於天矣若當天怒天變之時而有所不敢則亦可謂之畏矣然而未也盖天怒而不敢則不怒而敢矣豈得為能敬哉故欲敬天者當知大之聰明無所不及必其出入起居動静隠顯無時無處而不用其力斯可謂之能敬矣盖天之怒渝者其變也明旦者其常也果能於出王㳺衍之常一無所忽則雖怒渝之變必無不敬矣豈特無敢戲豫馳驅而已哉詩人論敬天之功至於此可謂極至矣非深知聖人之學者能是乎蕩蕩上帝下民之辟疾威上帝其命多辟天生烝民其命匪諶靡不有初鮮克有終文王曰咨咨女殷商曾是彊禦曾是掊克曾是在位曾是在服天降滔徳女興是力文王曰咨咨女殷商而秉義類彊禦多懟流言以對冦攘式内侯作侯祝靡届靡究文王曰咨咨女殷商女炰烋于中國斂怨以為徳不明爾徳時無背無側爾徳不明以無陪無卿文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰􅢻咨女殷商如蜩如螗如沸如羮小大近喪人尚乎由行内奰于中國覃及鬼方文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曽是莫聽大命以傾文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世天仁而曰疾威天命之理至善而曰多辟有物必有則而曰匪諶故知其為怨天之辭然曰有初鮮終者性習也習乃人為之而非天也以此自解固足以解其怨天之意而不能不致怨於人矣含蓄其意而不發故此章不言其君而止言民泛言其理而不言其事所以為詩之首章盖優柔不廹尤得刺之體次章而下本刺厲王而借紂為喻與首章全若不相涉者然味其間莫非有初鮮終之意以見厲王之無道乃其自為而非天故曰女興是力曰天不湎爾以酒匪上帝不時皆此意又一詩之血脈也其借紂為喻者以厲王暴虐不可以正諫也厲王惡與紂同然紂惡非一此詩所言正指厲之惡名紂而實厲者也首章次章言厲王用人之虐次章以彊禦掊克相對言有暴虐者有聚歛者天降此人以滔徳而王乃興起用之使力為此以害民也三章乃言彊禦而冦攘者有甚於掊克盖以暴虐之人行聚歛之政其害尤甚故下言民怨謗之無極四五二章言王在已之惡言王以勇猛之氣為歛怨之事反以此為徳者由其不明已徳而左右前後之無人也此厲王為惡之原故反覆而極言之歟言厲王既不明其徳而又湎于酒此為惡所以愈大也既愆而靡明靡晦號呼而罔晝夜皆氣健之為也蜩螗皆蟬也如蟬鳴如沸羮皆亂意也小者大者幾於喪亡矣而且由此而行不知變也奰怒覃延也鬼方逺夷之國也言自近及逺無不然也七章言雖左右前後無老成人然文武之道布在方䇿今不聽用則將墜於地矣舊兼人與典刑言前言民怨近喪此言大命以傾則國必亡矣可不慎乎厲王之心以天下未亂已可以自肆故益為暴虐而不知已乃本也本撥則枝葉隨之而顛沛矣夏殷之亡政如此故詩人先發其立心之病而後告以藥病之方使知立本之道無他惟在監殷而已矣此雖至理之言而深中厲王之病尤切厲王之身雖極譏刺而并寓教戒愛君忠國之心也抑抑威儀維徳之隅人亦有言靡哲不愚庻人之愚亦職維疾哲人之愚亦維斯戾無競維人四方其訓之有覺徳行四國順之訏謨定命逺猶辰告敬慎威儀維民之則其在于今興迷亂于政顛覆厥徳荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑肆皇天弗尚如彼泉流無淪胥以亡夙興夜寐洒埽廷内維民之章修爾車馬弓矢戎兵用戒戎作用逷蠻方質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讎無徳不報惠于朋友庻民小子子孫繩繩萬民靡不承視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫予云覯神之格思不可度思矧可射思辟爾為徳俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子荏染柔木言緡之絲溫溫恭人維徳之基其維哲人告之話言順徳之行其維愚人覆謂我僭民各有心於乎小子未知臧否匪手㩦之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒回遹其徳俾民大棘靡哲不愚者盖生稟過人而所為迷謬用聰明為不善者也庶人之愚乃稟賦之偏謂此為愚不足為怪若哲人之愚者質非不美而習為不善乃自反戾其常性者曽庶人之不若矣程子曰所謂下愚者自暴自棄者也又曰所謂下愚者徃徃才力有過人者商辛是也究其歸則誠愚也此詩所謂哲人反戾之愚正此意也武公以如圭如璧之資為載號載呶之行以其資質而言豈非哲人與以其言行而觀則其愚也亦甚矣至是而深有悟故雖㮣舉今人之言而實為切已之病其悔悟深切如此然不明言只為泛論所以為詩之首章也大抵詩之首章泛論起辭而中含本意亦首章之體也次章承首章維徳之意言反戾其常者欲復其性則用功當如是也故章首四句亦只泛説道徳下文方言行道徳之工夫故傳以故必二字言之人道原於天而徳得於已故行道而有得於心之謂徳非有二致也以烈文之詩參之疑首四句有成説故引之以起論歟謀猶道徳之施於人者威儀道徳之發於已者訏定以盡治人之政敬慎以盡治己之功覆接上文故先政後徳又武公有國者也故其言如此訓順道徳自然之效民則修為所致之騐及其成功而一者也三章方是入題其在于今武公反已而自述其過也謂已所以迷亂顛覆者皆原于酒而湛酒也雖惟湛樂之從而弗念厥紹然不求先王而能執明法乎盖明法傳之先君本之先王即已所當紹者也弗念則弗求弗求則所執非明法而可弗念乎弗求故政迷亂弗念故徳顛覆顛覆本於湛酒武公可謂知過之原矣故言已之徳政與訏謨敬慎之相反者而曰興興尚也謂今猶如此乎所以見其為悔也先政後徳者順上文也又有國者也肆故也今也繼事之辭也言今湛酒顛覆非天所尚如彼泉流急宜治之毋使淪陷而相與以亡言知悔則當速改也是以為政之道當由内而外由近而逺由小而大由處常而應變慮無不周備無不飭可也皆為人戒己之辭此章專言政與訏謨相應承上章言政既無不備又當定民守法以戒不虞不可以政既備而怠慢也欲戒不虞尤當修徳盖謹言慎儀皆修徳之事而出言尤所當謹故取喻于白圭而深致其戒焉此於章内承上起下終前為政之説發下修徳之端詩有此體也六章專言慎言而并及其效七章專言修徳之功夫言敬其儀而修之於外者既常戒懼自省惟恐有過矣尤必於不睹不聞之地而致其戒謹恐懼則修徳工夫極致矣尚庶幾也無禁止也皆為他人命已之辭觀傳三當字可見下章乃言其效上文修徳之工夫極矣此言為徳而使之盡善盡美愼止而不愆于儀不差于理不害于義則民之法之真如投桃報李之必然矣此極言修徳之效下文㣲發聽言之端以起下章此詩自其在于今至此文意接續血脈貫通故有異章而辭相連同章而意中斷相連以終前詞中斷以起後説其問意脈各相貫通大篇長章之體自然有如此者故大雅諸詩不可以常例論若泥章句而觀則但見其繁雜而不見其統緒豈足以盡詩人之㫖哉九章托興更端言溫恭者進徳之基址也既有其基而不善於聽言則亦無以進其徳矣武公未醉而溫恭亦既有其基矣况悔過之始又用功之一初也然年既耆艾其教我者誰與故為他人之辭以聽言從違不同智愚相逺者告已使自審其所處盖雖泛言而實自道武公欲卿以下交戒之意於此尤見聽言之患有二焉有能聽而未知善否者有昏亂而不聽人之言者十章與下章分言之言能聽而未知臧否者亦有二焉有氣質愚下而不知者有志氣盈滿自以為知而實不知者故歎息而告之謂爾未知臧否也人之教爾既詳切而爾又長大如此亦宜有知矣儻能虚己以受雖多而不自滿則未知者可以早知早知則豈有反晚成者乎若武公者既成矣而患於盈十一章言昏亂不聽人誨者既藐於人之誨而又以教為虐則其夢夢尤甚矣故上引天下述已於乎告爾所以戒之為尤切盖人固有能聽人之誨者然耄則易昏武公今雖無此患然自發其耄者言既耄則當知而愈戒也曰盈曰耄皆所以自警也我生者命已者自謂也上章分言聽者末章極言不聽言之禍言聽我之謀則猶可以無悔况天運方艱吾言易從而天道不差若不聽吾言而回遹其徳則民大病而必亡矣不特終前聽言且深自提省當從卿以下交戒也菀彼桑柔其下侯旬捋采其劉瘼此下民不殄心憂倉兄填兮倬彼昊天寧不我矜四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國歩斯頻國步蔑資天不我將靡所止疑云徂何徃君子實維秉心無競誰生厲階至今為梗憂心慇慇念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯􅢌孔棘我圉為謀為毖亂况斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺如彼遡風亦孔之僾民有肅心荓云不逮好是稼穡力民代食稼穡維寶代食維好天降喪亂滅我立王降此蟊賊稼穡卒痒哀恫中國具贅卒荒靡有旅力以念穹蒼維此惠君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺腸俾民卒狂瞻彼中林甡甡其鹿朋友已譖不胥以榖人亦有言進退維谷維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒大風有隧有空大谷維此良人作為式榖維彼不順征以中垢大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖嗟爾朋友予豈不知而作如彼飛蟲時亦弋獲既之隂女反予來赫民之罔極職凉善背為民不利如云不克民之回遹職競用力民之未戾職盗為冦凉曰不可覆背善詈雖曰匪予既作爾歌周室甚盛而忽衰我不殄之憂非一日矣而倬然明大之昊天何不我矜而使我憂之不絶耶不殄謂自今以後填兮謂自始至今四牡則征行不止旟旐則飛揚不定言征役不息也亂及諸侯諸侯皆將滅亡而無復有國禍及生民生民皆將灰燼而無復有黎亂以政治言禍兼冦戎饑饉言孔棘我圉知有冦戎稼穡卒痒知有饑饉國步斯頻言國運自此頻促矣四牡旟旐傳以為民見而苦之自此至第四章皆征役之怨辭愚謂以第四章推之意作詩者自述其征役之苦下文其身歴月見者故深歎而極哀之資者可嗟歎也所居所徃禍亂如一而皆無以自存然君子維持天下秉心豈有所争不知誰為禍階而至今為病誰必有所指猶此何人哉之意憂怨之深也念我土宇言其不在鄉居而念之也自西徂東而靡定言其征行而不得息也孔棘我圉言其在邊而見病尤多且甚急也此必在邊而適有冦戎之禍故其言如此觀下文亂况斯削可見以此章推之則第二章三章所言皆作詩者自述可知矣作詩者言王豈不為謀為毖然我親見天下之亂邊圉之削矣今告王以憂恤誨王以序爵宜必見用如濯熱而王不能用則將相與陷溺耳後二章言憂恤後六章言序爵此與下章言憂恤之事世亂則賢人隠今賢者以世亂皆願為農而不願仕是王無賢也此言中國之人既危且極無旅力以念天禍是王無民也無賢無民豈非所當憂恤者乎故此二章皆申告以憂恤之事傳疑此詩作於共和之後盖以滅我為已滅也愚謂立王指厲王共和不可言立王共和之後為宣王無如此之亂盖滅謂將滅也傳於喪亂蔑資言國將危亡則此滅為將滅亦未嘗不可盖詩人憂之之辭也前國泯民燼亦然自八章至我悖凡六章皆申言序爵之事此與下二章言王不能擇相朋友又背義用事者又昧於理既使民眩惑而狂亂尤使已進退兩難而不敢諌王焉用事之愚人即已之朋友也畏謂畏王之暴忌謂忌朋友用事者之譖十一章言用人顚倒使民貪亂荼毒不止扵狂而已大風所行之隧必有所出之谷君子小人之道必有善不善之迹良人之為用善而已不順者之所為有隠暗而蔵扵中者有汙穢而見扵外者亦各有其實焉凡前章二句興後章只舉一句則前二句興意皆在其中詩多此體此言貪人有傷害善人之實迹意王必聽我言故問焉則以實對然不能聽故誦言如醉問焉則對匪言不能也誦言如醉有所畏忌也悖謂憂之而失其常通前六章皆申言誨爾序爵之憂本扵用貪故言序爵為詳嗟爾朋友以下専言朋友即上章王所用之榮公歟十五十六兩章承上言朋友不我聴而所為益甚民之罔極回遹未戾者即前所謂貪人也善背謂其行善詈謂其言職􅈵善背含盗意為民不利職競用力含冦意末章乃明言之使氏回遹而未戾則職盜而為冦矣面􅈵善背而又曰匪予非盜而何為冦易識職盜難窮今既得其實情故作歌而極言之上章先言譖賢後言害民此章先言害民後言害賢反覆其辭以深惡之
