body:
  text: 詩纘緒卷二元劉玉汝撰召南維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之此詩見諸侯身修有徳得賢妃亦有徳而身修足為齊家之本猶闗雎也鵲巢鳩居如序説則是比而非興矣今以為興蓋以鵲巢鳩居二句興之子于歸一句而居之御之取詞字相應觀傳是以二字可見蓋義興之一體也盈謂媵之多則以二句興之子一句可知禮以成為美不成禮則迎送雖多奚以為故以成終之此篇雖據實事而咏未嘗言夫人所以為徳者然非有徳何以稱其儀成其禮哉故此詩無溢美無過詞而自有以見其徳家人作詩者之性情亦可見其正張子謂以平易求之則思逺以廣尤可以此詩類推之于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宮被之僮僮夙夜在公被之祁祁薄言還歸前二章以兩于以提起詠歎末章僮僮祁祁乃極形容蓋祭以敬為主前兩言采以見采之勤兩言用以見用之謹含敬意而歎詠之末直以愛敬之意形容之夫人之敬如此其美可知且采蘩未祭時事僮僮正祭時事祁祁既祭後事蘩祭之物事祭之禮宮祭之所末章祭之心三章見始中終辭簡意備而表裏之敬可知歎美之善者也喓喓草蟲趯趯阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷時物不同而所感如一故上文所賦則易其辭下文惟易其韻以見思念之情既見既覯乃未見未覯時言之觀亦字則字可見然其未見而憂傷止於如此亦得性情之正矣按孔䟽及儀禮此篇當在采蘋後説見下篇之末按此篇當從儀禮及孔疏移置於采蘋後則采蘩采蘋處其常草蟲處其變尤與周南之三詩相對而相似按鵲巢見諸侯身修而得賢妃采蘩見夫人身修而諸侯之家齊采蘋草蟲見大夫身修而得賢妻行露聽訟見大夫之身修羔羊退食見大夫之家齊殷靁標梅見士庶之家齊而諸侯之國治矣于以采蘋南澗之濱于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下誰其尸之有齊季女案此篇永樂大典缺卷蔽芾甘棠勿翦勿伐召伯所茇蔽芾甘棠勿翦勿敗召伯所憩蔽芾甘棠勿翦勿拜召伯所説觀伐拜敗三字可以見其愛之愈深下文茇憩説隨上文叶韻耳必稱召伯據今而言皆足見愈久愈愛之意又甘棠所以蔽芾者以人愛之故也屢稱蔽芾數戒以勿辭意愈至則不特愛之於今日者愈深而愛之於後来者尤未見其已也諷咏之自可見此篇為武王時所作蓋文正時召公未稱伯武王克商分周召左右而後稱伯今稱召伯故知其作於武王時然周南召南皆著明文王之徳甘棠所言為文王時事所以列於召南之中今按此詩與何彼穠矣皆為武王時所作必當與何彼穠矣同列於後而此詩乃移而升居於前者意者采蘋草蟲以上為文王躬化南國之詩行露以下為召伯布文王徳教所致之詩其以甘棠升居於此者欲以明行露以下為召伯布政所致召南之所以為召南者以此非何彼穠矣所可同故特移而居於采蘋草蟲之後行露之前也其移之者或周公或太師或孔子雖不可知然移之之故以事理推之而可知其或然也不然則二詩之作同時而何列之異所邪後日思召公之詩何乃先於前日布政之時邪厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從輔氏謂前章責之以禮後章斷之以義此説得之以此絶其人則其所守可知以女子而能是豈無所自來揭甘棠於前而召南之義粲然矣傳於末章言求室家之禮不足蓋詩後章承前章意不言而前意在其中觀此傳尤可見此詩南國民間女子所作并見大夫之賢則南方諸侯之國漸治矣其政教雖本文王而實召伯布政使然故揭甘棠於前以表之此篇本與采蘋草蟲相連今以甘棠間之然意未嘗相間也蓋女子能以禮自守而聽訟者能使有禮者得以自直無情者不得盡其辭則大夫之賢亦可知聴訟者或為召伯或為諸侯不可知然前後之詩皆言大夫而此詩居其間豈非皆為南國之大夫與故曰意未嘗相間也讀者當以意觀之可也羔羊之皮素絲五紽退食自公委蛇委蛇羔羊之革素絲五緎委蛇委蛇自公退食羔羊之縫素絲五總委蛇委蛇退食自公稱美服飾易形容氣象難此篇三章惟以一服飾變文叶韻以咏之而服飾之有常可見惟以退食一句反覆三變以咏之而從容自得之氣象可想又舉燕服以見在朝之節儉舉退食以見在公之正直節儉正直見身修退食燕居見家齊大夫之在位者固可美而國人之稱美之者亦知徳而善咏矣自行露至摽有梅皆民間所作行露因女子守禮而見大夫聴訟者之賢羔羊因大夫而知國人作詩者之善二詩可以互見又大夫賢能治其國而國人能守禮咏徳則南方諸侯之國治亦皆可以互見矣殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之側何斯違斯莫或遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉行役遇雨為最苦家人因聞雷聲觸景興詞而念君子之勞三章一意而惟易其韻者念之深也下二句美其徳望其歸而三章不易其辭者思之尤切也思其君子而再三美其徳其所思者惟以其徳婦人之亦有徳可知也凡章首託興興辭後章同辭異韻者非有他義也若下文咏意同辭而復致其咏歎者其意為尤重當以此篇與衛北門北風王黍離揚之水等篇例推之可也歸哉歸哉本章二哉字重韻為韻又合後章重韻為韻凡本章無韻者當推此例摽有梅其實七兮求我庶士迨其吉兮摽有梅其實三兮求我庶士迨其今兮摽有梅頃筐塈之求我庶士迨其謂之按此篇永樂大典缺卷嘒彼小星三五在東肅肅宵征夙夜在公寔命不同嘒彼小星維參與昴肅肅宵征抱衾與裯寔命不猶召南之詩至小星而再更端蓋鵲巢以下四詩為文王后妃躬化之詩甘棠以下五篇為召伯宣化之詩然皆南方之近國也小星以下三詩則為南方之逺國而野有死麕則為南方極逺之地自古難化之俗至是而化亦及之矣故小星承上更端總以文王后妃召伯之化繼以逺方諸侯之國所以明徳化極逺天下漸平之實效也故以類言之則小星與鵲巢同為諸侯夫人之詩江有汜與采蘋草蟲同為大夫妻之詩野有死麕與摽有梅同為庶人婦女之詩然而不以類同列於前而再以列國夫人起大夫士庶於後蓋王者之化自近而逺得詩者近先逺後其序自然如此傳於漢廣言文之化由近而逺即此意又乾一坤二亦此意命謂貴賤之命孔子曰不知命無以為君子夫人以后妃之徳化衆妾以夫人之徳感能知命而安之故有以定其心而不為怨欲之所動興取字相應前漢廣已然傳於此𤼵例後當以此類推之江有汜之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌以一句興二句又以彼形此故傳以猶字乃字釋之取義興之一例也汜渚沱一意取叶韻以起下文耳江為南方流水之通名沱則江之别名凡水由江出或入江者皆曰沱南方江水中多有不特江陵漢陽之間有此也又不必為媵妾所居之地凡所聞所見所經行皆可取以起興始言悔中言處末總言嘯且歌悔而未遂則嘯相安而樂則歌相安而樂則非徒悔矣然其始何以能悔哉婦人之性最未易開悟者今乃能悔而非為人悔可謂至難故媵首言之推厥所自豈非樛木螽斯之化哉觀小星見夫人衆妾之性情觀江有汜見大夫妻妾之性情可謂名得其正矣野有死麕白茅包之有女懷春吉士誘之林有樸􅈪野有死鹿白茅純束有女如玉舒而脱脱兮無感我帨兮無使尨也吠按此篇永樂大典缺卷何彼襛矣唐棣之華曷不肅雝王姬之車何彼襛矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫何問辭應在下句首以何起辭宋玉九辨相如長門賦皆用之末章倒用何字變文之法也曷不猶言豈不也肅雝本言車中王姬而曰王姬之車不直指王姬尊敬之也王姬平王皆追稱也以孫子子孫互言反覆咏歎以美之也首次章首以興對舉次末章下以事對舉詩體也湛露詩亦有此體竊謂此詩武王時詩人追述文王為諸侯時以世子武王女嫁諸侯之世子而美之也女子能執婦道以成肅雝之徳久而人猶師法之至武王有天下之後詩人欲化天下以婦道故追述其初嫁時事以美之亦如甘棠作於武王時追述文王時召伯布教之事而歌之也所以知詩作於武王時者以其言王姬平王也蓋追稱之也所以知文王為諸侯時者以其平王對齊侯文王非實王也所以知武王為世子者詩不稱女而稱孫文王以諸侯為婚主也文王既追稱王則孫亦追稱王姬也所以知為諸侯世子者不稱齊侯而稱侯之子子者侯嗣也稱肅雝故知其化天下古人稱徳不必多也兩取桃李絲緡為興故知其為初嫁時事闗雎鵲巢桃夭皆美女子於初嫁時碩人閔莊姜之不見答亦追述其嫁時之盛蓋詩稱美婦人女子體如是也甘棠稱召伯何彼襛矣稱王姬同作於武王之時同為咏文王時之事故皆得列於召南之中以甘棠例之則何彼襛矣當為追述文王時事之詩以何彼穠矣例之則甘棠既作于武王之時當與何彼襛矣同列于召南之末今甘棠既揭居前以表召南之義而此詩不移者蓋又欲以騶虞並為麟趾之對而為召南之終也説見後篇彼茁者葭壹發五豝于嗟乎騶虞彼茁者蓬壹發五豵于嗟乎騶虞此詩專詠諸侯之仁葭豝見其及物騶虞見其本心本心之仁推行有序親親而仁民仁民而愛物者序也由本心之仁推行已及於物則其親親仁民不言可知矣狀仁之全莫善於此詩人因春田以發詠彼茁者春也一發者田也見草木之茂則以葭蓬詠之見禽獸之多則以豝豵咏之見其仁心自然非由勉强則以騶虞咏之舉葭蓬豝豵而天地萬物與吾一體之意已可想而又再三歎騶虞以咏本心不惟見諸侯之仁又因以見文王之化又且使人油然感發真可反求而自得其本心焉厯觀詩三百篇言仁未有如此篇之善形容者故取及物為召南之終而又用之為天子之射節歟騶虞首章叶則音牙後章叶則音五紅反與乎叶則本音一字三叶韻若合後則重韻為韻一詩而用韻之例四麟趾見文王后妃子孫宗族之仁厚何彼穠矣見文王后妃孫女之肅雝言化不特被當時而且及後人矣麟與騶虞皆王者之瑞一彼一此言此不特及人而且及物矣子孫孫女以人而類麟與騶虞以物而類麟趾兼二義此二詩各一義故合二詩對麟趾為鵲巢之應為召南之終又合二南為闗雎之應以見文王天下漸平之實而其徳可法如此云傳謂鵲巢猶周南之有闗雎采蘩猶葛覃草蟲若卷耳竊以此意推之謂采蘩采蘋猶葛覃草蟲若巷耳小星江有汜猶樛木螽斯行露猶桃夭而甘棠羔羊猶兔罝摽有梅猶芣苢野有死麕若漢廣殷其靁若汝墳何彼襛矣騶虞若麟趾蓋内以是施之則外以是應之上以是行之則下以是效之故二南諸詩相似而相對有乾統坤承之義焉然其相似者不必真相似相對者不必真相對又有乾一坤二乾純坤雜之義焉皆可以意觀之
