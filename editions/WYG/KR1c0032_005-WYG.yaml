body:
  text: 詩纘緒卷五元劉玉汝撰王彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉以黍離為賦者謂故宗廟宫室全不見而所見惟此耳然不言所不見惟言所見則故都興亡盛衰之感皆在黍稷二語而有無限悲愴之情矣故因以興下文行邁心憂之意然不言所憂為何事則憂之深既嘆時人莫我知又傷所以致此者何人而不言其為誰則怨之至於是黍離之悲有言不能盡者矣故下文四句三章不易其辭以深致其憂怨焉言有盡而恨無窮其是詩之謂矣元城之說亦詩人之一意然詩之興有隨所見相因而及不必同時所眞見者如此詩因苗以及穗因穗以及實因苗以興心搖因穗以興心醉因實以興心噎由淺而深循次而進又或因見實而追言苗穂皆不必同時所眞見如桃夭因花以託興其時未有葉與實特因華以及之此乃作詩託興之一體也然元城之說得君子忠厚之意故傳取焉君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸雞棲于桀日之夕矣羊牛下括君子于役苟無飢渴曷至哉言其去時曷其有佸言其歸日來會雞與牛羊皆畜於家者故日夕之際其棲其來皆家人所常見以此動念而嘆其君子之不如又一再言之其所思可知矣首章言如之何勿思思之故不能己末言苟無飢渴則憂之深而思之切矣如之何勿思述已之思苟無飢渴述君子之苦婦人主中饋故以君子飢渴為念而行役勞苦尤以飢渴為患故以此為憂然所思所憂止於如此亦情性之正也兩言君子于役一起一末每章兩言思之至也又按此詩所謂君子未見其為大夫大夫固有行役庶人亦有行役君行師從卿行旅從士庶人豈無行役者乎當以伯兮例釋之伐冰之家不畜牛羊詩言牛羊猶可以為所見不必所畜然以下篇安於貧賤觀之則此所謂君子似不必為大夫又况士庶人之家人能是尤足以見王國之風君子陽陽左執簧右招我由房其樂只且君子陶陶左執翿右招我由敖其樂只且此君子即前篇之君子又二篇詞氣相似故傳疑亦前篇婦人所作陽陽志之得樂則心之樂其樂只且詠歎之也古者十三學樂誦詩成童舞象二十舞大夏樂無間於貴賤人皆得習而用之此篇樂舞非用之公庭非用之宗廟蓋親執而行於閨門之間故知其為貧賤又或隱為伶官亦貧賤也左執右招有和樂自得之意古有房中之樂婦人諷誦以事君子敖亦必房中之舞位房在堂之東北故又曰東房國風以修身齊家為主王風二篇之婦人其賢如此歎美其夫又如此則此君子其亦有得於修齊之道者歟以此而觀王風之始何嘗不美文王后妃之餘化周公治洛之餘澤何嘗不存故傳謂豈非先王之澤而說者乃謂王風之變乃商頑餘俗是徒見王風之末而不究王風之始使先王之澤人莫知之而欲修身齊家治國者謂世已衰而不復用其力豈足與論詩哉衞鄭齊唐之風皆當以是觀之揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月予還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月予還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月予還歸哉戍申者作此詩其意唯怨戍申而并言戍甫戍許者蓋甫許皆申同姓作者借用叶韻以述其再三思歸之詞非實戍甫戍許也蓋甫侯今不知其何名又不知其國何在崧高本美申伯甫無與焉而亦及甫并稱其來已久周人習聞而嘗誦之故戍申者本非戍甫戍許而亦因及甫許焉申為平王之母家許雖與同姓而異國又非實母家平王何為遣兵而亦戍之乎以是知此詩不過借以叶韻而致其再三之詞而已詩有此體也懷哉韻叶三哉字亦重韻上述其事下述其情情不能盡而嗟嘆之蓋戍者之情政見於此不然何以見其怨之深耶詩有揚之水凡三篇其辭雖有同異而皆以此起詞竊意詩為樂篇章國風用其詩之篇名亦必用其樂之音調而乃一其篇名者所以標其篇名音調之同使歌是篇者即知其為此音調也後來歴代樂府其詞事不同而猶有用舊篇名或亦用其首句者雖或悉改而亦必曰即某代之某曲也其所以然者欲原篇章之目以明音調之一也如上之回公無渡河遠别離之類多以此而推則詩之三揚之水其篇名既同豈非音調之亦同乎况此三篇用其首句者一用首次二句者二苟非當時有此篇章之詞音調之譜何為小異大同若是邪若二甫田一比一賦二谷風一言夫婦一言朋友朋友夫婦皆以義合故皆取此蓋託興以興辭然其音調則一風一雅相去懸異也二白華雖同小雅而一正一變有詞無詞亦相去懸異也二明二旻之有小大在小雅者則曰小明小旻在大雅者則曰大明召旻蓋當時篇名偶同而音調各異太師恐其無辨也故以小大分之使大小二雅之音調不至於相混然則篇名同音調異又同在雅而雅有大小則不可以無别篇名同音調同又同為風則篇名不必易若篇名同音調異而在風在雅有詞無詞相去懸異者則亦不必分别而自明矣詩以樂為主其音調今雖不存而有可推者亦豈可不論哉中谷有蓷暵其乾矣有女仳離嘅其嘆矣嘅其嘆矣遇人之艱難矣中谷有蓷暵其脩矣有女仳離條其歗矣條其歗矣遇人之不淑矣中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣此亦當云賦而興賦者謂賦旱暵之蓷興謂以彼之暵乾脩濕興此之仳離嘅泣其例當與黍離同上一句皆不易下句之乾脩濕嘆歗泣由淺而深取興之意為多故止言興歟仳離由相棄背故嘅嘆至於啜泣者怨也然相棄背由其人之艱難不淑而已適遇艱難不淑者其人之不幸而遇其人者已之不幸也故怨而無過甚之詞夫艱難不淑皆將不免於死亡然離嗟何及其窮已甚而有無可奈何安之若命之意尤足見其厚之至至此而謂成王周公治洛之餘澤無復有存者豈不厚誣也哉范氏之說專責在上在上而能養其民豐年有蓄積之備凶年有賑恤之政則民雖遇艱難而無流離之苦矣今夫婦之衰薄皆以凶年之故則在上之政可知矣然當此之時成周之風俗非不厚也成王周公之徳澤又非不存也使平王而能奮興為治何患號令之不行於天下哉而委靡怠慢坐視其民而不知救是眞可嘆也矣范氏又謂一物失所而知王政之惡一女見棄而知人民之困愚謂斯言亦讀詩之法也蓋聖人刪詩教人垂之萬世所以存三百於三千者其擇之也精矣故一代之政有以一國而見一國之風有以一詩而知一詩之所關係有甚重者讀者固不可以平易而艱險求之亦不可以簡短而忽慢視之要當以夫子春秋謹嚴之法求夫子刪定詩書之意凡讀詩必先字求其義句求其解章求其法合各章以玩一篇之意會諸詩以觀一國之風既得於心然後吟哦上下揄揚反覆以玩其味焉則所以嗟嘆咏歌之妙眞有非言之所能喻者矣有兔爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有兔爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺有兔爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰西周之盛為宣王時歴幽而平其人若非耄老亦必中歳以上已衰之年矣身逢多難已不可堪况猶及見其盛時者乎既經幽昏復逢平弱其間禍亂何所蔑有謂之百罹非過言也老成忠貞之士視之無可奈何亦唯欲死而已蓋當時之禍亂已不忍見而東周之中興無復可望雖生亦何樂哉觀此與前詩見周之不復能西也決矣緜緜葛藟在河之滸終遠兄弟謂他人父謂他人父亦莫我顧緜緜葛藟在河之涘終遠兄弟謂他人母謂他人母亦莫我有緜緜葛藟在河之漘終遠兄弟謂他人昆謂他人昆亦莫我聞世衰民散而終遠兄弟非得已也謂他人父尊之也謂他人母親之也凡吾所以尊之親之若此者庶乎人之以子顧念我也此既不可得則又有以兄事之者庶乎人之或以弟友我也而亦邈然如不聞也則其窮亦甚矣然其所以然者或以世道衰而情義薄或以家蕩析而財力微然皆足以見民之流離失所者所在皆然矣彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三歲兮淫奔者託以行彼指其地而言不見則指其人而言託言往彼采葛因其人不見而思念之三章語有淺深大車檻檻毳衣如菼豈不爾思畏子不敢大車啍啍毳衣如璊豈不爾思畏子不奔穀則異室死則同穴謂子不信有如皦日大夫之私邑有欲淫奔者畏大夫之刑政而不敢大夫可謂賢矣惟私邑之人獨然則王國之民其敢者多矣王朝非無大夫而有政刑者惟此私邑之大夫則王朝之無臣可知雖或有之而不得以行其政刑可知矣夫王非無賢大夫也王國之民亦非無羞惡之心也而善邑治者不得施於國善國治者僅得施於邑則國人之不幸有不如一邑之幸矣此誰之咎哉使王果能盡得賢大夫而用於王朝則轉移之機雖由邑而國由國而天下可也豈患二南之遠哉然二南之化雖遠而大夫猶有賢者豈非成王周公治洛之澤猶有存乎丘中有麻彼畱子嗟彼畱子嗟將其來施施丘中有麥彼畱子國彼畱子國將其來食丘中有李彼畱之子彼畱之子貽我佩玖王國之風至是蕩然矣婦人固不知恥男子尤不知恥至以珍寳與淫賤則尤甚者也夫君者國之主夫者家之主婦人之淫固本於上之無政尤本於家之無法故夫不正則婦不正家未有不敗國未有不亡者也故此詩足為婦女戒尤足為男子戒其所以正其本者至深切矣鄭緇衣之宜兮敝予又改為兮適子之館兮還予授子之粲兮緇衣之好兮敝予又改造兮適子之館兮還予授子之粲兮緇衣之蓆兮敝予又改作兮適子之館兮還予授子之粲兮按此篇永樂大典缺卷將仲子兮無踰我里無折我樹杞豈敢愛之畏我父母仲可懷也父母之言亦可畏也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也此鄭風變淫之始也鄭首緇衣俗非不美至是始變為淫而女子猶知所畏而不敢夫女子居家未有不畏其父母若兄者也然猶有狎恩恃愛而軼出防閑之外者况於外人豈復有所顧忌哉今女子之動於欲者於家之内外皆知所畏而不敢則本性之善羞惡之心未嘗亡也且謂人之多言則鄭國之譏淫惡惡者尚有其人國人亦畏而不敢者宜不少矣豈獨將仲子之女子哉使當時之有國有家者縱不能制其未然而於此將然者能閑之以嚴臨之以莊導之以善而帥之以正使婦人女子皆知所以自克則猶可及止也而鄭不能然可勝惜哉叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野巷無服馬豈無服馬不如叔也洵美且武知此篇為段作者以下篇而知之又段不義而得衆故也傳又疑為民間男女相悅之詞者伯叔自稱閭巷居卑居人輩賤飲酒意䙝也又民間亦有田獵之事而此詩又在將仲子之後也叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉襢裼暴虎獻于公所將叔無狃戒其傷女叔于田乘乘黄兩服上襄兩驂鴈行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌叔于田乘乘鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌二叔于田皆為共叔而作而傳於前篇又疑為民間男女相悅之詞愚意謂鄭民間舊有此詩篇名曲譜民常歌之至是以叔之名同田之事又同故遂用之既仍其篇名又依其音調即項氏所云以其篇名之同義類之似而取其音節以為詩朱子所謂變風變雅者變用其腔調又謂大雅小雅如今之宫調商調作歌曲者亦按其腔調而作耳又謂按大雅體格作大雅按小雅體格作小雅非是做成詩後旋相度其詞而為大雅小雅也以是而推之則風雅詩篇題之同者亦必按其腔調為之耳大叔恐二叔于田所咏之人不辨故特以大而别之歟不然則又或者以文辭曲譜之長短為篇異故加大以别之歟不然均稱為叔于田何不可而必欲如是耶田獵以車馬為用射御為能故鄭人之愛大叔者惟以此稱譽之于田首舉其所事在藪特言其所在藪獵最便馳射而火田為尤盛故于田在藪對舉言之首章不言射而先稱其襢裼暴虎此大叔之所能衆人之所喜者既誇之復戒之皆小人愛人之情也二章末四句射御互言文法也補傳云磬謂使人曲折如磬控謂控制不逸抜括也矢銜弦處覆例也彇與簫同弓弰也愚謂騁馬則折身如磬故曰磬末章首三句專言射尤以射為精故以此見獵將畢以結此篇忌字抑字有嘆咏意故見其從容整暇於始終焉極稱射御而亦曰喜其無傷之詞者見此篇所言皆小人之愛耳清人在彭駟介旁旁二矛重英河上乎翺翔清人在消駟介麃麃二矛重喬河上乎逍遥清人在軸駟介陶陶左旋右抽中軍作好久外無聊相與游戲固有將潰之勢矣然使主將加之嚴威猶或可止而中軍之游戲亦復如此則其潰也必矣詩有刺有諷而為將為君者不顧此所以危也此詩有三意一見士卒將潰二見潰由中軍三見中軍由鄭伯處之不善然不言必潰而憂其將潰之意自見則聞者烏可不早制之乎此詩人所以善詠也詩雖危之而鄭終棄之此春秋所以責鄭也羔裘如濡洵直且侯彼其之子舍命不渝羔裘豹飾孔武有力彼其之子邦之司直羔裘晏兮三英粲兮彼其之子邦之彥兮洵直且侯言羔孔武有力言豹三英言裘命指理以立心言直指事以行義言心安於天理而後義見於行事處已事君之道於是乎全彥兼舍命司直而以美士稱之所以結也鄭有賢大夫而不救其俗之淫然鄭既淫矣乃幸而後亡其亦以尚有賢大夫故歟觀左傳所載可見遵大路兮摻執子之袪兮無我惡兮不寁故也遵大路兮摻執子之手兮無我魗兮不寁好也義理之心為情欲所蔽故失其羞惡之眞此婦所為乃眞可惡可醜者乃不自知而欲以情好奪之使去者果為始迷終悟之人固非此語所能留也况以人心之天理言始不以正者必無善終以聖賢之禮法言則婦之淫者在所必去故禮有七去一曰淫去既不能去則棄而去之庶幾人知謹始改過而婦人之動於欲者其亦知所懼哉女曰雞鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳧與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之詩人述夫婦警戒之詞而婦人之詞為多蓋夫能警戒常事不足為美惟婦人能之所以可稱詩人欲表而出之故首述女曰次述士曰然後轉詳婦詞以見婦先夫戒夫戒過之而女之戒又過之然後婦之賢益著故此篇述婦之詞始終詳備而首三句尤極曲折所以提一篇之要者此詩人措意行文之工者也子興以下意極警戒而詞致和柔弋鳧與鴈而曰將翺將翔主饋飲食而期與偕老至謂琴瑟莫不靜好蓋樂以和為本而和又本於人人和而物無不和皆情正理到之詞也婦人之情喜宴昵而好吝嗇首章既見其無私昵之情末章尤見其無吝嗇之性所以為賢有當贈送者有當問遺者有當酬答者六句不惟見其相夫親賢不愛服飾且有勤厚周密各宜所施之意詩人之善詠也當此之時鄭俗已淫而未嘗無賢婦人蓋風俗美惡從其多者耳然君子不沒人之善於此亦可見有女同車顏如舜華將翺將翔佩玉瓊琚彼美孟姜洵美且都有女同行顏如舜英將翺將翔佩玉將將彼美孟姜德音不忘有女泛然之稱乘車佩玉蓋貴者有泛然之女子與之同車同行翺翔而佩玉又歎彼孟姜美且閑雅而賢蓋既與此同復歎彼美同情而相稱羨如此也婦之淫者有外為閑雅之態使人望之若不可近慕之若不可得者此最惑人之甚者也其稱為賢亦淫者之所賢耳徳音言語也觀其態則閑雅聞其言則使人不可忘而相與賢之人安得不為所惑哉此不足錄而太師錄之聖人存之其為戒也深矣山有扶蘇隰有荷華不見子都乃見狂且山有橋松隰有游龍不見子充乃見狡童此與下篇皆興體此篇借彼以形此意有抑揚下篇借彼以明此只是平說婦人以正為主戲謔非正也以不正之詞相加而所答之詞亦不正矣非惑焉有是哉所以深戒之也後狡童倣此蘀兮蘀兮風其吹女叔兮伯兮倡予和女蘀兮蘀兮風其漂女叔兮伯兮倡予要女按此篇永樂大典缺卷彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮不能食息非眞不能故傳曰未至子惠思我褰裳涉溱子不我思豈無他人狂童之狂也且子惠思我褰裳涉洧子不我思豈無他士狂童之狂也且狂狡之稱雖出謔言然知恥者亦不受也惟自處以正則淫自遠而無此狎侮矣子之丰兮俟我乎巷兮悔予不送兮子之昌兮俟我乎堂兮悔予不將兮衣錦褧衣裳錦褧裳叔兮伯兮駕予與行裳錦褧裳衣錦褧衣叔兮伯兮駕予與歸錦衣駕車必富貴之家衣錦而欲人以車迎其亦衞氓車來遷賄之意乎氓詩悔而怨此悔而不改者情慾之蔽於是乎深此鄭風所以甚於衞也東門之墠茹藘在阪其室則邇其人甚遠東門之栗有踐家室豈不爾思子不我即此當為女惑男之辭風雨淒淒雞鳴喈喈既見君子云胡不夷風雨瀟瀟雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜疑此篇即前篇思而未得見者今得見之故喜之也夫當風雨晦冥之際雞鳴夜半之時而與其人相見豈禮之正哉思而未得見則稱子既見而稱君子蓋一見而即夫之矣習俗之薄惡如是使此人知魯男子之義豈肯為是哉青青子衿悠悠我心縱我不往子寧不嗣音青青子佩悠悠我思縱我不往子寧不來挑兮達兮在城闕兮一日不見如三月兮先嗣音而後來此古人所以内言不出外言不入深宫固門閽寺守之而必致其謹也有家者可不戒哉揚之水不流束楚終鮮兄弟維予與女無信人之言人實迋女揚之水不流束薪終鮮兄弟維予二人無信人之言人實不信離間之人亦必婦人也女女重韻為韻出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員出其闉闍有女如荼雖則如荼匪我思且縞衣茹藘聊可與娛樂我自樂也與娛與家人同樂也衆人皆好彼而我獨好此故曰自好自好而有得於身心則不為習俗所移矣夫當淫俗大行之時而已之家人獨能安於貧陋者豈家人所能自為哉由已能安於貧陋所思不在彼而所樂惟在此也心不在彼身惟安此於是家人亦相與安之我固聊可自樂而家人亦聊可與同樂焉聊者自卑之詞詞雖自卑而實過於人也遠非有得於身心者能之乎故正心脩身齊家之道人皆知驗之於治平之時而不知行乎衰亂之世其效尤可驗也人亦何苦不自立而失其所可樂者哉野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧有美一人男子婦人可通稱故傳止言男女相遇也溱與洧方渙渙兮士與女方秉蕑兮女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥此與前篇皆賦而興即賦其事以起興也賦無興者也說見漢廣此與前篇作者或士或女皆未詳但此篇首尾述士女中述女要男之詞末復述相贈之情曲折詳傋方以為樂而不知其非鄭國之淫風於是乎極矣故以二篇終焉
