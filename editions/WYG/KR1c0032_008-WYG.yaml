body:
  text: 詩纘緒卷八元劉玉汝撰檜羔裘逍遙狐裘以朝豈不爾思勞心忉忉羔裘翺翔狐裘在堂豈不爾思我心憂傷羔裘如膏日出有曜豈不爾思中心是悼逍遥翶翔互見以朝在堂亦互見専舉羔裘亦兼見狐裘逍遙翺翔見其不自强如膏有曜見其好潔耳互見例與伐檀同三章末二句意一辭異庶見素冠兮棘人欒欒兮勞心慱慱兮庶見素衣兮我心傷悲兮聊與子同歸兮庶見素韠兮我心蘊結兮聊與子如一兮不見而願見故曰庶見首以素冠棘人並言後章止言素衣素韠不言棘人而棘人自可見後章承前例多如此減棘人一句而增同歸一句增損文法也不見則傷悲蘊結庶見則與子同歸如一愛慕之愈甚也孝子之事親養則致其敬喪則致其哀乃良心天理自然而不能已者聖人之制喪禮亦因其自然而為之中制非以强世也故三年之喪過之者固非而不及者尤不可也後世教衰俗薄人或喪其良心不肖之不及者或不知執親之喪則天理或㡬乎滅矣此其世道為何如哉檜國之君子自能執喪矣人之不能者於已何與而發於言者君子錫類之心也且天性之親一也人心之理同也初何彼此之間哉故未見則願望之庶見則愛慕之示之以悲傷願愛之情使人諷誦而此心之天三年父母之愛皆將自有油然而生者豈不猶足為世道之願幸也歟隰有萇楚猗儺其枝夭之沃沃樂子之無知隰有萇楚猗儺其華夭之沃沃樂子之無家隰有萇楚猗儺其實夭之沃沃樂子之無室此全篇興體也與罝同此體惟此二篇耳葢此詩本詠政煩賦重已不堪其苦因見萇楚而嘆已之不如言萇楚則無知已則有知而憂萇楚則無家無室已則有家室而累詩之所言者全只是長楚耳已之有知有家室之意猶在所言之後故曰全篇興或曰如此則當為比曰取物為比則全不言所事曰比今以彼之無知無家興此之有知有室所興之物與所詠之事相應不得以為比故曰全篇興家室皆累而累心為重故先言無知枝華實以有一為實見遂取以詠蓋華實非同時與桃夭黍離同興之體也匪風𤼵兮匪車偈兮顧瞻周道中心怛兮匪風飄兮匪車嘌兮顧瞻周道中心弔兮誰能亨魚溉之釡鬵誰將西歸懐之好音檜小國也君子不思自治其國而憂周室之陵遲不亦迂逺乎天下者周之天下也天下之不治由周室之不治也周室而既治天下寧憂不治乎而况于檜乎故匪風之思治非思檜治也思周治也非思周治也思天下治也此君子知世道之極而尤知治道之本他國所少有也又邶以下分五方之國以形天下之風而檜曹之所思者乃天下之治正與五方之變風相關蓋合變風而終之且以見變之可正此匪風下泉所以終檜曹檜曹所以居變風之終也程子陳氏之説備矣説見于後曹蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閲麻衣如雪心之憂矣於我歸説愚謂蜉蝣之羽一句比比不能久存也衣裳衣服平居所服而有鮮華之飾信可喜也麻衣弔服而有明潔之色亦可觀然此乃其細耳至於脩身之大道處事之逺謀則無有也是此人之衣此衣者特蜉蝣之久耳豈不甚可憂乎於我居處者欲常得以言誨而身教之也忠愛之意也舊説以為好奢蓋常服既鮮華弔服亦明潔過於常制者皆奢也國中而有此非奢乎時人猶且不可况國君乎彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服維鵜在梁不濡其咮彼其之子不遂其媾薈兮蔚兮南山朝隮婉兮孌兮季女斯飢首章以彼人之所執興此人之所服隠然見彼宜此弗稱然未顯言故傳以何哉二字起次章三章託興興詞乃明言其不稱謂不稱赤芾其字指首章赤芾言末章乃取物為比言小人氣盛君子道窮則此詩刺逺君子近小人之意昭然矣鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其弁伊騏鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年在桑見母之專一七見其子之衆又見其子所在不一而其母飼子子仰食皆平均如一焉梅棘榛隨下文變以叶韻耳儀一心結從表說向裏由外以知内容貌為德之符也首章言儀與心次章承上儀一心結而極言其服稱徳以詠嘆上文之心與儀三章不復言心止承上言儀而美其正四國末章又不復言儀止承上言正國人而祝願其壽考其言先後相遞如升階上進一級則下退一級作詩之一法也衞終風詩近之冽彼下泉浸彼苞稂愾我寤嘆念彼周京冽彼下泉浸彼苞蕭愾我寤嘆念彼京周冽彼下泉浸彼苞蓍愾我寤嘆念彼京師芃芃黍苗隂雨膏之四國有王郇伯勞之關雎興兼比而止曰興此比兼興而曰比而興發例也他詩前比後興者當云比而又興不可與比相混說見漢廣春秋之時王者之號令不行於諸侯矣小國之困弊皆由霸主大國不見恤周焉得而病之今曹之君子不堪其困而思周周其果能振曹乎夫子曰吾其為東周乎蓋欲興周道於東方也東方之周未嘗不可興而謂其不復可西者豈其然乎蓋惟王室陵夷而後大國放恣小國困弊使東周之君臣復有如文王郇伯者為之則天下將皆受其賜豈獨曹哉此所以思周也説見檜風豳七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜七月流火九月授衣春日載陽有鳴倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纉武功言私其豵獻豣于公五月斯螽動股六月莎雞振羽七月在野八月在宇九月在戸十月蟋蟀入我牀下穹窒熏鼠塞向墐户嗟我婦子曰為改歲入此室處六月食鬱及薁七月亨葵及菽八月剝棗十月穫稻為此春酒以介眉壽七月食瓜八月斷壺九月叔苴采荼薪樗食我農夫九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百穀二之日鑿冰沖沖三之日納于凌隂四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬壽無疆七月之詩周公陳先公之風化乃公劉治國國治之事也成王為世子周公相武王以叔父為成王師以為成王天子之儲貳雖未有天子之責亦不可不豫教以治國之道而治國已然之迹莫如公劉治豳為最顯固於成王為易知而周家以農開國稼穡艱難之務尤於成王為所當先知者故作是詩然是詩所陳雖為治國之事而所以格物致知誠意正心修身齊家之道隠然全具於其中蓋詩中所言天時地利民情國法者事物之理也至誠惻怚憂勤忠愛者身心之事也男女正位父父子子夫夫婦婦一家之道也衣食耕桑狩獵祭飲者一國之務也其言雖専陳其風化而其意實欲以進君徳故七月一詩上述先公風化之迹下寓世子教學之法外見王業基本之𢎞内備聖學工夫之細詩以永言瞽以諷誦使人易於感發而樂於聽受此周公所以為善教善戒也七月九月一之日二之日天時也流火天象也觱發栗烈天氣也南畝地利也授衣于耜舉趾同饁民事也月用夏正日用周正官述田畯國制也無衣同我而下皆人情也何為以人情言風化以民俗見民俗以人情見也蓋人君理人之道本諸身者為化施諸事者為政行乎人者為風一人感之而為情衆人習之而為俗故觀人情而後民俗可知觀民俗而後風化可驗七月一詩欲以民俗見風化以人情見民俗故每章推舉民事而必以人情終之七月流火三之日于耜先時而豫也授衣舉趾同饁及時而勤也豫而勤者民俗之厚也無衣卒歳見一已之情同我婦子見一家之情至喜見上下之情田畯之至惟有喜之而已民自用力不待督責也此章前段言衣之始後段言食之始首章有此體也首章總言後章至末章分言以終此章之意惟長篇有此體也次章起語復用首章二句三章只用一句而前意備具詩多此體也春日天時也夏正二月之春也載陽遲遲天氣也或以遲遲為三月非也二月蠶已生故求桑採蘩皆當為二月倉庚桑蘩物理也執遵求采民事也女心傷悲見父母之親男女之别夫婦之義上下交相忠愛之情後章皆放此推之蠶月或以為三月今以前采蘩推之則條桑當為二月萑葦鳴鶪豫也條伐勤也載績為裳勤而成矣𤣥黄總言蠶績自秀葽至隕蘀之時已憂不足以禦寒豫也于取纉獻勤也後章皆當放此推之竭作盡起衆往也分為裘獻豣為兩段變文也又見無已之愛斯螽莎雞蟋蟀同物而異名者隨天時以為氣候也舉蟋蟀於四句之中又八字一句者變文也十月而曰改歳周正也首章卒歳用夏正此改歳用周正吕氏謂三正通于民俗尚矣周特舉而迭用之愚按唐虞有夏皆以寅為正朔而甘誓云怠棄三正以是責有扈則當時三正之用不特民俗矣商正建丑而月數仍寅則商亦兼用商正夏正也公劉國於夏商之間其所用當時之正朔雖不可知然以豳詩逆推之則其國民俗已用子紀候特未有時王用之耳至周有天下遂用之為一代之制然周官所紀正月者周正也正嵗者夏正也是周亦兼用三正也夫子作春秋因魯史用周正而書之然當時魯晉史官多言夏正夫子未嘗見譏杞國猶存夏時夫子見取而詩三百篇周詩皆用夏正夫子亦未嘗見刪也吕氏所謂周特舉而迭用於此尤為可證夫三正通行逺稽唐虞近考夏商猶皆用之况周監二代者乎周有天下頒厯授時雖尊一代之正朔然周官法度王朝典禮猶兼三正况諸侯乎又况豳當夏商之時處逺僻之地用子紀候夫何疑乎又况七月之詩兼用三正而陳之天子播之聲詩則當時後世有不然乎是則迭用三正不特豳也且不獨周矣且三代更王必新制度正朔雖重而三正不棄其立法甚寛也觀於周禮與詩皆可見自夫子作春秋書王正説者推明大一統之義而後正朔至重而立法甚嚴夫正朔之法固重且嚴矣然乃以夫子所書一代之制例視三代之法是知春秋於既作之後而未究春秋未作之前愚未見其説之可以盡也春酒之春夏正建寅之春也篇中言春者三載陽遲遲皆為二月之春則春酒為夏正之春可知謂之春酒者至春而成也以介眉壽豐於老者之情食我農夫儉於少者之情隨時用物而有節可互見焉築納既同治田之終事入執宫功治室之始事未及乗屋之終又思播榖之始所謂始終農事者如此此篇皆見農事憂勤艱難而此章尤見其極耳見始終之意吕氏之説盡之納稼無麥此統言農事之終故并以麥言二我二爾自警戒也沖沖非貌非聲而曰意見人情也當涸隂沍寒之時而鑿氷之人有沖沖之意則納冰開冰之競勸可知預戒於九月速畢於十月曰以下皆民自相謂之詞觀二彼字可見勸役見民之忠稱壽見民之愛而有甚意秀葽章終首章前段以夏正周正言鑿冰章終首章後段以周正夏正言皆與首章相應末萬壽結詞也籥鼓見豳樂之器擊吹見豳樂之聲逆暑迎寒祈年國蜡見豳詩之用周公作此本以戒成王而又用之於祭祀皆周公制作時所定也當此之詩謂之豳未有諸國之變風而列於二南之後正雅之前者體同國風而用同雅頌故也其體則大師辨之其用則籥師掌之瞽矇誦之其重如此豈變風諸詩徒存肄而備觀省者所可同哉此豳詩之用最為可據者若作者之意則所言至近而所包甚廣非聖人不能也鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯迨天之未隂兩徹彼桑土綢繆牖户今女下民或敢侮予予手拮据予所捋荼予所蓄租予口卒瘏曰予未有室家予羽譙譙予尾翛翛予室翹翹風雨所溧搖予維音嘵嘵詩有全篇興有全篇比此篇只為鳥言呼告鴟鴞之詞全不説出所事故曰全篇比與螽斯伐柯同鴟鴞比武庚子比管蔡室比王室恩勤鬻閔比情愛篤厚次章比已預備患難三章比已勤勞皆前日事末章予室翹翹以比今日事維音以比作詩此篇見周公之心忠於王室用力極勤成王天資極髙受教日久服除難平而學問益進故一見公詩即知公意雖公未即歸輔已而亦不敢誚公又適當雷風之變啟金縢之書遂感泣謂周公嘗以身代武王之病則小子親往迎之以歸禮亦宜也遂出郊而迎周公焉説見後鄭箋引書以辟為避居于東蔡氏釋書取之蔡氏説經朱子訂定今朱子詩傳乃不取鄭箋而從書孔註以辟為誅辟説不同皆朱子所取然語録尤以誅辟為長則讀詩者當從詩傳可也此篇各章前後上下句長短不齊第三章五予而一加曰字末五句四予變文法也或兩句易韻或一句無韻或句句有韻用韻法也我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋烝在桑野敦彼獨宿亦在車下我徂東山慆慆不歸我來自東零雨其濛果臝之實亦施于宇伊威在室蠨蛸在戸町畽鹿場熠燿宵行不可畏也伊可懷也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室洒埽穹窒我征聿至有敦瓜苦烝在栗薪自我不見于今三年我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何章首四句每章重言有與下文意相關涉者有似相關涉者有全不相關涉者盖後章用前章首句以起辭如七月伐木之類詩有此體也但有用一句或二句者此則用四句又是一體也前二章言始往久外將歸在塗未至之事故有悲傷之情後二章言既至之事故極喜樂之意行役雖有始往久外將歸在途未至已至六者然人情大端不過憂喜二者而已今東山之詩深體其情曲盡其意而備述其事真如身厯而親見之者所以能感人心也末章所謂舊即上章有室家者也東山勞還詠新昏而以倉庚興出車勞還詠執訊獲醜而以春日卉木為賦皆極形容不歸無韻合下章重韻為韻既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休此篇一見周公之心二見軍士皆知周公之心三見周公之心明白正大軍士知而信之皆能以周公之心為心其所以能心周公之心者以能知大義云爾知大義則知周公之為此舉所以為四方也所以哀我民也我雖破斧缺斨乃義之所當然也故不惟無怨且樂為之死以是答公之勞已非真知義乎然非公之心有以感其心不能也此篇三章一意惟變文叶韻耳語再三而意深逺此下數篇舊説從序極辭費集傳平易明白真可以見天地聖人之情伐柯如何匪斧不克取妻如何匪媒不得伐柯伐柯其則不逺我遘之子籩豆有踐用二事正説覆説以比一事而一事之二意備見又是比之一體非傳則此意不明蓋舊説以之子指周公與九罭同故其説牽强今以之子指妻為比比體既定而詩意涣然矣或疑同牢之禮無籩豆此以詞害意也九罭之魚鱒魴我覯之子袞衣繡裳鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿是以有袞衣兮無以我公歸兮無使我心悲兮前一章言周公在東二章言公將歸専為將歸而發故再言之在東託興於罭魚將歸則託興於渚鴻興有隱然相涉者此類可見袞衣承首章公歸承次兩章而終以一句乃詩之本意也蓋伐柯九罭二詩為周公在東之始終始見東人得見公而喜終見東人聞公將歸而悲東人之悲喜如此自非深知公之心敬公之德感公之恩而重公之望何能如是哉夫東人非不知公之歸相成王將大惠天下東人亦與受其賜而敬愛眷戀之私情自有不能已者然則此詩之作豈非周公東方之甘棠也哉狼跋其胡載疐其尾公孫碩膚赤舄几几狼疐其尾載跋其胡公孫碩膚德音不瑕愚嘗於成王疑周公之事不能無疑嘗考其説而未知所自竊以為三代之事可據而信者惟經與傳耳今詩豳風書金縢皆無此説孔子孟子亦無此言他有是説果可信乎詩載破斧將士之詩將士不獨東人也狼跋詩人之詩詩人未見必為東方之人或者為西土之人為天下之士未可知也夫周公忠誠之心從征之將士知之㑹伐之諸侯知之東方西土之人天下之士皆知之何成王親炙周公日見周公受教周公乃獨不知公心而有疑於公耶金縢書周公致辟之事止書二叔之流言畧無成王疑公之意惟下文書誚公書問諸史有若疑者書王執書以泣有若渙然疑釋者數語不明遂啟傅㑹後儒又不順考經文深究其㫖乃輕信不經之言誤解金縢之書遂使周公之心不白於後世成王之徳終累於千載豈不惜哉故愚於金縢嘗備論之亦復存其略於此以待博雅者去取之竊謂疑字當作野字蓋咏周公不兼見疑之意只言讒邪之口可見程子之言亦専論周公徳無愧於先王行無顧慮而致其誅辟也自譲大美非周公有此意有此事詩人特發此論以尊美周公故曰立言又詩之一體可法也
