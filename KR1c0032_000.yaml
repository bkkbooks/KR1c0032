body:
  text: 詩纘緒詩類提要臣等謹案詩纘緒十八卷元劉玉汝撰玉汝始末未詳惟以周霆震石初集考之知其為廬陵人字成之嘗舉鄉貢進士所作石初集序末題洪武癸丑則明初尚存也此書諸家書目皆未著録獨永樂大典頗載其文其大㫖專以發明朱子集傳故名曰纘緒體例與輔廣童子問相近凡集傳中一二字之斟酌必求其命意所在或存此說而遺彼說或宗主此論而兼用彼論無不尋繹其所以然至論比興之例謂有取義之興有無取義之興有一句興通章有數句興一句有興兼比賦兼比之類明用韻之法如曰隔句為韻連章為韻叠句為韻重韻為韻之類論風雅之殊如曰有腔調不同之類於朱子比興叶韻之說皆反覆體究縷析條分雖未必盡合詩人之㫖而於集傳一家之學則可謂有所闡明矣明以來諸家詩解罕引其說則亡佚已久今就永樂大典所載依經排纂正其脫訛定為一十八卷乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:3349779c13eab33ec0e904c427118bf6c27b2ecabaa79edff26339726cfcf1c4
