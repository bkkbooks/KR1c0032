body:
  text: 詩纘緖卷十一元劉玉汝撰小雅三悠悠昊天曰父母且無罪無辜亂如此憮昊天已威予慎無罪昊天泰憮予慎無辜亂之初生僭始既涵亂之又生君子信讒君子如怒亂庻遄沮君子如祉亂庶遄已君子屢盟亂是用長君子信盜亂是用暴盜言孔甘亂是用餤匪其止共維王之卭奕奕寢廟君子作之秩秩大猷聖人莫之他人有心予忖度之躍躍毚遇犬獲之荏染柔木君子樹之往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣彼何人斯居河之麋無拳無勇職為亂階既微且尰爾勇伊何為猶将多爾居徒幾何此人遭亂世之讒首章反覆言亂大甚而已無罪次章乃言亂本於讒讒本於王之信王之於讒始則容之繼而信之終而甘之是以亂生而又生暴而益進皆由王徒謂其能盡職而不知其為已病也皆以亂字發端繼以七亂字承接語極痛切末復以一亂字終之則斯人之厭亂甚矣又詩以一字貫串亦是一體上章言已能燭讒人之心此章言已能辨讒人之言并能察讒人之顔貌然識心為上故首章以二興一比明之言與顔色在外者也故此以竝言其意以為已且不可欺王而欲辨之又何難之有哉出自口而如簧顔厚即觀其色赧赧然之意末則直斥為何人并以其居處質性形貌疾病徒黨而盡發揚之意以為不待識辯而即可知其為某某雖鋤而去之亦無難矣彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心爾之安行亦不遑舍爾之亟行遑脂爾車壹者之來云何其盱爾還而入我心易也還而不入否難知也壹者之來俾我祗也伯氏吹壎仲氏吹篪及爾如貫諒不我知出此三物以詛爾斯為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側蘇公為暴公所譛既受其禍而不欲遽與之絶故不言其譛而猶望其來彼既先絶然後絶之而作此詩首言其心孔艱一語已盡下追述始受禍時居家而不知禍之所自乃有二人過門不入問之則所從為暴公二云字皆疑詞然二人始未嘗言我之不是者今何故而然歟甚而至陳可入而不入其心以為人可欺而不知天之不可欺此其故又何也且其往來飄忽既不我値今又逝梁不入皆莫知其故則徒攪亂我之心而已三何二誰六胡字皆為疑辭蓋明知其譛而不言屢致其疑而不決以見此時未嘗絶之猶望其來又為後絶之之張本其詞可謂婉也已胡不自北者言自北來則相値而不自北何也自南亦此意皆其詭秘之迹也前言逝梁逝陳飄風往來非一日矣非一度矣其行又不亟也何不一來而何使我望之切乎其行既不亟而還又不入雖其情不可知然但得一來則亦足慰我之望而安我之心矣二章皆有望其來之意壎篪言平日爾我相與如一相知甚熟今始不入唁終不一來乃若誠不相知者是子絶長者乎長者絶子乎若曰誠不我知則當出三物而盟之見汝之不我知者非諒也不我知兼前不入不來而言末言汝以壎篪為鬼蜮是子先絶我矣爾之為是其心必謂我之不知也然鬼蜮則不可得見爾亦人也豈其情終不可測哉是以作此詩以極爾之反側本欲絶之而止言極其反側盖雖絶而猶望其改忠厚之情也王氏云既絶之矣愚欲易以未遽絶之萋兮斐兮成是貝錦彼譛人者亦已大甚哆兮侈兮成是南箕彼譛人者誰適與謀緝緝翩翩謀欲譛人慎爾言也謂爾不信捷捷幡幡謀欲譛言豈不爾受既其女遷驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人彼譛人者誰適與謀取彼譛人投畀豺虎豺虎不食投畀有北有北不受投畀有昊楊園之道猗于畝丘寺人孟子作為此詩凡百君子敬而聽之貝錦比讒人之言善文致故太甚以心言南箕比讒人之口善簸揚故與謀以言言慎爾指讒者謂爾指聽讒者當慎若聽者悟則不爾信矣受指聽者遷指讒者謂譛之禍必反中于爾之身忠告而使之自止也呼天而告之者以天能福善禍淫也天言視者讒人之惡非言能盡使天自視之也不食不受見物所共惡而亦讒人當誅之大證也誅讒不歸之王而歸之天聽讒者所當自省矣習習谷風維風及雨将恐将懼維予與女将安将樂女轉棄予習習谷風維風及頽将恐将懼寘予于懷将安将樂棄予如遺習習谷風維山崔嵬無草不死無木不萎忘我大徳思我小怨維予與汝詩人有所指正其相怨之友非泛論天下之友道也此詩當觀四将字将恐将懼而相與政欲以濟此恐懼也若當恐懼時始相與則或有所不能濟矣故自将恐懼之時至今将安樂之際其所以與汝者非一日矣然将安将樂之時未至安樂也汝即見棄是我與汝始終患難而汝與我未嘗共一日之安樂也此友道所以薄也且當恐懼之時又有大徳於汝也雖於其間豈無毫髪之未能曲盡者乃所以成吾之大徳也汝不思此而一旦忘之反以毫髪未盡者為怨夫棄予如遺吾不問也忘我大徳吾非望報也而乃思其小者而見怨則将以怨報徳耶此人之友道又不止于薄而且可絶矣以是而觀國人之俗時君之政可知矣蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁缾之罄矣維罍之恥鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之徳昊天罔極南山烈烈飄風發發民莫不穀我獨何害南山律律飄風弗弗民莫不穀我獨不卒匪莪伊蒿即見痛恨哀哀痛父母之死劬勞念父母之存勞瘁念父母存時生我之勞以哀痛之情念劬勞之恩如之何而不重自哀傷乎故哀哀二字見創鉅痛深而無所措劬勞二字見恩深徳厚而尤可思詞簡而情切理至而哀誠故後章申言再述而不能已焉三章言父母既殁已無怙恃生不如死其哀痛迫切之情如此即前哀哀父母之意傳從毛傳謂缾小罍大皆酒器而缾資于罍愚按此詩言父母不得其所乃子之責是以缾比父母而反小罍比子而反大其小大不相應又若父母反資于子何怙何恃之意亦不相應竊謂缾為酒器後世始然古者以缾為汲水器易井卦羸其缾是也罍固酒器亦承水器罍洗是也缾罍皆有大小以缾汲水注于罍則罍資于缾而缾資罍缾罄則罍為空罍而可恥父母不得其所則子為不子而可責以此比父母與子又與何怙恃之意相應也四章言父母存時生鞠顧復之恩如此所謂三年免于父母之懷者即前生我勞瘁之意昊天罔極言恩如天之大自無可報之所又如天之無窮自生至死無非受恩之日亦無容報之時所以極言父母之徳廣大無窮已無以報之也末二章言父母存時已遭害而不得終養不言哀痛而有哀痛無窮之意故以此二章觀前章則哀哀父母之痛固不忍言以前四章觀此章則我獨不穀之痛愈非言之所能盡矣此所以能感人之深三復而不忍讀也有饛簋飱有捄棘匕周道如砥其直如矢君子所履小人所視睠言顧之潸焉出涕小東大東杼柚其空糾糾葛屨可以履霜佻佻公子行彼周行既往既來使我心疚有冽氿泉無浸穫薪契契寤歎哀我憚人薪是穫薪尚可載也哀我憚人亦可息也東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有捄天畢載施之行維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之掲首章只託興以詠周道言道路人所共由今乃顧之而出涕盖含蓄輸将行役之歎而不言至次章方説出詩之體有如此也二章方是此詩本意杼柚言居者之困葛屨言行者之困公子貴臣猶行役勞病賤者可知極言東人之困苦詩有各章同興異咏者此于本章就用所興轉詠一意又是一體上以薪已穫又浸興民已勞而又勞下用所興轉以薪穫而猶可載興民已勞而亦可息盖一興再興也此承前章言病而哀憫之也四章言東人専任勞苦而不見謂勤西人則雖操舟之賤者亦華飾而侈富其賦役不均如此而私人之子又用為百僚焉盖私家皂𨽻之屬善為掊克聚斂以此進而為百僚尤為東人之害者故列之西人舟人之下而深惡之或以其酒承上百僚言盖有司出納之吝巧詆善毁所輸之物以要利殃民故輕視天物貪黷無厭而有重斂不已之意輸者苦其厚薄長短之誣無以别辨則望天之監無以供億則望天之助而已雖則七襄以下四章章雖斷而意皆聨屬皆為私人之為百僚者發而文三轉折始望天之監助繼言天不能監助終言不特不能監助而且助人見困三轉之意髙逺深切善于怨者也且其人審於天象其于星名星象星度既明其理又盡其變然亦皆在行役中不得息故朝夕恒見而有感歟序以為譚大夫作譚東國也大夫其亦行道之公子而困于私人之子者乎四月維夏六月徂暑先祖匪人胡寧忍予秋日淒淒百卉具腓亂離瘼矣奚其適歸冬日烈烈飄風發發民莫不穀我獨何害山有嘉卉侯栗侯梅廢為殘賊莫知其尤相彼泉水載清載濁我日構禍曷云能穀滔滔江漢南國之紀盡瘁以仕寧莫我有匪鶉匪鳶翰飛戾天匪鱣匪鮪潜逃于淵山有蕨薇隰有杞桋君子作歌維以告哀以時之盛暑興先祖之忍予只見無所歸咎之義而不言所事至次章方説亂離此體與前後二篇同次章以具腓興亂離三章以日寒風疾興已獨害歴三時而感興者如一則亂日進而不息可知四章託興言彼之嘉木不變而此則變矣莫知其尤微及于王五章託興言彼有清有濁此則有禍而無福六章言江漢猶無不包絡而王於盡瘁之人乃不識有作此詩者其南國之人歟七章言已無所逃而當時可知末章言告哀見非得已也陟彼北山言采其杞偕偕士子朝夕從事王事靡盬憂我父母溥天之下莫非王土率土之濵莫非王臣大夫不均我從事獨賢四牡彭彭王事傍傍嘉我未老鮮我方将旅力方剛經營四方或燕燕居息或盡瘁事國或息偃在牀或不已于行或不知叫號或慘慘劬勞或栖遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎或出入風議或靡事不為首章言我勤於王事至下章方言不均而已獨勞二章乃詩本意前章先言不均後說獨賢後章先申獨賢後申不均交互承接之法也此章承上申言獨賢然只言所以賢我者以未老而方壯耳隠然自謙不以才賢自處又見當時非真無賢於我者又見已勞而未嘗辭勞也此下三章承上申言不均既極盡不均之情態以兾上之察又皆以或言見非獨為已而發皆忠厚之意也又一逸一勞隠然相對而不必整然相反古人言語渾厚如此亦可以為法矣十二或字韓文公南山五言四十餘或字本於此文果無法乎無将大車祗自塵兮無思百憂祗自疷兮無将大車維塵冥冥無思百憂不出于熲無将大車維塵雝兮無思百憂祗自重兮何以知為行役勞苦以首句用将車自塵起興也無思百憂似戒憂者之詞然傳謂憂思者所作則為憂者自解之詞矣蓋憂者自知多憂之無益故言多憂適以自病自累耳然則憂可也百憂無益也之人也其亦知憂之無可奈何而欲安之若命者歟不出于熲者蓋憂者本欲出此憂也而不能脫出於憂之外所以自病自累也故不出于熲乃自疷自重之所由出也此語尤有意味明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懷歸畏此罪罟昔我往矣日月方除曷云其還歲聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懷顧豈不懷歸畏此譴怒昔我往矣日月方奥曷云其還政事愈蹙歲聿云莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懷歸畏此反覆嗟爾君子無恒安處靖共爾位正直是與神之聽之式穀以女嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福此詩疑大夫得罪於小人為所中傷出之逺方而叢以難事大夫念在位僚友之賢者作詩訴已而且戒之并有望助之意焉蓋此詩首呼天而自訴言其往荒逺之地歴日月之久任盤錯之事心既毒苦政益繁蹙我所以憂勞而不得暇者由昧先幾不去而自貽患也於是念同僚而不見為之涕泣顧懷卧不安寢雖思歸與共處而畏此罪譴反覆而不敢其曰罪罟譴怒反覆必有所指矣既不得歸則戒其僚友謂人當有勞時事安有常勢汝豈可在位而懷安乎惟當盡已職分惟正直之人是助是好助非私相助也惟正直之人是好則自然有以及我矣如是則人雖欲禍汝而神自福汝矣蓋憂之深戒之逺望之切非獨為已而已後世小人竄逐君子其始稍出一二賢者而羣賢不悟其後盡逐鼓鐘将将淮水湯湯憂心且傷淑人君子懷允不忘鼓鐘喈喈淮水湝湝憂心且悲淑人君子其徳不回鼓鐘伐鼛淮有三洲憂心且妯淑人君子其徳不猶鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僭𫝊謂此詩未詳又謂不可知姑取王氏蘇氏説而又未敢信其必然愚謂此詩蓋詩人歎古樂之将崩也古者嘉樂不野合而今王以盛樂久用於淮水之上樂者樂也而使人愈聞而愈悲樂以象德亦以敎德也而古人之徳使人懷之不忘其徳不回不似今王之回其徳也三者如是則今日之樂雖甚盛而豈久盛之兆哉末章備言樂舞之不亂以見先王之樂當此之時其盛猶如此也然而其兆将亡矣其盛不久矣而歇後不言者蓋詩人寓将崩之歎於猶盛之時致不久之憂於久用之日欲使讀者默㑹此意於言後且使他日有志於樂者知世亂樂崩其來有漸非一朝一夕之故而於此同發永慨也其後周衰禮樂殘缺失次夫子推見其本而存此詩於此使學者之有考也詩凡前章已詳言者後章承用不言而意在其中詩多此體歇後之説雖出後世然詩之河廣鼔鐘亦有然者不可謂非也毛傳鼓鐘下接楚茨合從集𫝊以楚茨諸篇移置正雅為是楚楚者茨言抽其棘自昔何為我蓺黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以饗以祀以妥以侑以介景福濟濟蹌蹌絜爾牛羊以往烝嘗或剝或亨或肆或将祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬壽無疆執爨踖踖為俎孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻醻交錯禮儀卒度笑語卒獲神保是格報以介福萬壽攸酢我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私樂具入奏以綏後祿爾殽既将莫怨具慶既醉既飽小大稽首神嗜飲食使君夀考孔恵孔時維其盡之子子孫孫勿替引之周家以農事開國周公陳詩作頌皆以農務為重禮達樂行而公卿化之皆能力農田備禮樂以尊宗廟故詩人述之此篇述祭本末始終為詳首言闢草萊蓺黍稷奉祭祀乃此篇本意故舉以發端首章之體也觀六以字可見妥侑主尸言享祀主神言篇中皆濟濟蹌蹌敬而有容指主祭者蓋上承五我下言孝孫故知此指主祭者即有田奉祀之公卿也自此以下皆以敬為主剝亨肆将皆主牛羊言先祖以神言神保以尸言此章美主祭之人故先及祭物之美統言祭祀之備上尊先祖下及孝孫皆為主祭者言之既有慶而復報以福報以夀致詠美也每章各以此意結本章又是一體三章言執事與祭助祭之人而并及俎豆燔炙祭物之細舉大細而物備可知執爨執事之人也君婦與祭之人賔客助祭之人也踖踖莫莫碩庶度獲皆言其敬也燔炙不言敬承踖踖之文也執爨未祭之時事薦豆正祭之時事笑語旅醻時事承上章言主祭者敬故在廟者皆敬也孔曰獻醻笑語在祭末今在先者因説羣臣助祭而言之也四五二章復指主祭者式用也工祝致告主神而言苾芬而下八句皆嘏辭極善為福隨事報之使無一不善故有萬億之多戒告在廟者以祭畢此工祝致告則主尸而言祭畢而主愈敬故神醉如見主敬而諸宰君婦皆敬故廢徹不遲祭終能敬祭時可知末章言燕私之事燕而有樂祭時可知莫怨具慶和也小大稽首敬也與燕之人指諸父兄弟此時賔客不與也鄭曰神嗜以下皆慶詞蓋假祭時嘏辭以為慶也詩人於各章以介福結本章已寓慶辭而於此復以始終介福之意總結之既見慶辭又見嘏辭又見祭時燕時事又見既祭既燕後無窮之慶結包數意作詩之妙也此篇為詩人美公卿力田奉祀而作愚疑亦可為公卿祭畢飲酒父兄致慶之詩蓋頌有天子祭而飲酒之絲衣大雅有天子燕父兄耆老之行葦小雅有朝正在宗私燕之湛露豈有公卿之祭有燕有樂而無詩歟此篇言祭最詳而言燕亦備安知非公卿諸侯得用小雅故在宗祭畢私燕有詩而父兄以楚茨致慶亦如行葦之既醉歟又此詩若從𫝊説以復正雅而居菁莪之後則皆為燕飲之詩義類亦相接也其後又移用之為豳雅蓋以其言農言祀故采而用之也此詩既為正雅又為豳雅一詩異用而異音也信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畝上天同雲雨雪雰雰益之以霡霂既優既渥既霑既足生我百穀疆埸翼翼黍稷彧彧曾孫之穡以為酒食畀我尸賔壽考萬年中田有廬疆埸有瓜是剝是菹獻之皇祖曾孫壽考受天之祜祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋是烝是享苾苾芬芬祀事孔明先祖是皇報以介福萬壽無疆楚茨信南山皆從古說起不忘本也然詩有言瞻彼相彼此以信彼言者非泛論禹功蓋終南惇物原隰底平皆禹所親治又詩人身歴終南原隰親見田辟之廣如劉康公臨河而歎禹功然故曰信而且有歎美之意焉我指曾孫疆理從時王之制順地勢水勢則用禹治水之道首舉大禹末寓此意故與前篇泛言自昔不同先言疆理而後及雪雨者地平而天成也此詩言力田故先從人力上說起言人力至而地利治故天澤降而百穀生疆埸中田承疆理言黍稷有瓜承百穀言隂陽和謂雪百物遂謂穀瓜前後承接詩有此體時和歲豐人心之悦在其中矣此與下章始言力田奉祀之意丘曰先尸賔後祖考者尊祖考也疆埸有瓜見地有餘利民有餘力也順孝子之心謂獻皇祖也曹曰郊特牲云天子植瓜華周官場人掌國之場圃而植瓜蓏珍異之物此云爾者豈取之以薦新於廟歟據曹説則此章言薦新下章承皇祖始言祭天子種瓜蓏公卿可知丘曰清潔之酒非三酒之清酒三酒乃諸侯之所酢非祭用也前見黍稷此舉酒牲以包祭之百物此章與末専言祭祀中二章各以壽福結本章下章只言祭而不言福蓋二章章斷意連以末章結上章又總一章而結之其體頗與楚茨同故𫝊謂如出一手然二詩所美未必同此一公卿也前二章専言力田中二章兼言力田奉祀末二章言祭祀倬彼甫田歲取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止烝我髦士以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女曽孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曾孫不怒農夫克敏曾孫之稼如茨如梁曾孫之庾如坻如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬壽無疆首言田雖甚大而未嘗多取以厲農繼言粟雖多積年雖屢豐而未嘗不省耕斂以助農終言農雖自勤年又将豐而未嘗不親往以勞農蓋曾孫力田而重農故無所不用其至如此且自古有年則曾孫之重農亦非一日矣首章止言耘耔者耕種乃耘耔耘耔後即穫矣耘耔舉中而言也介指黍稷美大處止指農夫止息處此篇首章止言力田次章方言奉祀三章又言力田末章祝農夫之介福仍用次章農夫之慶之詞其亦欲神降以福壽歟二章専言祀神惟舉齊明犧羊與前二章同報成故歸力於農祈年故欲大養其民人祭各有義也齊明犧羊禮也琴瑟擊鼓樂也禮樂互文先報後祈者既報復祈見為農而祀未嘗倦廢也此雖言祀神而重農之意藹然可見三章承前今適南畝而言自我言之則曰適自人言之則曰來前章詩人為曾孫言故皆曰我此下則皆詩人之言故皆首舉曾孫焉公卿上下平日志趣惟在於農此意相孚故曾孫之來與農夫婦子偕行而上無驅迫田畯至喜取嘗婦子之饋而下無驚猜蓋曽孫之來為農而來婦子之饁為農而饁田畯之至為農而至嘗其㫖否為農而嘗情同志一故上下之間相親相愛真若家人父子然情既親矣而用力又無不盡故禾既易治又終畝如一而有年可必也不言曾孫喜而曰不怒者蓋憂喜喜怒憂與怒皆與喜對人喜則無憂而毎易於怒蓋方喜而或觸之則怒矣故乘喜而易發者莫如怒今喜而不怒則誠喜之矣克敏謂誠能敏也猶言堯克讓禹克勤蓋耕田之能至敏而止苟誠能之則耕之道至矣故不怒克敏皆詩人形容之妙也此章本述力田之事而并得上下之情故此章述農事如畫而并得畫不盡之意讀者能體會之則知農務之樂太平之象矣末章承前農夫之慶而言曾孫收成之多萬壽所以祝君者而以報農古人之厚也且國以民為天民以食為天國不可一日而無農農之壽民之壽也民之壽國之壽也農有億萬年之壽則國亦有億萬年之壽矣此非誠知農為命脉者不能為此言也故以此報農非虛詞也至理也誠意也於是公卿力田重農之意至矣𫝊謂楚茨四篇即豳雅今按楚茨信南山言力田以祀宗廟而用以祈年意亦如頌豐年報賽而言祖妣降福邪甫田大田明言方社田祖其為豳雅而用以祈年於義正合然詩言祈報而乃止取一節以祈年意者報成與蜡收農息老同類而用豳頌邪大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百穀既庭且碩曾孫是若既方既皁既堅既好不稂不莠去其螟螣及其蟊賊無害我田穉田祖有神秉畀炎火有渰萋萋興雨祁祁雨我公田遂及我私彼有不穫稺此有不斂穧彼有遺秉此有滯穂伊寡婦之利曾孫來止以其婦子饁彼南畝田畯至喜來方禋祀以其騂黑與其黍稷以享以祀以介景福按𫝊云于今歲之冬具來歲之種戒來歲之事則是此詩自既種至終篇皆是預説來歲之事皆為虚説非實詠矣愚謂當是今歲追說于去歲之冬具今歲之種戒今歲之事至今歲凢事皆備然後事之自以我覃耜之下皆是説今歲之事如此辭意似順也曽孫平日此心惟在于農此心既孚農咸知之故預備于隔歲勤耕時種于當年者惟以順曾孫之欲也又前篇皆是曾孫重農之詞故傳云此詩若以答其意焉次章三章雖為農夫自述已意之詞亦以前篇曾孫為已而祀田祖故此見苗既盛美則願田祖去此四蟲之患前篇曾孫為已而祈甘雨故此見雲興雨作則冀祜君徳皆荅之之意焉伊寡婦之利亦惟曽孫重農之意而欲餘利所及之廣也曾孫來止前篇詩人述曾孫之事此篇此句為農夫相告之詞以其婦子乃農夫相告以曾孫之來遂與婦子餉穫者因曽孫省斂報成美其禮備而願其介福亦荅前篇報農萬壽之意也周家以農事開國見于豳之七月其後周公成王制禮作樂尤拳拳于農事觀周頌可見而正雅諸詩未有言農事者豈非正雅之缺乎今楚茨四詩美公卿力田以奉祀楚茨述禮樂之節最詳信南山次之至于甫田大田述農事之勤民俗之厚藹然豳七月之風行乎天下矣非在上躬行而身敎何以能此哉𫝊謂此十篇當為正雅又據籥章疑此四篇當為豳雅豳雅即正雅也其作于成王周公時尤可無疑矣
