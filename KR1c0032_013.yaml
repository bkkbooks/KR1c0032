body:
  text: 詩纘緒卷十三元劉玉汝撰大雅一文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧穆穆文王於緝熙敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼冔王之藎臣無念爾祖無念爾祖聿修厥德永言配命自求多福殷之未喪師克配上帝宜鑒于殷駿命不易命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚此篇本述文王之德以戒成王然傳於首章不言文王之德而言其神蓋首言文王既沒而如在故知其專以神言然神亦德也有是德則有是神言神則德在其中矣新謂成王初嗣位而新受命即伊尹稱嗣王新服厥命之新顯者昭之極至時謂新於此時又言不顯不時者申詠上文以覆説下文文王也天以形體言帝以主宰言天與帝非有二文王與天帝亦非有二故於昭言其全體之昭著陟降言其妙用之流行於昭于天言其與天並明陟降帝側言其與帝同運天之造化非運用無以見其妙非妙用無以見其神故詩人以是詠文王以見文王之神與天無間有所在而無不在極昭顯而尤神妙政與易後天先天之義同先天後天亦非有二然非後天入用之位無以見先天全體之妙又如中庸言聖人同於天地既言天地不二又言不測之意必如是而後天地造化聖人德業一而二二而一之意可見此固非聖不能與亦非聖不能知故曰此詩非聖人不能作也此為是詩之首章中含三意一見文王有顯德上帝有成命故子孫蒙其福澤以有天下二見文王與天同其體用而無間三則此詩為戒成王而作首章雖未有戒辭而已含戒意故極言文王如在欲成王思慕感發不能自已先有是心而後可進其言亦作詩陳戒之微意也大抵讀詩者既觀本章之旨又當觀一篇之旨以求作者之意如此章為一篇之首章其起意發辭廣大精微如此即可以見大雅之正體矣次章至五章皆詠文王之德分為二節各以文王起辭先言亹亹後言穆穆先言令聞不已後言不已其敬者言之序也不言純亦不已而言其若有所勉不言其敬不已而言不已其敬蓋後章將戒成王故此先寓文王可法之意為之張本非文王真有所勉而猶待於緝熙也文王孫子成王與焉見上章命新命時當指成王可知二章從文王存時之德順説到今三章承二章末語從今日逆説歸文王存時事思皇多士以下言文王存時得人之盛是以周士傳世之顯如此次章以下皆説文王之德不復語其神矣克生謂能用之使不徒生夫然後謂之能生也此以二章為一節觀前以文王起辭此承用前末語可見後二章倣此文王之德莫盛於敬故以於字嘆之假哉天命有商孫子是順説下文逆説後章又順説與前二章相似反覆咏嘆也五章言殷士服周助祭而服殷服則殷亡之禍極矣寓戒之意切矣故下文即呼王藎臣而告之然告王之言不以為下章起辭而於此章末言之蓋此章在一篇之中結前起後既欲前有歸宿尤欲後相連續若意連語斷則意雖相接而語不切至又前以文王起辭此若以成王起辭則是以成王與文王相對非所以尊文王而欲成王之念之矣故特於此章之末忽呼王臣而告之欲成王感動而警發也此措意行文之妙亦大雅大篇長章之一體也六章言無念爾祖惟在於修德前後無非言文王之德然不説出至此方説一德字蓋特為成王言之見我之德即文王之德不待他求故下言永言配命即修德之功自求多福即修德之效永言則不息矣配命則無間矣命則天之與我而我所以為德者德之本也配命則德既成而即文王矣多福則福在我而無殷禍矣修德之本效二語盡之可謂簡而要矣非周公孰能之法文王以自修監殷道以自省亦承前章周興殷亡之意而反覆丁寧之也無遏爾躬承上求福而言遏絶天命皆由我以致之所謂禍福無不自已求之者也宣昭義問承上配命而言能修其德則有以宣昭其善譽矣德之不修義問何有而欲宣昭之乎虞殷自天承上鑒殷而言雖能宣昭義問又當度殷而折之於天其曰自天蓋將轉歸天與文王也此篇首言文王之神如在而與天無間末言天之事無迹而文王可法皆反覆以明文王與天一而尤欲成王之法文王與首章相應又自求多福效見於一已萬邦作孚則效見於天下後世效莫大於此故以終篇焉此篇起結相應中間承接轉折血脈相貫反覆歎詠意味無窮非聖人有意於為是皆自然之文理也明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行大任有身生此文王維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商殷商之旅其會如林矢于牧野維豫侯興上帝臨女無二爾心牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚涼彼武王肆伐大商會朝清明德明而又明則命顯而又顯難忱不可恃不易不可忽起語泛説正理次即轉入殷亡以起後章言文武詩體文法也次章以下言天命文武文王以德言武王以功言而言武王之功為多疑當以此篇為追述武王之功與前篇相對蓋武王有天下者也故篇內雖分言文武而推本王季以及文王者實欲推本文王以及武王也又前篇既專述文王故此篇惟重在於武王歟前篇呼王藎臣明見戒詞此篇戒意寓於首章翼翼恭慎恭見乎外慎主乎中兼內外言昭事上帝顯然事帝於動靜作止語默之間文王有事君之小心即事上帝之小心也懷言福自來或謂懷即豫懷明德之懷言帝自懷與之受言方國自來已不拒之即歸斯受之之受次章承首章之起語即述大任以及文王三章則專述文王之德至四章再從天命説起蓋將陳武王而先推本文王也洽陽渭涘言周京之盛如碩人言齊地廣大韓奕言韓土孔樂也俔天之妹言大姒德自然而生即貴也文定厥祥言文王之昏禮極備也大姒生有德而昏盡禮故曰不顯其光言德禮之光也又意此時王季為文王娶六禮甚盛故詩人特以是咏之觀造舟後為天子制則其禮盛可知又夫婦人倫之始故聖道必本於此天下之本在國國之本在家也六章又從天命説起蓋此章正言文王生武王武王伐商前曰天監此曰有命又曰篤曰保右命蓋武王受命有天下其功尤大故二章皆承上更端再三推原天命見此篇之意重在武王又前咏文王止二章後推本以及武王凡五章意尤可知中入武王與文王篇中入成王同皇矣篇中亦然維豫侯興之下忽言上帝臨女無二爾心乃衆人贊武王之辭有數意一見天意必欲亡紂衆心同欲武王除暴二見武王之心常若帝臨而于天下無不順於理無所違三見武王順天應人而非得已四見武王之心明白洞達衆人所共知至此而贊其決作詩者於此又以詠其事辭簡義精意深文竒信非聖不能作也孟子曰周公相武王誅紂此詩乃獨以太公言蓋太公精兵法伐紂軍旅之事實專任之故詩人舉其實以明功鷹揚者太公以紂為天人所共怒故年雖老而氣甚壯志氣不以血氣而衰也又贊武王者衆人也而太公為天下之父於此而助武王豈得辭哉且言太公而不及周公則此詩為周公所作亦一證也肆者兵進而不可遏也蓋衆人皆欲紂亡之速故雖遏之而不可得且見罔有敵於我師之意焉會朝清明即書所謂一戎衣而天下定者但書紀其終詩咏其始會朝清明如沈霾忽開而觀白日如炎埃忽散而挹清風其形容即時頓異之氣有大定一語所不能盡者以武王成功如此其大一篇序事如此其詳而終以一語凡反商之政代商之治皆可即是而推可謂極簡要而善形容矣且不特此也是詩用一字形容如曰昭曰篤曰燮曰肆用二字形容如曰明明曰赫赫曰鷹揚用一語形容於殷紂曰天位殷適於文王曰小心翼翼於大任曰維德之行於大姒曰俔天之妹於武王曰無二爾心而以會朝一語結全篇之意皆可玩味傳謂末章所以終首章之意又云其章以六句八句相間以此論之則詩必有體文必有法烏可以是為末而不論哉綿綿瓜瓞民之初生自土沮漆古公亶父陶復陶穴未有家室古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于兹乃慰乃止乃左乃右乃疆乃理乃宣乃畝自西徂東周爰執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝乃立臯門臯門有伉乃立應門應門將將乃立冡土戎醜攸行肆不殄厥愠亦不隕厥問柞棫拔矣行道兌矣混夷駾矣維其喙矣虞芮質厥成文王蹶厥生豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮綿綿瓜瓞一語於本章則為比合全章則為興瓜瓞取義先小後大本章只言小而不及大故只當為比合全篇則由首章循至末章方見先小後大則此一句當為興矣以一句興全篇又詩之一體與衆例不同大雅大篇皆出聖賢發端一語便見始終於此詩乎見之此篇詠大王文王首章即見古公所謂入題者是也然先從周人説起却引入大王言周人始生自公劉遷豳以來至大王已歷數世然只二句包括不説出蓋意重在大王也作此詩文法也其言初生即厥初生民之初生彼説出於薑嫄此包括公劉諸君所以知之者以自土沮漆而知之也其言古公者謂古公之時民俗如此故傳以民與俗言非古公居土室中也二章却提古公説此下皆詠古公矣走馬非從容故見避狄難此隱言至下厥愠混夷乃明言序事緩急法也凡遷都先相地宜次詢人謀乃考卜如公劉遷豳武王遷鎬衛遷楚丘大舜官占洪範謀及凡事皆然况遷都重事可不謹乎此與下章皆定民居慰止左右使民有居疆理宣畝使民有養周爰執事見古人愛民周遍至是乃召司空見上居民授田皆古公身親臨之此時司空司徒未必不在特詩人欲表此意故于此始以乃召言之此言古公作已室家下文乃詳其先後作之之序救之度之承上章繩直縮版而述其作墻之序即上章立室家之事二章雖斷而一事相因又詩之一體文之變也鼛鼓言民自樂勸周爰見上愛下弗勝見下愛上二語備之二門因居室而言居室正門之外左祖右社而營築畢矣二門與社至周皆為天子制詩人欲成王知所由始故特因居室併及之乃者相繼之辭乃慰至乃立凡十三乃字自有次序非泛言之救之一章獨無乃字見是承上而二章相連明矣末二章乃一篇之歸宿故以肆字起辭又以見後大之意前皆述大王事至此方詠其德然只以混夷一事言之所以為善詠德也言大王不能絶人之見怒但能不廢已之自修卒致文王之時岐下繁盛而混夷奔竄矣混夷之服夲文王時事詩人欲言大王積德之效故推本而歸之大王焉四矣字所以深嘆其效也末章因混夷之服而言文王之德惟以虞芮一事言之蓋舉其大者所以為善詠德也虞芮之來自來質成而莫知其所以然者何也但見文王之國有蹶然興起之勢周公謂以已意推之毋亦有此四臣之助乎其稱豫者周公對成王之辭也前章言大王不言混夷之服其服固有所自末章止言虞芮之來不言文王其來也雖文王亦不期然矣文王之化至是而未易名言周公特因國勢興起而以豫斷之然猶不敢自是也故稱豫曰者凡四以寓不盡之意欲成王深思自得之而文王得人盛之意亦在其中矣二章言周至大王始大而文王益大以終首章之意則綿綿瓜瓞一語豈非一篇之興歟又按三詩皆成王之詩文王篇則追述文王之德大明篇則追述武王之功綿篇則追述大王文王之事文王詩戒明矣大明戒意見首章綿似無戒意蓋綿首言國小無咏美意中言愠問有艱難意末言豫曰乃公告王之辭書載周公告王皆稱豫故綿戒可知又三詩皆用為相見之樂二詩既戒則此詩亦戒可知芃芃棫朴薪之槱之濟濟辟王左右趣之濟濟辟王左右奉璋奉璋峩峩髦士攸宜渒彼涇舟蒸徒楫之周王于邁六師及之倬彼雲漢為章于天周王夀考遐不作人追琢其章金玉其相勉勉我王綱紀四方芃芃棫朴則薪之槱之矣薪以燎之所以致其用於今日槱以積之所以儲其用於後日也濟濟辟王則左右趣之矣左右使令之人固無不於此乎趣向左右輔弼之人又無不於此乎趣向也左右言無方也首次二章皆言濟濟辟王左右而其一則泛言人心歸向之一則特言人中之賢士歸向之詞語相疊意義相足與前篇縮版救之二章之體相似又前後皆興此獨賦可見三章之興與前章之賦體雖不同而下文文意相對與湛露後二章之體相似蓋言居而奉祭則賢士歸向出有所往則六師歸向三章蓋一意相通後二章言文王之德化政治能使天下四方之人自歸向之非止國之髦士師衆也故此章託興於天而聖人所作可知矣周王有聖德又有夀考聖人在位日久如之何而不作人非以其在位久而後能也追琢金玉託興又變其體蓋以一物析為二句橫作四截追琢金玉以興勉勉其章其相以興綱紀又當先言金玉而乃先言追琢者所以為興勉勉也我王有聖德而又勉勉故其綱紀為至傳于三者皆以至意言之又追琢金玉極文質之美者興中自有至意故詩有意因興而顯興有藏言外之意者所謂興兼比者也上章亦然何以見後二章亦言人歸之者蓋歸向者此篇所詠之大意也前三章既見此意則後二章可知故詩有後章承前章不言而前意在其中者觀此詩尤可見也作謂作興鼓舞於當時綱紀謂維持鞏固於無窮勉勉有德化造極不已之意綱紀有天下後世可守可久之意故以是終篇焉瞻彼旱麓榛楛濟濟豈弟君子干祿豈弟瑟彼玉瓚黃流在中豈弟君子福祿攸降鳶飛戾天魚躍于淵豈弟君子遐不作人清酒既載騂牡既備以享以祀以介景福瑟彼柞棫民所燎矣豈弟君子神所勞矣莫莫葛藟施于條枚豈弟君子求福不回此詩詠文王有德而得福即中庸大德必得其祿之意首章託興中含自然之意次章取興中含必然之意前詩作人託興雲漢有廣大光明之意此詩作人託興鳶魚有流動充滿莫知所以然之意末章葛藟有纒固不已之意皆興之兼比者當各隨所興以見所詠蓋大雅所興多有在所詠之外而可以因興得所詠之意者此興所以為深遠也此篇詠歌文王之德重在豈弟君子一語蓋此一語詠德也前後始終皆言得福中間一言德化言德盛民化所以得福也觀傳於下章謂承上章言有豈弟之德則祭必受福可見此章為得福之本故此章不言福惟託興專以形容德化之妙焉輔氏謂斂福錫民則非傳承上章之旨矣三章言豈弟而不言福四章言介福而不言豈弟以是推之則第五章亦當承上章言享祀之福神勞之矣又前後皆興惟第四章居中獨為賦蓋二章一意相通詩有二章意連有三章意連者惟大雅篇有此體不可以常例論也首章末章皆子貢答子禽之意首末相應而末兼興纒固不已所以為結思齊大任文王之母思媚周薑京室之婦大姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫刑于寡妻至於兄弟以御于家邦雍雍在宫肅肅在廟不顯亦臨無射亦保肆戎疾不殄烈假不瑕不聞亦式不諌亦入肆成人有德小子有造古之人無斁譽髦斯士詩有一句引起次句入題者此詩首句推本大任次句即説文王雖言文王之母然提出文王即是此詩之綱領矣下言周薑大姒亦為文王言之故後章不再舉文王矣齊有純一之意兼內外而言詠大任只用一齊字雖大姒之嗣亦嗣此耳故人稱德不在多所以善詠首章先大任及大薑故此先言宗公次言寡妻又先宗廟後閨門先祖宗後家國言之序也以宗工對寡妻兄弟邦家則尊卑之等以家邦自相對則內外之序大分小分所施各有其道焉然言惠而不言所以惠言刑而不言所以刑蓋猶是承上起下未曽説出所以為德者下章乃言之三章乃承上章言其所以刑于家邦者以其在宫而有雍雍之德所以惠于宗公者以其在廟而有肅肅之德也至此與下章方極言文王之德然先宫後廟與上章交互而言者變文法也雍雍肅肅德之見於身者故亦臨亦保以心言不顯以地言無射以時言也至誠無息之心也戎疾不瑕德之見於事者故亦式亦入以理言聞謂已非有聞於人諫謂人非有諫於已從容中禮之事也在宫在廟處常之德不殄不瑕處變之德二章詠文王之德無以復加矣然必有諸身而後見於事能處常而後能應變故此章以肆言
