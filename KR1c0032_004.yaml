body:
  text: 詩纘緒卷四元劉玉汝撰鄘泛彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他母也天只不諒人只泛彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只興無取義惟取彼我二字相應共薑素有守義之志因母欲奪其志然後發為自誓之辭不然此志在我何以誓為然之死之誓已堅靡慝之辭愈堅至呼母則先言其如天而後言其不相信既足見已之志尤得告母之體且不言其不知而言其不信又以見其守義之誠焉母而聞此有不憐其志髙其義信其心而從之乎聖人存此篇明婦人從一之義以為世教至程子言人只是怕寒餓死然餓死事極小失節事極大其義愈明矣牆有茨不可掃也中冓之言不可道也所可道也言之醜也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也讀此詩者一當知宣頑之惡二當知詩人刺惡之意三當知夫子存詩致戒之意宣薑之惡不可道也而詩人以此意申之再三既欲見隱之不可掩尤欲見醜辱之深可惡夫子之意楊氏得之楊氏之言發明慎獨之功最為明切聖人訓戒正在於此讀者當惕然知畏矣君子偕老副笄六珈委委他他如山如河象服是宜子之不淑云如之何玼兮玼兮其之翟也鬒髮如雲不屑髢也玉之瑱也象之揥也揚且之晳也胡然而天也胡然而帝也瑳兮瑳兮其之展也蒙彼皺絺是紲袢也子之清揚揚且之顏也展如之人兮邦之媛也君子偕老婦人從一之義也副笄象服國君夫人之禮服也無慊於義而服是服則威儀甚美而服飾甚稱矣此泛言為君夫人之義也子之不淑方説宣薑然首語即舉正義也已含譏刺至不淑乃明言之而又曰云如之何雖直責之而亦婉矣象服即下文翟展之服傳胡然為見者驚異之詞東萊以為詩人問之之辭謂問宣薑如何如此而為帝欲宣薑之自愧也二説不同又此詩首章七句次章九句末章八句不齊又多用也字前也字七後也字四皆短長不齊又一體大抵衛詩多濃麗婉媚他國諸詩所無也翟展皆君夫人之服也人無此服亦無此行故此詩為宣薑而作無疑既服正服而又容貌美服飾盛顔色晳見之使人驚異猶鬼神然極形容而無譏刺蓋合末章而同歸於末二句也末章首二語與前章相對下文復極形容其服飾眉目顏色之美辭意亦與前章同然不過為邦國之美人耳其譏刺之意溢乎言外然必前有責之之辭而後見後章辭益婉而意益深爰采唐矣沫之鄉矣云誰之思美孟薑矣期我乎桑中要我乎上宮送我乎淇之上矣爰采麥矣沫之北矣云誰之思美孟弋矣期我乎桑中要我乎上宮送我乎淇之上矣爰采葑矣沫之東矣云誰之思美孟庸矣期我乎桑中要我乎上宮送我乎淇之上矣衛自凱風以來積而至於靜女風斯淫矣而又益之以新臺甚之以牆茨偕老於是在位之世族效之而桑中作則當時之民可知矣此衛風之極也國雖欲不亡得乎夫子刪衛諸詩其得失先後淺深始終厯厯可考比之諸國之風其事為獨詳其序為最明而必存此詩聖人豈不知淫惡之不足録哉蓋垂戒之大政在於此讀者徒知淫行之惡而不務去徒知淫禍之酷而不知戒是豈聖人刪詩勸懲之本旨哉或曰變風諸詩皆有音調皆可絃歌然乎曰然何以知之以桑中知之樂記曰桑間濮上之音亡國之音也以桑中聲淫亡國猶有音調而被之樂則諸國變風之詩可知矣諸國變風雖非雅樂然詩之作或按調而為詩或詩成而諧其音或當時作以歌或他日取以為樂而必有音調可知也春秋國君大夫賦詩歌詩纍纍相望亦必各隨其詩之音節歌之必不泛泛而歌也如今之詞曲可歌可絃者亦各按其腔調而絃之歌之但其聲音各為變音不可以入韶武耳鶉之奔奔鵲之強強人之無良我以為兄鵲之強強鶉之奔奔人之無良我以為君取二物為興二章皆用而互言之又是一體傳謂為惠言以刺頑而次章不言若以為詩人自言則似與首章不相類愚謂此詩承桑中後次章疑當為在位有妻妾者之言以刺薑蓋此詩雖曰以刺頑薑亦以譏惠公與在位者意謂頑惡而惠公反以為兄而親之薑淫而在位者反以為小君而尊之是衛之君臣內外淪胥於淫風皆不知其為惡頑薑固鶉鳥之不若而人類亦無以異於禽獸矣列之桑中之後所以著衛風之極也所以著衛國之亡也定之方中作于楚宮揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧靈雨既零命彼倌人星言夙駕説于桑田匪直也人秉心塞淵騋牝三千定之方中得其時揆之以日合乎制樹之榛栗資其用皆有宏逺之規模若據左傳則此詩當作於元季間追述其初遷時事望景觀卜未遷時事允臧既遷後事升高降觀致其詳景卜致其謹允臧則獲其善矣語有詳略前揆作室也此景相地也其事不同末章言文公遷後終有治國致富之效首言勤農舉所重也中言秉心推其本也末言騋牝極其效也騋色之牝已至三千他色而牡者不可數計一語見富以結一篇之意詩人之善咏蝃蝀在東莫之敢指女子有行遠父母兄弟朝隮于西崇朝其雨女子有行遠兄弟父母乃如之人也懷昏姻也大無信也不知命也此詩本只以蝃蝀為比而此一物二名二章各以一名發一意如七月詩斯螽莎雞蟋蟀作詩有此一法非重復也今人則以此為嫌矣女子有行逺父母兄弟二章略易下語以叶韻疑當時有此成説故泉水亦用此語蓋女子婚嫁之大義也此言女子既嫁之後於所親者猶如此况可如蝃蝀乎或曰此二句通下章言正義如此而之人不然也末章言之人所以縱欲者由失其本心也蓋天理之正人心所固有不以男女間也循天理而行則能守貞信之節而無縱欲之患惟不知此理故不貞信不貞信故縱欲詩人推其本心而言其所以失者以此不特使人知義理之正而且知用力之序非徒刺其惡而且有以進其德又首以蝃蝀為比末以懷昏姻為言不直指其惡無絶人之心首言女子之正義末乃推其受病之原而示以進德之方皆忠厚之意也文公能以正導民而一轉移之功至於如此人君亦何苦而不樂善乎相鼠有皮人而無儀人而無儀不死何為相鼠有齒人而無止人而無止不死何俟相鼠有體人而無禮人而無禮胡不遄死興以彼形此者傳以猶字言他皆倣此儀止行禮之容儀也何為何俟其辭猶緩禮指全體言遄死則其辭迫矣此篇辭意與前篇異前篇婉而正此篇直而切蓋其出於禍亂懲創之餘惡惡之甚辭也此作詩者性情之不同然其惡天下之惡則一也孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以豫之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之詩人見大夫乘車馬由郊而都由都而城以見賢者其辭意已具首章其後旟字旌字皆因都城字以叶韻五六亦因四而增之以見其盛非真有五馬六馬也組字祝字與下豫字畀字皆然非别有意義不過因郊都城易字易韻以見再三之意詩有此體也或者以大夫車無旟為疑而又強釋五與六者皆以辭害意者也何以二字最見詩人深喜之意蓋賢者必自有以答其勤其所以答之者又豈吾所能測度哉然詩人惟欲重有以答之猶恐其未至所以深喜大夫之能見賢也而詩人之好賢亦可知矣於是衛俗其庶矣乎何以二字極有味載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫跋涉我心則憂既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之此詩首章即見事端凡詩所言之事有即見於首章有中篇乃見有至篇末始見者學者尤當觀此斯可得詩之本旨言至則未至也未至而大夫以不可歸之義來告此傳最得詩旨蓋下章言阿丘采虻行野皆在途之辭也舊説非二章乃見所以作詩之由蓋至是以義不得歸以其所思不能止乃作此詩以述意故特以此章反覆其辭一再而申言之與前後章異第三章言各有道而大夫不能體其情故稱許人尤之衆稚且狂而其辭激四章知己無歸救之義則稱大夫君子毋我有尤而其詞遜激者情之所不能已遜者義之所不敢違也又大夫尊故不敢斥言而曰許人及知其守禮則深服而稱君子詞意文法各適輕重而義亦在其中矣百爾所思不如我所之極盡人情泉水父母終思歸寧而不得者義之常也故終不往此國滅君死非常之變故若可往而往然聞大夫之義而從之亦可謂不逺復矣聖人存此固欲明婦人弔不出境之義亦欲示人以改過遷善徙義之法雖婦人猶能况君子乎范氏義重於亡之説可謂明白矣此詩許穆夫人所作而列於鄘者鄘人得之而以鄘音傳之歟又或夫人在途作此其在鄘之地乎又此詩當在定之方中前而列於此其詩則許其事則衛故以附於鄘之末歟衛瞻彼淇奧緑竹猗猗有匪君子如切如磋如琢如磨瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹青青有匪君子充耳琇瑩會辨如星瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奧緑竹如簀有匪君子如金如錫如圭如璧寬兮綽兮猗重較兮善戲謔兮不為虐兮凡詩人所作先有咏事之意偶觸所見以興辭故後章有所興隨下所咏易其韻亦有所咏因上所興而見其意者詩有此體可以此詩類推之此詩大抵只咏武公之成德故各章已見而又特備於末章既咏成德則不可不見其進德之功與其進德之序故首章言學問自修見進德之功矣而即以自內達外之成德者歎咏其不可忘二章言服飾見其德進而足以稱其服合前章為進德之序而復以其成德之不可忘者再致其歎咏焉三章則備見成德言其學問本於生質而又有以成其美質功夫有序至是而成故末特以處已待人動容中禮者言之前四兮後五兮字皆咏歎之辭前對舉以咏後變言以結一篇大意惟在成德而歎美之至尤可於此而觀之言重較者君子之敬容見於憑軾之時此欲見君子寬綽而恭敬然不言恭敬而惟歎美其重較猶前言充耳會辨不言德而德可知也猗字與首章猗字不同首猗於何反此為歎辭則音於宜反與商頌猗與之猗同若音於綺反則猗為跛倚在重較而或倚則不足觀矣故只當作歎詞風雅皆有武公詩凡三篇首賓之初筵次淇奧最後抑考槃在澗碩人之寬獨寐寤言永矢弗諼考槃在阿碩人之薖獨寐寤歌永矢弗過考槃在陸碩人之軸獨寐寤宿永矢弗告考槃見隱者所居之室在澗見隱者所居之地寬見身心德量寐寤言見起居語默永矢見其節弗諼見其志此四言備隱者之美後世之善言隱無以加此矣獨非孤獨之獨言其幽居間處非常人俗輩所能即故謂之獨言謂言語凡文辭皆是歌謂歌詠凡聲詩皆是宿非特覺卧凡坐止偃息皆是軸有卷而懷之之意弗諼以心言弗過以身言皆在己者弗告則弗以告人矣古之隱者皆在野在野者無必隱之心常待見知則出仕而行道不見知則甘遁而無悶故孔子曰隱居以求其志行義以達其道未嘗有固必之意也世道既衰人心不古隱非真隱而仕非所仕於是賢人君子始有憤世長往不返之心然視聖人之中道則有間矣考槃之賢其隱固可美而永矢之辭不能不失於太過此其所以為衛風之變周道之衰乎其後晨門荷蕢之徒果於忘世反以聖人為譏而世道之衰也益甚原其所自蓋已見於此矣然君子之制行與其不及也寧過過猶不失其為高此考槃所以可美也碩人其頎衣錦褧衣齊侯之子衛侯之妻東宮之妹邢侯之姨談公維私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮碩人敖敖説于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶薑孽孽庶士有朅首章即述族類之貴者見正嫡之重也次章乃詳言其容貌之美三章追述其初嫁時車馬之盛皆不見莊公不見答之意至無使君勞之語然後歎今不然之意可見於言後又以此觀前後章之辭然後重歎莊公之意皆可見於言外此詩人所以為善於嗟歎也傳於首章言所宜親厚而歎莊公之昏惑於次章言猶前章之意末章又猶首章之意皆因第三章歎今不然之意以發明前後章之旨蓋作詩者有此法讀者亦當以此法觀之也或曰莊薑之德見於柏舟諸詩可謂賢矣詩人於此不稱其德而徒稱其族類容貌車馬士女之盛何也意者莊公昏惑不知有德其所知者惟若此等而已詩人之作此詩意或莊公聞之庶猶可回其親厚正嫡之意蓋因其所明者而歎之亦納約自牖之法也詩人微意其或出於此與此詩首二句略舉起端下文及後章乃言其詳首章末句變文次章螓首蛾眉以下再變末章末句變文與首章同皆文法也氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子涉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽士之耽兮猶可説也女之耽兮不可説也桑之落矣其黃而隕自我徂爾三歲食貧淇水湯湯漸車帷裳女也不爽士二其行士也罔極二三其德一三歲為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知嘻其笑矣靜言思之躬自悼矣及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉傳謂淫婦一失其身人所賤惡故雖始迷終悟而終不免於困以為士君子立身一敗萬事瓦裂之戒可謂嚴切矣然於婦人之失則詳於男子之惡則未之及亦何可以不論乎今觀首章之意淫奔之謀出於男子始託事以入其謀繼誘之送而戒其愆又偽怒以堅其約及其再見則又假卜吉而遷其賄矣既貪其色又利其財其狡險有甚於婦人也謂之蚩蚩之氓者怨而鄙之之辭如此耳桑沃比家富而容麗既以賄遷則男家富矣故已容色潤澤而光麗方言家富容麗而忽發嗟歎之辭託戒鳩之言以興戒已之意又借士之不可以明已之甚不可蓋前章皆自述其前日所為之事至此而後自道其今日愧悔之意是以上語未竟而特以嗟歎發之則愧悔之有感於中者深矣桑隕比家貧而色衰蓋首章言男抱布來貿見男貧女富既以賄遷則男富矣至是而食貧者意此男子必輕佻浮蕩之人既得其財而暴殄之故不三歲而遽貧既貧而色斯落則又棄此而慕彼蓋欲以前日之施於我者又移而施之人也故於此明言切責其二行既曰罔極又曰二三言不特二於已而已也以此而觀男子之惡豈可勝道哉衛風至此豈專婦人之罪男子不能正身齊家專欲以淫惑而卒也淫婦亦得以誚責之豈不甚可羞乎故其流而為靜女為桑中雖曰由上之化而亦在下之為家主者自有以致之豈不深可戒哉婦人既去而追述其為婦之勞見棄而遭夫之怒既歸而不為兄弟所恤然皆無所歸咎惟有躬自痛悼而已蓋淫婦之奔雖由人誘然已果能守其貞靜又豈人之所能動哉今日之失身皆由己以致之故靜思而自悼可謂善自反矣淇隰二句興下四句首章之謀始於抱布末章之信誓出於總角抱布始謀安得有總角之誓則謀非始抱布矣前後意不相合豈此男或有世好之舊故總角相與不待父母之命自為信誓至抱布時始即之謀而使行媒合之耶又豈淫風之時仕族閭巷之間男女自幼習為言笑不以為恥及長而遂竊謀私合邪或者以為婦人自述其總角時居室之言笑和柔而從人之信誓甚明今而失身由不思其反復以至於此非指與此人為信誓蓋泛言從人之道如此也今詳氓詩之婦人固以淫而失身矣然其被棄之後雖極其怨而未嘗有他適改從之意蓋此婦始欲行媒追念信誓亦尚知有義信者但此時惑於人動於欲而不能自制耳其愧悔也雖出於困極而深嗟重歎甚言耽樂之不可為其良心本性於此發見而不容泯是以既去而極言其人之二行罔極於已則自信其不爽既歸也不敢責人而惟反躬自悼而已不與偕老則惟言已之怨而已追念信誓則付之於無可奈何而已蓋其始失身之罪雖不自知而其終從一之義終不敢違其視貞靜之德固逺而於淫奔行私而不知止者亦有徑庭矣傳謂一失其正則餘無可觀然於無可觀之中猶有可矜者不可以不論庶乎人之知悔其非者猶思保其終而益謹於其始云季文子三思而後行子曰再斯可矣程子曰再思則已審三則私意起而反惑又曰為惡之人未嘗知有思有思則為善矣今觀氓之末章尤信籊籊竹竿以釣于淇豈不爾思遠莫致之泉源在左淇水在右女子有行遠父母兄弟淇水在右泉源在左巧笑之瑳佩玉之儺淇水悠悠檜楫松舟駕言出遊以寫我憂按此篇永樂大典缺卷芄蘭之支童子佩觿雖則佩觿能不我知容兮遂兮垂帶悸兮芄蘭之葉童子佩韘雖則佩韘能不我甲容兮遂兮垂帶悸兮傳謂此詩不知所謂不敢強解愚意衛人之賦此母亦嘆衛國小學之教不講歟周室盛時小學大學之教各有所服之佩各有所習之事各有當行之儀而亦各有可見之能今衛國之童子如此豈非小學之教不講致然歟而大學可知矣蓋小學成而後大學施學校廢而後風俗壞今衛俗如此童子又如此豈不重可慨哉誰謂河廣一葦杭之誰謂宋遠跂豫望之誰謂河廣曾不容刀誰謂宋遠曾不崇朝傳言孫與祖同體者同昭穆也此詩止言宋不逺耳若義不可而不得往之意則猶在言後作者不必盡言而讀者自可默會又詩之一體唐人歇後之作蓋本於此望之而即可見猶有逺者行之而即可至則愈近矣語有淺深衛有婦人之詩六人共薑莊薑許穆夫人宋桓夫人泉水竹竿之衛女愚謂當增雄雉伯兮為八人伯兮朅兮邦之桀兮伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草言樹之背願言思伯使我心痗按此篇永樂大典缺卷有狐綏綏在彼淇梁心之憂矣之子無裳有狐綏綏在彼淇厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服知此人為鰥夫者以有狐為比也知其為寡婦者古者廟見而後執婦功今此婦憂人無裳無帶無服而欲為為之又此時國亂民散多喪其妃耦者故可知其鰥寡也或曰此當為興蓋以有狐興之子在梁興無裳其曰可以裳可以帶可以服者以有狐興之子也投我以木瓜報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也琚為成器瑶玖則玉耳三者不過隨瓜桃李易文為韻詩有此體也然意尤重在後二句故重言而三咏焉此詩如序所言固未見其然傳疑為男女相贈答之詞蓋若以為昏姻之投報則六禮不用此二物惟贄用榛栗棗修然非投又無報而欲以此永好其情似未得其正是以傳為此説與
