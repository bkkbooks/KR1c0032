body:
  text: 詩纘緒卷九元劉玉汝撰小雅一呦呦鹿鳴食野之蘋我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將人之好我示我周行呦呦鹿鳴食野之蒿我有嘉賔德音孔昭視民不恌君子是則是效我有旨酒嘉賔式燕以敖呦呦鹿鳴食野之芩我有嘉賔鼓瑟鼓琴鼓瑟鼓琴和樂且湛我有旨酒以燕樂嘉賔之心鹿鳴燕享本欲以通上下之情洽賔主之樂然所求乎嘉賔者惟在於言行而已惟君子有言教有身教言教不如身教之入人深故首章言所以燕賔者欲其以言教我也次章言君子有身教不待言語而示我者深故致其殷勤欲賔燕飲而且敖游焉末則止言燕飲厚致殷勤而欲以樂君子之心蓋心者身之主言之所由出也既能得其心之樂則言教身教自然無已矣夫燕樂而欲樂君子之心君子之心所以樂之者惟在於言行則燕賔者非以口體為養賢者亦不以奉口體為恱燕飲之道莫加於此此鹿鳴所以為詩之至而燕飲教肄必用之歟四牡騑騑周道倭遲豈不懷歸王事靡盬我心傷悲四牡騑騑嘽嘽駱馬豈不懷歸王事靡盬不遑啓處翩翩者隼載飛載下集于苞栩王事靡盬不遑將父翩翩者隼載飛載止集于苞杞王事靡盬不遑將母駕彼四駱載驟駸駸豈不懷歸是用作歌將母來諗馬行不止道路回逺厯逺經久勤苦之意備見於二語之中嘽嘽衆盛貌皇華征夫在其中我心傷悲以心言不遑啓處以身言人之為人身心而已心憂身勞而行役之情可知故先言之翩翩者隼三句興二句王事靡盬忠也將父將母孝也忠孝人之大節父母人之大倫行役而念室家者常情念父母者至性聖人體人之情語其至者故本人情於至性寓大節於私恩既知其勞而忠尤知其忠而孝故不特有以慰其心而且可以勉其德所以為聖者之作與末章述前四章之意而申結之舉四駱以見四牡言母以見父文法也若曰因上章之文則亦兼父言矣作歌雖曰設言然前之所言即所以代之歌故曰是用或以為前之所言者未足以盡其情故復欲聞其歌云皇皇者華于彼原隰侁侁征夫每懷靡及我馬維駒六轡如濡載馳載驅周爰咨諏我馬維騏六轡如絲載馳載驅周爰咨謀我馬維駱六轡沃若載馳載驅周爰咨度我馬維駰六轡既均載馳載驅周爰咨詢按此篇永樂大典缺卷常棣之華鄂不韡韡凡今之人莫如兄弟死喪之威兄弟孔懷原隰裒矣兄弟求矣脊令在原兄弟急難每有良朋况也永歎兄弟鬩于牆外禦其務每有良朋蒸也無戎喪亂既平既安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛宜爾室家樂爾妻帑是究是圗亶其然乎按此篇永樂大典缺卷伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣求其友聲相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平伐木許許釃酒有藇既有肥羜以速諸父寧適不來微我弗顧於粲灑掃陳饋八簋既有肥牡以速諸舅寧適不來微我有咎伐木于阪釃酒有衍籩豆有踐兄弟無逺民之失德乾餱以愆有酒湑我無酒酤我坎坎鼓我蹲蹲舞我逮我暇矣飲此湑矣以伐木興鳥鳴取辭意相應後章用首章興不必與下文相關詩之體也東山皆以四句賦發辭體與此同相彼者觸物而有感於外矧伊者反已而有動於中猶者相形之辭以彼形此以見已求友之本心朋友以義合以信交人能篤信義則神聽之而和平所以質諸神者欲朋友知已好友之誠意和平謂神和平和平屬神小明神之聽之之下言以女介爾皆指神則此和平亦指神何疑聲字重韻為韻朋友有父執先輩有同儕後輩酒美牡肥致潔盛陳待尊者之禮也寧彼適不來而無以不召致咎待尊者之情也酒多器設待同儕之禮也恐以小節致愆而欲不計有無但及閒暇而與歡飲待同儕之情也蓋雖皆欲盡其先施之道然待尊卑有宜處隆殺有等制厚薄有節文無不具而情無不至義無不適而禮無不厚此所以能致已之情樂友朋之心而無愧于神明也燕朋友無不欲其來而曰寧適不來豈逆其不來而僞召之乎蓋設言其來耳古人無間暇飲酒之禮又沽酒聖人不食今云然者亦設言之耳且上言釃酒而下言無酒其設言可知蓋欲致其先施之意故其言如此首章統言求友後二章分言燕友而下文不相對蓋末兼結意也天保定爾亦孔之固俾爾單厚何福不除俾爾多益以莫不庶天保定爾俾爾戩榖罄無不宜受天百祿降爾遐福維日不足天保定爾以莫不興如山如阜如岡如陵如川之方至以莫不增吉蠲為饎是用孝享禴祠蒸嘗于公先王君曰卜爾萬壽無疆神之弔矣詒爾多福民之質矣日用飲食羣黎百姓遍為爾德如月之恆如日之升如南山之壽不騫不崩如松柏之茂無不爾或承歐陽公言天保其辭重復蓋人臣報君無以措其意則惟稱願其獲福而已然其意已至而猶以為未至是以其辭繁復而不能已此報君之至情也今考其辭既曰保曰定而又曰孔固單厚曰除曰多益曰庶曰戩榖曰無不宜曰有曰遐曰日不足曰興曰方至曰增曰萬曰無疆曰多曰遍為曰恆曰升曰不騫不崩曰茂曰承言保定爾俾爾者各三言降爾卜爾詒爾者各一言何不一言莫不無不者三言如者九言福者三言壽者二而又曰祿曰德其繁復亦至矣然意有序而不亂辭相變而不齊故雖繁復而不覺善於咏者也君尊也其能豫君以福者惟天惟祖宗而已故首言天次言祖宗祝君之體也篇首直從天說起只言福而不言所以為福次及祖宗乃言其以孝致福乃以祖享豫壽為福乃以民質助德為福蓋天尊也故統言之祖宗親也故二章詳言之而天亦不外乎是至末章則總言之孝者福之本福者孝之效豫壽助德者福之實也又此篇有天人交相與之意蓋天固有以與之尤必君有以受之則天又常以與之矣故除受承三字皆有深意除如嵗除舊嵗將除而新嵗復至也承如松柏舊葉落而新葉已生也受猶今人言容受消受如海能容受天下之水又能消受天下之水不可限量也君若足以容受消受天下之福則天既豫之而又豫之相除相承亦豈有限量哉若有時而滿則無以受之矣天雖欲豫之豈可得乎故此篇此受字屬君非可泛以受福之受觀之此意愚聞之先師云采薇采薇薇亦作止曰歸曰歸嵗亦莫止靡室靡家玁狁之故不遑啓居玁狁之故采薇采薇薇亦柔止曰歸曰歸心亦憂止憂心烈烈載飢載渴我戍未定靡使歸聘采薇采薇薇亦剛止曰歸曰歸嵗亦陽止王事靡盬不遑啓處憂心孔疚我行不來彼爾維何維常之華彼路斯何君子之車戎車既駕四牡業業豈敢定居一月三捷駕彼四牡四牡騤騤君子所依小人所腓四牡翼翼象弭魚服豈不日戒玁狁孔棘昔我往矣楊柳依依今我來思雨雪霏霏行道遲遲載渴載飢我心傷悲莫知我哀按此篇永樂大典缺卷我出我車于彼牧矣自天子所謂我來矣召彼僕夫謂之載矣王事多難維其棘矣我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不旆旆憂心悄悄僕夫况瘁王命南仲往城于方出車彭彭旗旐央央天子命我城彼朔方赫赫南仲玁狁于襄昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啓居豈不懷歸畏此簡書喓喓草蟲躍躍阜螽未見君子憂心忡忡既見君子我心則降赫赫南仲薄伐西戎春日遲遲卉木萋萋倉庚喈喈采蘩祁祁執訊獲醜薄言還歸赫赫南仲玁狁于夷采薇遣戍出車勞還而出車之辭多與采薇不相應采薇言戍役出車言城築攘伐采薇不指名主將出車則指名南仲采薇言孔棘於在戍時出車則以多難且急而往采薇言君子小人為常例戍役之將士出車南仲固非常例戍役所宜任伐西亦非常戍北者所當行采薇言豈敢言豈不或戰或守無必定之計出車言戰勝執獲而還之事彼遣此勞言不相應竊疑出車為勞南仲之詩其後乃移而為勞還之常用耳又疑遣戍乃每嵗常制不必常遣大將又不必皆天子親命也出車乃因玁狁內侵踰越城邑其勢甚急故天子親命大將特往城築而驅逐之乘勝西伐而還又守備四夷不命之方伯連帥而王畿之民往任戍邊意者周西邊戎北則邊玁狁其地無方伯諸侯故周以畿內之民戍之耶然出車所言乃大將率師自天子所由牧厯郊而往似非畿內常役也故愚疑遣勞之詩其初先有采薇後定尊卑異等之制乃一采舊一新作以勞還歟此二章泛為將帥自言承王命召僕夫出車建旐設旄而往者以多難而且急故已憂而僕悴也未言其所如往未見大將之為誰也三章乃明言主帥大將為南仲其往也為朔方城築攘伐玁狁之事首言王命見王命將之重繼言命我見大將傳命令衆之嚴終言于襄見功成之赫赫稱贊而歸美之也此章備見此篇所詠軍事之本末蓋詩有首章即見詩意者采薇是也中篇方見者此篇是也有末章乃見者采芑是也四章亦為將帥自言其往來之所遭其嵗月雖可與采薇相合然此乃南仲出師往還之嵗月不必合采薇而論之可也以簡書為戒命則將帥皆可言以為臨遣策命則必大將重事乃有之非常典所用也五章為將帥家人言之召南草蟲有此語亦大夫妻之詩也末章又為將帥至家之言蓋前章為將帥家人言將帥未歸之由由伐西戎而未歸也此為將帥自言至家和樂之由由玁狁夷故歸而樂也然赫赫之詞皆歸功於南仲故曰此勞南仲之詩而偏禆副二之將帥皆在其中則受是勞者其有不感恱者乎二詩皆首言往末言還敘事相似蓋詩有起結自然之體也有杕之杜有睆其實王事靡盬繼嗣我日日月陽止女心傷止征夫遑止有杕之杜其葉萋萋王事靡盬我心傷悲卉木萋止女心悲止征夫歸止陟彼北山言采其杞王事靡盬憂我父母檀車幝幝四牡痯痯征夫不逺匪載匪來憂心孔疚期逝不至而多為恤卜筮偕止㑹言近止征夫邇止前二章首四句是追述其在戍時歎已久役而傷悲後三句是述其想像家人之思已末一句思已之詞也家人不自稱女心也後二章乃述其室家望君子之辭王事靡盬見其為忠憂我父母見其為孝與四牡意同末章言父母室家之情不來則心之孔疚惟憂其不來而已若期已過而不來則莫知其故故為之多端憂慮多謂非止於一端也一字亦曲盡人情憂疑多端則卜之筮之而合言其近亦足寬已之思既而果近而將至其喜為何如不言既歸而既歸之喜可知矣南陔白華華黍魚麗于罶鱨鯊君子有酒旨且多魚麗于罶魴鱧君子有酒多且旨魚麗于罶鰋鯉君子有酒旨且有物其多矣維其嘉矣物其旨矣維其偕矣物其有矣維其時矣愚謂傳言所薦之羞下當有以起興三字不然則賦矣極道其下當有酒字燕饗皆有酒惟食無酒故此以魚興酒而多旨有皆止詠酒耳有與又通謂既有又有接續不絶亦多之意物兼酒與羞言嘉如大饗之尚腵修肉乾酒清而不食飲取其嘉也不貴多品也尚其敬而已矣偕如酒醴與𤣥酒並列鉶羮與大羮同陳與其偕也不饗其味也尚其質而已矣時如春行羔豚不必腒鱐冬行鮮羽不必羔豚隨其時也不强有也尚其誠而已矣蓋多旨有禮之備也嘉偕時禮之精意也既盛稱備物以見其意之勤復約言精意以深見其勤蓋慈惠恭儉之意而言之所以為燕饗通用若止稱盛多以為勤則儀不及物矣亦可饗乎以是優賔恐非所以為優也由庚南有嘉魚蒸然罩罩君子有酒嘉賔式燕以樂南有嘉魚蒸然汕汕君子有酒嘉賔式燕以衎南有樛木甘瓠纍之君子有酒嘉賔式燕綏之翩翩者隼蒸然來思君子有酒嘉賔式燕又思魚既嘉矣又罩汕不一而皆得之有樂意故以興樂衎綏之謂賔樂而心安於我忘其孰為賔孰為主而心與之一此樂之至也又思以見至誠有加而無已蓋雖不復言樂而欲賔樂無窮之意亦隱然於其中主人意欲樂賔而工道主意言賔樂至於相安則至矣而又道其無已之誠是猶以主人樂賔之意為未至也可謂善於道人之意者矣崇丘南山有臺北山有萊樂只君子邦家之基樂只君子萬壽無期南山有桑北山有楊樂只君子邦家之光樂只君子萬壽無疆南山有杞北山有李樂只君子民之父母樂只君子德音不已南山有栲北山有杻樂只君子遐不眉壽樂只君子德音是茂南山有枸北山有楰樂只君子遐不黃耇樂只君子保艾爾後詩人先有一再歎咏君子之意故托興亦以二山二草之崇髙盛多者而言與有榛有苓有樞有榆之興不同觀下文兩稱樂只君子可見此又詩之一體後章皆承此興而易其韻非有異義也此詩必屢稱樂只君子而咏嘆之尊敬之意藹然已見下文美其德者頌也祝其壽者禱也前章言君子為邦基本而有光華末言所以為基本而光華者至第三章而後言所以能立邦家之基者由其德能使民父母之蓋民為邦本也所以有邦家之光者由其為民父母之令聞不已也此君子之德實也然先言基言光而後及此者先虛後實咏歌優遊之體也且詩凡五章皆言德壽此章居中敷言德而不言夀意可知矣後二章變其文而進其意前二章先德後壽後二章先壽後德前曰無期無疆後兩曰遐不言已壽而益壽也茂指德之在今日者後指德之在後人者言德音不已於今者益茂而後又不已也首先稱德而末又専歸重於德蓋尊賔者尊其德齒而德尤尊尊賔莫大於此故以此始終焉三詩皆與鹿鳴相關始歌鹿鳴主人自道其情及笙樂既畢則又為樂工之詞以申道之鹿鳴已包厚賔樂賔尊賔之意至此申達此意則分為三詩所以益致其情也然鹿鳴歸重於德此三詩至南山有臺之詩乃専以德終之蓋合前歌間歌而始終於德所以樂而不淫和而不流也三詩有序優而後能樂優而不樂雖多奚為樂之而後能尊之然不知所尊則唯口體之奉耳烏足尚哉由儀蓼彼蕭斯零露湑兮既見君子我心寫兮燕笑語兮是以有譽處兮蓼彼蕭斯零露瀼瀼既見君子為龍為光其德不爽壽考不忘蓼彼蕭斯零露泥泥既見君子孔燕豈弟宜兄宜弟令德壽豈蓼彼蕭斯零露濃濃既見君子鞗革沖沖和鸞雍雍萬福攸同既見而此心輸寫如此則未見而想慕何如也燕笑語諸侯燕而相與笑語譽處謂名美而身安世有身安而無美名者不足樂也此有善譽而安樂斯可謂之安樂矣此皆指諸侯參之裳裳者華之譽處可見我心寫兮者天子見諸侯而喜是以有譽處者諸侯得天子而樂上下交歡之意也此章天子自述已與諸侯相見之情即有藹然歡愛之意後章乃致頌禱寓勸戒湛露采菽行葦皆然此所以為燕樂也凡詩敘事未易敘情尤難為龍為光言諸侯之來足為天子之輝光褒美之也其德頌之也壽考祝之也不爽因頌其德而以不爽為戒不忘謂人不能忘觀烈文可見因祝其壽而以不忘為勸也孔燕兼言燕飲燕樂豈弟謂德將無醉兄弟凡同氣同宗同為列國同時朝㑹燕饗者皆兄弟也此必有諸侯同在燕席者故以家人之兄弟美之舉親以包疏也豈兼不爽不忘言故樂此章褒美頌禱勸戒與前章同末章則不復重述惟稱其服飾福祿而已所謂不盡人之歡者與湛湛露斯匪陽不晞厭厭夜飲不醉無歸湛湛露斯在彼豐草厭厭夜飲在宗載考湛湛露斯在彼杞棘顯允君子莫不令德其桐其椅其實離離豈弟君子莫不令儀私燕燕同姓諸父兄弟于路寢醉言其節宗言其所二章蓋互見也不醉無歸以情言載考以禮言情以愛為主禮以敬為主禮勝則離故首言不醉無歸以致其相愛之情樂勝則流故次言載考以致其相敬之禮情欲洽而禮欲成夜飲之本意也故於首次二章言之先情後禮者禮以情而行燕以樂為主也德兼內外以顯允為備言顯於外而實於中故顯允之人其德無不令者儀主容貌以和易為美言和易在中而形于外故豈弟之人其儀無不令者德即德將無醉之德儀即飲酒孔嘉維其令儀之儀燕久則易怠既醉則易肆失德失儀多在此時况夜飲乎故以令德令儀褒美之而因以寓戒焉令德因前章之興令儀則别取興興有因易而下文所咏相對亦是一體邶緑衣似之彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之彤弓弨兮受言載之我有嘉賔中心喜之鐘鼓既設一朝右之彤弓弨兮受言櫜之我有嘉賔中心好之鐘鼓既設一朝酬之諸侯朝正燕詩猶戒此賜彤弓使得専征賜大任重而詩無勸戒何也蓋王賜彤玈自有誥命如文侯之命稱美戒勉之辭已具故此惟述其賜豫燕饗之情而已然詩言藏之重好之誠豫之速如此使諸侯能體此意必能思盡其道矣一詩之意備於首章後章特申述之耳藏統言其在王府弓必先櫜而後可藏也中心二字包喜好大飲賔曰饗右謂坐賔於右所以尊賔也酬謂酌自飲而飲賔所以厚賔也二者皆燕饗中一事故曰後章止申述以致再三殷勤之情而已菁菁者莪在彼中阿既見君子樂且有儀菁菁者莪在彼中沚既見君子我心則喜菁菁者莪在彼中陵既見君子錫我百朋泛泛楊舟載沉載浮既見君子我心則休首章為興蓋以莪之在彼興我之有此言莪則盛而在彼中阿我見君子則樂而有此禮儀儀謂燕飲之儀待賔客之禮也此篇所以見其為燕飲賔客者以此或以為比者為後章起也當各隨下文觀之凡詩末章有總始終言者此兼未見既見言所以結之也愚按毛傳菁莪後為六月以六月為變雅之首集傳謂楚茨而下十篇疑正雅錯脫在變雅又謂魚藻采菽與楚茨等相類按楚茨十篇元在鼓鐘後青蠅前魚藻二篇在賔筵後角弓前今若從傳移置此十二篇于菁莪之後不惟可復正雅之全且使武成康之際祭祀朝㑹田獵燕饗務農講武之典略備于正雅之中而一代之盛治為可考說者不必曲說而辭意自明白豈不韙歟六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急王于出征以匡王國比物四驪間之維則維此六月既成我服我服既成于三十里王于出征以佐天子四牡修廣其大有顒薄伐玁狁以奏膚公有嚴有翼共武之服共武之服以定王國玁狁匪茹整居焦穫侵鎬及方至于涇陽織文鳥章白旆央央元戎十乘以先啓行戎車既安如輊如軒四牡既佶既佶且間薄伐玁狁至于大原文武吉甫萬邦為憲吉甫燕喜既多受祉來歸自鎬我行永久飲御諸友炮鱉膾鯉侯誰在矣張仲孝友首舉六月中含數意一紀出兵之時二表用兵之急三見不得已四見事關匡正之大也王國謂中國也匡正中外之分也與一匡天下之匡同次章承首章載服用急之意而言四驪見雖急而馬有餘練有素馬間服成於本月見雖急而應變從事之敏速于三十里見雖急而行止之有常度皆承用急而言兩言王命出征皆暗指大將三章言軍容盛大故可以建大功武事嚴敬故足以定王國王國定而中外分定矣亦暗指將帥前章言孔熾而不言所以熾言伐而不言伐之所在暗言將帥而不言將帥之為誰至四章方明言其深入而後知所謂急者誠不可緩五章明言大將吉甫而後知承王命匡王國者有文武全才此所以大功成王國定也此章方歸功吉甫末章専言吉甫功成來歸燕飲之事舉張仲而言孝友者尊德也且以見吉甫之有德非特才全而已此二章皆稱吉甫者蓋一篇之意歸宿於此此詩之所由作也其敘事先後次第甚明矣舊說以為美宣王非也此美吉甫也宣王北伐之事因此而見之耳嵩髙蒸民之作見吉甫之文六月所詠見吉甫之武吉甫作者也美吉甫者亦必作者也而當時有其人焉則韓奕江漢諸詩序以為吉甫所作者傳安得無疑歟薄言采芑于彼新田于此菑畝方叔涖止其車三千師干之試方叔率止乘其四騏四騏翼翼路車有奭簟茀魚服鉤膺鞗革薄言采芑于彼新田于此中鄉方叔涖止其車三千旗旐央央方叔率止約軧錯衡八鸞瑲瑲服其命服朱芾斯皇有瑲葱珩鴥彼飛隼其飛戾天亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼓陳師鞠旅顯允方叔伐鼓淵淵振旅闐闐蠢爾蠻荆大邦為讎方叔元老克壯其猶方叔率止執訊獲醜戎車嘽嘽嘽嘽焞焞如霆如雷顯允方叔征伐玁狁蠻荆來威此詩以采芑起興而于田于畝有耕者不變之意于此中鄉有與民雜居軍無私焉之意賦其事以起興亦可因興而見其事也涖謂臨之於上故下言軍旅車干之盛率謂率之以已故下専言方叔所乘所服之美徒能臨之而不能率之豈得為賢將故此篇特以率止終篇而各詳其實焉其車三千總言其盛師干之試見師衆之練習旗旐央央見號令之精明四騏而下見其為大將約軧而下見其為命大夫若謂在軍中服此命服則是以辭害義矣三章言戰故不復以采芑起興而以隼之飛止興用軍之進退再言師干之試為將戰也率止下乃言將戰未言進兵振旅而特稱顯允方叔者大其用兵之有法而美之也末章言蠻荆服叛之始終即此篇所詠用師之本末也說見出車獨言率止者見方叔不特能壯其謀蓋在軍又能親任勞苦將率三軍而身先士卒者乎此戰所以勝也執訊獲醜見戰勝而凱旋戎車而下見師完而聲振再稱顯允方叔所以大其信威懷逺之功也後世用兵有合於此者其惟諸葛孔明乎
