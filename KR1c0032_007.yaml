body:
  text: 詩纘緒卷七元劉玉汝撰唐蟋蟀在堂歲聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿蟋蟀在堂歲聿其逝今我不樂日月其薖無已大康職思其外好樂無荒良士蹶蹶蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休詩惟七月篇兼用三正外此則皆夏正此篇曰歲曰九月皆夏正也春秋晉史所言皆述夏正則此篇歲月自當為夏正可知追言蟋蟀在堂而已憂歲暮所謂思逺者此也其終歲勤苦不敢為樂而即以過樂為戒則此所謂樂特唐人之樂耳良士之樂雖曰無荒亦豈如是之甚耶唐人得而知之是則唐人之樂未見其過但見其憂之過耳其憂思可謂深逺矣夫勤儉固帝堯之遺風然憂思之深逺視時雍之黎擊壤之老為何如此唐風之所以變歟周禮有大蠟之禮樂禮記有伊耆氏始為蠟而行之於十二月也鄭氏謂伊耆氏堯之别名十二月建亥之月按詩言十月納稼滌場則周之收農息老蠟固應在亥月夏商正朔不同則商當在子夏當在丑堯命羲和皆用夏時則伊耆之蠟當在建丑之月皆歲晚務間之事也此詩所言正與相合則此詩之宴樂其祭蠟之飲乎子貢曰百日之蠟一日之澤其猶醵歟正謂蠟也唐都帝堯之故墟而醵飲為一日之樂謂非堯之遺風可乎山有樞隰有榆子有衣裳弗曳弗婁子有車馬弗馳弗驅宛其死矣他人是愈山有栲隰有杻子有廷內弗灑弗掃子有鐘鼓弗鼓弗考宛其死矣他人是保山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室以二有興二有取有字相應四弗直言以喻之何不且以婉言以勸之皆所以解其憂也然弗曳弗婁何至於即死而曰死見其死死亦何至為他人所取而曰他人是保所謂憂愈深而意愈蹙者以此蓋為之者與言之者皆不合乎中道非聖人之所與也然存之使讀者知風之自而謹所擇揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂揚之水白石粼粼我聞有命不敢以告人晉雖微弱君也曲沃雖盛強臣也晉人乃不以晉弱為憂而惟沃盛是從且以得見君子為樂不得見為憂至聞其有命而為之隱是但知強弱之勢不知順逆之義至形於歌詠而無所忌憚於是晉故國勤儉之風既久而益衰深逺之意太過而反昏矣大抵晉居北方風氣剛徑其君善治則民亦能確守先王之遺風而不改其舊一見衰微有以強盛之勢利鼓舞之則其衽金革之氣不能自已於是勇往相從顯言無忌而不知其不可矣嗚呼為民上者可不謹其所以導民之術哉椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且逺條且椒聊之實蕃衍盈掬彼其之子碩大且篤椒聊且遠條且此當云興而又比例見漢廣諸篇前興後比各取一物此篇後比仍用上所興物更發一義而極言之又前興後比之一體非工於歌詠不能也上再歎椒下又歎其條之逺則實益多之意自見此雖六字而有餘味且者歎辭也既亟只且其樂只且亦皆歎辭綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何綢繆束楚三星在户今夕何夕見此粲者子兮子兮如此粲者何古者昏姻以時而行禮以昏今男女失時而後得遂其夫婦之禮故從初昏至夜分因束薪見星以綢繆類婚姻之事星見為婚娶之時遂託興而各為自慶之言詩人敘之而先敘婦語夫者婚姻失時而得遂尤為女子之幸願所謂所仰望以終身者也以子兮子兮為自謂自慶深得人情合詩意喜自慶而尤恐已無以當之其喜為何如非工於歌詠不能也次章當即及夫語婦而乃敘其相語者承上起下之體也邂逅謂不期而相遇猶今言天緣遇合也至此夜分猶因所見而相語如此其喜可知首稱良人専敘夫詞末敘夫語并及妻妾得尊卑之序合閨門之和皆喜之意也良人邂逅粲者各章重韻為韻有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉以二句興一句詩有此體豈無他人自釋所以獨行之故所謂獨行固非特立獨行人不得而親亦非狷介自守而與人不親特以無父母兄弟宗族之助而不免於孤特耳是以人之生也五者之大倫不可缺一也父母俱存兄弟無故猶必資朋友以自輔況孤特而求助於人斯亦當然之事也而五倫本乎天性天性之發必先父母次兄弟又次宗族然後及于朋友他人也施之得其序然後無愧於已無悖於理而人之親已者亦得盡其情若不敬其親而敬他人則謂之悖理矣不愛其親而愛他人則謂之悖德矣人亦豈能親己哉今其人先言不如我同父同父不可得則莫如我同姓同姓又不可得然後求助於行路之人則為之朋友者可知矣故此詩不如我同父同姓之語其義正其情哀其意若以是心而求助夫豈患人之不相親相助哉蓋當此之時先王之教猶有存者焉故其言有序而於理無悖如此後四句不易其辭重其求助也羔裘豹袪自我人居居豈無他人維子之故羔裘豹褎自我人究究豈無他人維子之好爾雅云居居究究惡也毛傳曰懷惡不相親比之貌究究猶居居箋曰云云李巡曰居居不狎習之惡孫炎曰究究窮極人之惡集傳曰未詳又曰此詩不知所謂不敢強解今以爾雅毛鄭諸儒之説仍備于前庶見此詩非無解者而集傳不敢強解則繼是解者可以無容喙矣肅肅鴇羽集于苞栩王事靡盬不能藝稷黍父母何怙悠悠蒼天曷其有所肅肅鴇翼集于苞棘王事靡盬不能藝黍稷父母何食悠悠蒼天曷其有極肅肅鴇行集于苞桑王事靡盬不能藝稻粱父母何嘗悠悠蒼天曷其有常國風之言王者有四焉邶北門衛伯兮唐鴇羽秦無衣皆東遷以後豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮案此篇永樂大典缺卷有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之有杕之杜生于道周彼君子兮噬肯來遊中心好之曷飲食之人之好賢者苟能謙已以相尊而不敢必其惠顧盡誠以相愛而常思致其殷勤則不患不足以得賢矣蓋自比杕杜謙也噬不敢必也曷不自足也君子之待賢者必有筐篚幣帛以將其意飲食燕饗以通其情貧弱而不能為禮則惟有飲食庶可接其殷勤然猶以為無自而致之其好賢之心於是為至故傳云恐不足以致正此意而章末二言不易其辭者亦此意也各章二之字重韻為韻此篇與前杕杜首章句同而篇名異或以表篇題或以别音節於此尤可見葛生蒙楚蘞蔓于野豫美亡此誰與獨處葛生蒙棘蘞蔓于域豫美亡此誰與獨息角枕粲兮錦衾爛兮豫美亡此誰與獨旦夏之日冬之夜百歲之後歸于其居冬之夜夏之日百歲之後歸于其室以二物興一事又是一體詩稱亡此愚謂出奔之謂亡舅犯曰亡人無以為寶意者此篇之作婦人以其夫出亡在外而未得歸故思之切如此豫美指其夫樂府有指夫為歡者亦此意與助也出亡必有助也獨處自謂晉公子夷吾公子重耳皆出亡在外而各有從者四五二章言歸無期而不可得見則要死以相從蓋惟出亡則歸無期故言其居其室有從一之意焉若據詩辭則未見其必然亦姑從序説歟采苓采苓首陽之巔人之為言苟亦無信舍旃舍旃苟亦無然人之為言胡得焉采苦采苦首陽之下人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉案此篇永樂大典存無解秦有車鄰鄰有馬白顚未見君子寺人之令阪有漆隰有栗既見君子並坐鼓瑟今者不樂逝者其耋阪有桑隰有楊既見君子並坐鼓簧今者不樂逝者其亡此所謂秦君未知為何君秦仲為附庸之君其詩未必見采襄公為諸侯之君然後太師乃采其詩歟秦地本在西周畿內其民於先王之禮樂文物稔聞而熟見也秦君始有車馬僕侍琴瑟其視先王為何如而即驚見誇美之乎豈秦之地僻在深山窮谷其民長子老孫安於文武成康之化日用飲食淳厚質朴未嘗入城邑未嘗見尊貴至是秦君來邑於此民始相親是以創見其始有而遂誇美之乎又或西都盡汙戎俗先王典禮掃地殆盡至是秦君來邑於此始為君侯而有車馬禮樂是以邑民因見而誇美之乎又或秦君始封雖有車馬琴瑟而猶與其民相親狎無異於平日是以民當國破戎退之後見其始有而誇美之乎於是秦國之風有可感者多矣何以見其始有君有寺人琴瑟乃其常事今特以此誇美之故可見其為始有有而未見而寺人之令粗備人君之儀既見而並坐猶存友朋之素蓋雖為之君而猶未敢儼然以君臨之也又禮有始封之君不臣諸父兄弟之文以此又可知為始有歟寺人之令禮之小節故一言之鼓瑟鼓簧樂之常用故再言之駟驖孔阜六轡在手公之媚子從公于狩奉時辰牡辰牡孔碩公曰左之舍拔則獲遊于北園四馬既間輶車鸞鑣載獫歇驕前篇稱君子此篇稱公公非附庸之君所得稱秦其已為諸侯乎媚子從狩尤不足稱而誇美之亦以具始有故也此篇序田獵雖止三章而始中終之事皆備序事之法也以車載犬傳記不載惟韓公畫記言騎載犬則此詩所言虞人翼獸周之制也載獫歇驕其戎俗乎小戎俴收五楘梁輈遊環脅驅隂靷鋈續文茵暢轂駕我騏馵言念君子溫其如玉在其板屋亂我心曲四牡孔阜六轡在手騏駵是中騧驪是驂龍盾之合鋈以觼軜言念君子溫其在邑方何為期胡然我念之俴駟孔羣厹矛鋈錞蒙伐有苑虎韔鏤膺交韔二弓竹閉緄縢言念君子載寢載興厭厭良人秩秩德音首章先言車而後及所駕之馬言馬者一言而已次章先言馬而後及所乘之車言車者二言末章兼言車馬矛盾而于弓矢為詳秦人性強悍尚勇敢又值犬戎之變而事戰鬭其平居暇日所以修其車馬器械以備戰伐之用者無不整飾而精緻故家人婦女亦皆習見而熟觀之而襄公又能以王命命之大義驅之其民勇于赴鬬而甘于死敵故其家人婦女亦深喜而樂道之是以此詩之作其於車馬器械之細微曲折隨意形容各盡其制隨韻長短各諧其聲參差錯雜各得其詞而于君子之敵王所愾者又能極情思念而皆合于義焉蓋是時西都雖已陷戎而先王之遺澤二南之餘風草蟲汝墳殷雷之正義猶有隱然於人心者故小戎無衣之形於歌詠亦不自知其適于義特昔為和平之音而今則變為剛烈之氣耳故嘗以為秦襄公有周八百里之地雖曰習戎攻伐専尚勇力而實藉先王之德澤在人心而得以成其功耳使平王能因是人心以返故都秦襄亦能因人心而迎王歸京師則嵩髙蒸民江漢常武當再見于平王襄公而宣王與申甫方召不得専美而王風秦風不作矣故陷秦于戎而詩遂列于變風之間君子固為平王惜尤為秦襄而惜之也蒹葭蒼蒼白露為霜所謂伊人在水一方遡洄從之道阻且長遡遊從之宛在水中央蒹葭淒淒白露未晞所謂伊人在水之湄遡洄從之道阻且躋遡遊從之宛在水中坻蒹葭采采白露未已所謂伊人在水之涘遡洄從之道阻且右遡遊從之宛在水中沚蒹葭白露言其時耳因下文言水故以見其時之水盛非以詠水也之字指伊人二在字皆指伊人所在也道阻且長固不可至中央則近矣又坐見伊人在彼而已其求而不可得之意自見於言外所以為善詠傳謂不知其何所指者懲穿鑿戒傅會也他云未詳或云不知何謂之類意同此此詩三章一意無淺深次第不過再三詠之而已耳終南何有有條有梅君子至止錦衣狐裘顔如渥丹其君也哉終南何有有紀有堂君子至止黻衣繡裳佩玉將將壽考不忘以何發問起語法也篇中亦有用此起語者彼爾維何是也説見何彼襛矣錦衣狐裘諸侯之服黻繡佩玉祭祀之服其君也哉稱之也壽考不忘願之也秦君至是始有人君之衣服始有人君之容貌威儀故國人美之之意雖與車鄰駟驖同而其所稱願視前願其鼓瑟為樂稱其載犬以獵者其氣象不侔矣蓋秦君祛戎立國以漸而得中國人君之體故諸詩先後之序如此而此詩所言為先王法服有人君體貌得頌禱遺意其所以致是者雖秦俗已不純而文武之道未盡墜豈無或識其小者哉此詩最可見也今之讀秦風者但以秦視秦君而不以西周視秦人則見秦而不見周使先王纍葉之澤歘然而斬豈不誤哉夫唐去堯逺矣猶有遺風西周之為秦未久也而反唐之不若是何薄待吾文武成康周宣而蔑視人心天理哉交交黃鳥止于棘誰從穆公子車奄息維此奄息百夫之特臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身交交黃鳥止于桑誰從穆公子車仲行維此仲行百夫之防臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身交交黃鳥止于楚誰從穆公子車針虎維此針虎百夫之禦臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身此詩分三良為三章所興各從三良之字易之以叶韻無所取義也前篇秦人見秦君之法服猶有喜幸之意至穆公之變於夷康公從父亂命擅制殺人而又殺其良先王之遺俗盡於此乎觀此詩三良固可哀也而秦亦可哀矣鴥彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多山有苞櫟隰有六駮未見君子憂心靡樂如何如何忘我實多山有苞棣隰有樹檖未見君子憂心如醉如何如何忘我實多秦人徑悍而染戎俗故輕室家而寡情義然婦人述已憂夫之切怪夫忘我之多而如何如何之詞極婉曲而不直致且猶有望之之意焉故三章之意重在後語雖非復二南之風然謂秦俗之盡變于戎亦未可也扊扅之歌見風俗通百里奚為相所賃浣婦能歌而不識其為妻事奇而理不通恐歌則有之事未必然也豈曰無衣與子同袍王于興師修我戈矛與子同仇豈曰無衣與子同澤王于興師修我矛戟與子偕作豈曰無衣與子同裳王于興師修我甲兵與子偕行案此篇永樂大典缺卷我送舅氏曰至渭陽何以贈之路車乘黃我送舅氏悠悠我思何以贈之瓊瑰玉佩送行而止述其送贈懷思之情而不及其所事者正得送别之體文選中送贈詩多如此蓋古意也嵩髙蒸民德業崇隆關繫重大故辭意氣象皆淵深宏濶而為大雅之作非可與國風例論也又況康公特為太子重耳歸晉之故已無與焉止述親親懷念之意尤得世子之體於我乎夏屋渠渠今也每食無餘于嗟乎不承權輿於我乎每食四簋今也每食不飽于嗟乎不承權輿案此篇永樂大典缺卷陳子之湯兮宛丘之上兮洵有情兮而無望兮坎其擊鼓宛丘之下無冬無夏值其鷺羽坎其擊缶宛丘之道無冬無夏值其鷺翿詩有首句中用一字而即見全篇之意者此詩是也惟用一湯字而下文所詠之歌舞皆非其正可知宛丘上下無定所也無冬無夏無定時也有情無望寫出遊蕩歌舞之情態最可想見擊鼓擊缶歌也鷺羽鷺翿舞也首章先見逰蕩之情而後疊見歌舞之事實事實易敘而歌舞難畫故有情無望最善形容傳謂歌舞之俗本於大姬愚謂歌舞祭祀而褻慢無禮楚俗尤甚屈原九歌猶然陳南近楚此其楚俗之薰染歟不然則伊川之被髮先有以兆戎矣東門之枌宛丘之栩子仲之子婆娑其下穀旦于差南方之原不績其麻市也婆娑穀旦于逝越以鬷邁視爾如荍貽我握椒作此詩者以為男子與女子皆可東門宛丘南方原市非一所矣子仲稱氏非賤者也越以衆往非一人矣既擇善旦又擇善旦言無常時但遇好日則會也既婆娑於彼又婆娑於此歌舞之餘又贈椒以交情好則聚會未已也績麻為女子本業今不以本業為務而以歌舞為樂故特喜其能棄業而來會也折芳馨兮遺所思楚俗尤甚衡門之下可以棲遲泌之洋洋可以樂飢豈其食魚必河之魴豈其取妻必齊之薑豈其食魚必河之鯉豈其取妻必宋之子身之所居心之所樂若是其薄也而曰可以且飲食男女人之大欲而曰豈必其人之寡欲無求如此宜其隱居而有以自樂也孟子曰養心莫善於寡欲東門之池可以漚麻彼美淑姬可與晤歌東門之池可以漚紵彼美淑姬可與晤語東門之池可以漚菅彼美淑姬可與晤言陳男女之會皆為歌舞故此詩首曰晤歌後章曰語曰言皆歌以及之耳彼美為誰家之人淑姬又必非賤者之女而與之晤歌又且以為可亦若池之可以漚麻漚菅然曾不知其不可也陳風之不美可知東門之楊其葉牂牂昏以為期明星煌煌東門之楊其葉肺肺昏以為期明星晳晳此只言其負期耳而所託之興所見之景有足詠歌者凡詩欲吟哦上下諷詠者能於短章而有得焉斯可以觀大篇長章矣如此篇不必為男女期會只以章句諷詠自有意味不可以短章忽易之墓門有棘斧以斯之夫也不良國人知之知而不已誰昔然矣墓門有梅有梟萃止夫也不良歌以訊之訊豫不顧顛倒思豫夫也不知何所指不良不知其何事人有惡常謂人不知故為之不已人既知之則當改矣而不改者蓋自前至今而已然矣故首章極言切責其人從前之非人有過常謂無諫我者故自信而不疑今既有告者則當思人之言矣而亦不顧則必將有害故此章明言直告其人將來之禍既已切責其非又明告以禍其所以刺之者可謂能盡其情矣使是人果能聽之則昔之過可復於無過而何顛倒之足患哉防有鵲巢卭有旨苕誰侜豫美心焉忉忉中唐有甓卭有旨鷊誰侜豫美心焉惕惕以彼然興此不然然所興之物與此所事全不相涉興之體也此詩所言與丘中有麻鄭揚之水意頗相似然彼顯而此隱彼直而此疑此陳風所以不如鄭之甚歟或謂唐葛生豫美指其夫安知此詩非有人侜張其夫而愛之乎然侜其夫者不知為何人則當時如此人者多矣陳風豈不以此而可見乎月出皎兮佼人繚兮舒窈糾兮勞心悄兮月出皓兮佼人懰兮舒懮受兮勞心慅兮月出照兮佼人燎兮舒夭紹兮勞心慘兮因月出而感興思美人而不見為之勞心而不自已故三章一意惟變文叶韻以致再三之詠蓋作者亦欲詠歌以盡已意豈特讀詩者當吟哦諷詠哉傳謂男女相悅佼人男女皆可通稱東萊謂此詩用字聱牙意者其方言歟愚謂安知非作者喜為是聱牙語歟司馬揚雄賦中連綿亦多聱牙字胡為乎株林從夏南匪適株林從夏南駕我乘馬説于株野乘我乘駒朝食于株靈公君臣之事不可言惟首以胡為乎發問下以匪適答之而皆謂其從夏南則其往株林之故不言而言矣下章止言駕馬乘駒舍止飲食無往不在株林不復言從夏南而此意自可知故此詩既得婉曲譏刺之體尤得作詩省文之法不特從其子之言為忠厚也陳與楚鄰楚之猾夏最春秋之所惡而啓楚者陳實為之使陳君臣不淫夏徵舒不為弒逆楚莊安得假此大義以誅大逆而入夏受盟乎春秋豫楚辰陵而詩罪陳於株林聖人謹華夷致懲戒之意尤於詩可見也彼澤之陂有蒲與荷有美一人傷如之何寤寐無為涕泗滂沱彼澤之陂有蒲與蕳有美一人碩大且卷寤寐無為中心悁悁彼澤之陂有蒲菡萏有美一人碩大且儼寤寐無為輾轉伏枕蒲荷二物容色相鮮行澤陂之間見蒲荷之盛而美人一彼一此不得同處而並居則如之何而不傷感邪以蒲荷二物並居雜處容色相鮮興男女之相憶反不如蒲荷也
