body:
  text: 詩纘緒卷一元劉玉汝撰周南關關雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之興有二例有無取義者有有取義者傳前以彼此言者無取義也後言摯而有别和樂恭敬者兼比也兼比即取義之興也傳兼二義故云後凡言興者倣此欲學者各隨文意而推之集傳首舉文王固此詩本㫖亦以正舊説之非也首章雖先言淑女後言文王然重在君子文王也其興闗雎有和樂恭敬意賦窈窕有幽閒意然皆不明言至於太姒則曰淑女於文王曰君子於匹配曰好逑皆稱美之常辭耳然味其中雖極盛之德亦可於此而見故傳下文既云見其一端又云關雎舉其全體而言意蓋如此朱子又言關雎深奥張子則言以平易求之則意逺以廣此類即可推矣傳既言幽閒又曰貞静惟貞故幽惟静故閒表裏之謂也匡衡之説最得女徳外著幽閒之意此與末章託興惟取辭字相應以起詞語錄有順潔之説然本章無此意傳亦不言不得取此義大序傳言關雎興兼比者祇言首章耳首章詠文王后妃之徳詞雖常而意已至次末二章詩人止自述已憂樂之情而已其於后妃雖止用前窈窕淑女一語而全章之意皆在此一語之中蓋詩後章承前章多有意如此者故其詞雖畧而意自備后妃之徳愈可見蓋己之所以憂樂者以此人此徳世不常有故也使可常有何以能使人為之憂樂如是哉然其憂樂雖主后妃而實為文王而憂樂也其憂樂之情又各得其正此夫子所以稱關雎而朱子以為深奥者亦於此可見矣傳叶音於某字下云叶某反愚按詩音韻反切古今不同宋吴氏才老始為叶音補韻其考證諸書最為有據朱子取而用之於詩傳其間有未安者又從而釐正之使讀者音韻鏗鏘聲調諧合諷詠之間誠深有助然古人淳厚質實當風氣未開之時其言語聲音皆得天地自然之聲氣而合於天地自然之律呂自唐虞至於秦漢凡聖賢君子民俗之言語文章歌謠詞曲之見於經史子傳百家之書者莫不相合蓋古人之正音也後来光岳氣分而大音不全方言里語漸以訛謬而為韻書者又不能正之而一從俗音其意惟欲取便一時而不知其非古矣今吳氏補韻以正音為叶韻則是以後來之俗音為古人之正音豈其然哉今叶音之叶字竊謂當以古字易之如友下云古羽已反謂之古庶幾人知音韻之正以復先王之舊以本天地聲氣之初以終朱子釐正未盡之説而未知然否也孔子之言論作詩者性情之正也凡讀者固當觀詩人所咏之人亦不可不觀作詩者之情故傳兼論后妃詩人之性情謂之一端者摯而有别乃后妃全德一端之外見謂之全體者人情大端惟憂樂二者合二章可以見人情之全體詳傳以此篇見文王之徳文王生而徳盛身修故得於天而天立厥配得於人而人化於其未得配既得配而為之憂樂非文王徳盛身修何以致此周公定樂用此於房中鄉國所以著明文王之徳為風化首也孔子屢稱關雎二南固此意朱子於此首以文王之徳言亦此意也葛之覃兮施于中谷維葉萋萋黄鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汚我私薄澣我衣害澣害否歸寧父母此篇傳以勤儉敬孝論之精切矣竊又因此而推之以為古者女子姆教四徳今詩所言為絺為綌者婦功也服絺綌澣濯者婦容也言告婦言也勤儉孝敬婦徳也四徳咸備故曰后妃之本本即有子孝弟為仁之本之本言后妃之徳皆由此出也此篇與下篇皆見后妃之徳文王齊家之實次章乃此詩所由作首章追述絺綌未成以前事末章則預言既成以後事首章葛初生而未入用故止述所見聞之時物非心常存何以𤼵此次章絺綌既成而服之無有厭斁非身親之何以能此末章則仁之根於心者深禮之行乎身者周矣然此皆后妃之常事而自述者述其實耳在他人視之則有以見其心之徳有以見其身之修既足稱文王身修之配又足以實闗雎之詠矣下篇同首章中谷無韻合下章中谷以重韻為韻詩有本章重韻為韻者簡兮末章是也有合兩章三章重韻為韻者此篇與瞻彼洛矣是也此古人用韻之體後人以重韻為嫌非古矣采采卷耳不盈頃筐嗟我懐人寘彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懐陟彼髙岡我馬𤣥黄我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣傳以采卷耳登山馬罷人病為託言然酌罍與觥亦託言也國風中如栢舟無酒采綠狩釣皆當為託言云何吁言將何説惟有憂歎矣若從目則惟有逺望矣極嗟歎憂傷而其詞不迫此得性情之正所以為貞静専一也二南詩皆三章此獨四章首章即見本意次章三章對舉申詠末章變文而以咏歎結之又四矣字皆結詞後来四韻律詩之體蓋本於此矣關雎詩詠文王后妃之徳行孔子則稱詩人之性情葛覃卷耳則兼之蓋二詩后妃所自作故既可見其性情又可因以見其徳行焉以徳行言之則葛覃見勤儉敬孝於居處之常卷耳見貞静專一於憂思之變以性情言之則葛覃樂而不淫卷耳憂而不傷也文王為家之主后妃為家之内主皆必身修而後家可得而齊故闗雎見文王之徳葛覃卷耳見后妃之徳皆有以為齊家之本矣故合此二篇與下二篇皆見文王齊家之實焉南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之衆妾因見樛木為葛藟所纍遂託以后妃為福履所歸舊説取下垂之義則是比而非興矣君子謂所詠君子中含逮下意則興兼比矣然兼比不若専興為深逺諷詠之自可見樂只猶言樂哉贊美咏歎之詞與南山有臺采菽之樂只君子同非衆妾之樂此君子也傳謂樂其徳者謂作詩之由非釋樂只之樂字也若以樂只之樂字為衆妾之樂此君子則誤矣樂只君子稱之也福履綏之願之也稱願即頌禱風雅不同故傳只以稱願言二字出禮記此篇三章一意無淺深無次序惟易韻以致殷勤再三不能自己之意蓋詩之一體咏歌之妙者也張子謂詩人之意至平易以平易求之則思逺以廣正謂此類輔氏謂語有深淺非也此文王后妃家齊之實也后妃無嫉妬之心固見后妃身修而徳盛矣衆妾樂其徳而稱願之則亦能以后妃之徳為徳矣以此推之則文王后妃身修家齊之樂豈虚也哉螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮比有二例有専比有兼興専比之中又有二例有全篇比鴟鴞伐柯是也有全章比螽斯是也每章三句皆只説螽斯暗藏所詠之事而不露故曰全章比三章一意惟易疊字為韻以致其殷勤再三稱美之意無淺深無次序與前篇同但前篇有稱有願此則有稱無願蓋宜爾者已然之詞也既已有之而甚宜則無所事乎祝願惟稱美之而已耳螽斯稱羽以比外見之徳其用疊字亦含徳意已有徳子孫亦有徳所以為福不然雖多亦奚以為此用疊字之工亦有法焉非苟然也此亦文王后妃家齊之實也此詩不特見文王后妃與媵妾之徳并見文王后妃子孫之徳以此二事推之文王后妃閨門雍睦之氣象為何如哉桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人月令二月桃始華周禮仲春㑹男女詩人因所見桃華以起興此専指首章言次末二章則因首章言華遂取實與葉以申所詠不必皆實見矣蓋桃始華所見者也當此之時安有實與葉哉詩之託興多如此如黍離之苖穗實亦然不必别為之説蓋亦一體也周國女子之嫁始至而詩人見其賢知其必有以宜其家曰知曰必為其始至可知必詠始至者詩美女子之賢多如此如闗雎鵲巢碩人皆然蓋古者明日見舅姑三月廟見而後成婦前此皆為始至之時女子之賢否於此乎觀周民熟文王之化皆能修身以齊其家故女子既賢人亦歎咏而深喜其賢也此文王治國之實也國之所以治者以人人能修身以齊其家也國人之家齊而後君之國始可以言治故曰人人親其親長其長而天下平矣肅肅兔罝椓之丁丁赳赳武夫公侯干城肅肅兔罝施于中逵赳赳武夫公侯好仇肅肅兔罝施于中林赳赳武夫公侯腹心此詩全篇興體也全篇興與各章興之例不同蓋以全篇為興也詩人以文王人才之衆多偶見兔罝之人遂託兔罝以興其人才之可用復以此人興文王之人才衆多詩中所興者兔罝之人耳文王人才衆多之意猶在一篇所言之外故曰全篇興觀傳猶字可見蓋猶者謂兔罝之人猶如此則文王人才之衆多可知此又興之一體不可不知也詩中有此體者惟此與隰有萇楚二篇而已或曰如此則當為比曰比者以彼物狀此物蓋二物也若此詩則以此事興此事非有二事也故只當為興不可以為比也中逵通行之路肅肅可也中林無人之地而亦肅肅干城好仇腹心語皆有淺深采采芣苢薄言采之采采芣苢薄言有之采采芣苢薄言掇之采采芣苢薄言捋之采采芣苢薄言袺之采采芣苢薄言襭之此篇最見文王徳化泯然無迹之意周民承周家累世之澤加以文王壽考之聖斯民薰陶涵浸于徳化深矣其婦人采芣苢而自賦其言采采者常事也芣苢者常物也采有掇捋袺襭者常序也以此自賦又常語也而優游安逸閒暇從容陶然而無累悠然而自得直有堯民擊壤帝力何有之意王者之民皥皥而莫知所以為之者于此可見其實焉且桃夭女子之賢兔罝武夫之才猶以詩人美之而後見若此則非自言其樂亦非人之稱其樂也而其樂不特已不自知而且有非人所得與尤非他人所能喻者文王之徳化周民之美俗于是乎盛矣至矣而蔑以加矣讀者反覆吟哦而玩味之則中庸所謂淡而不厭者其此詩之謂矣以上三詩皆見文王國治之實先桃夭後兔罝者國家之治皆由内而外也芣苢見文王之化人人之于文王皆有莫知其然者然化不離于人心之本然百姓之日用豈外此而别有所謂聖人之化哉中庸曰動則變變則化唯天下至誠為能化此自明而誠者之事也人人可以自勉南有喬木不可休息漢有游女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思傳曰興而比竊謂當曰興又比蓋興有兼比者闗雎是也傳止曰興也比兼興者綠衣是也傳亦止曰比也至下泉比兼興乃𤼵例曰比而興野有蔓草溱洧黍離頍弁賦兼興則𤼵例曰賦而興蓋興在賦比中非賦比外别有興故其例如此頍弁賦而興後比則曰賦而興又比是比在賦興外者當曰又比也今漢廣比在興後則當用頍弁例曰興又比也若曰興而比則與比而興賦而興者不辨矣故漢廣椒聊巧言之四章皆當曰興又比氓之三章末章當云比又興賦又興云首章極言游女之不可求後二章承前意以其不可求故悦之而復以二比歎咏之則有敬之之意矣敬而悦之悦生於敬故兩言秣馬為悦之至悦而敬之敬生於悦故三致歎咏為敬之深此篇只言游女之不可求而興比反覆最見歎咏非工於咏歌者乎故此游女端莊静一之不可求與作詩者知其不可求而愛敬之皆得性情之正皆可以見文王后妃之徳化遵彼汝墳伐其條枚未見君子惄如調飢遵彼汝墳伐其條肄既見君子不我遐棄魴魚赬尾王室如燬雖則如燬父母孔邇文王之化非止江沱汝漢之間傳於漢廣曰先及於汝墳曰先被此其所先被及者則後所被及者豈可限量哉此篇次章乃此詩所由作首章追賦未見時事次末章正述既見時意其體與葛覃相似所以知為追賦者以條枚條肄而知之汝墳之去紂都視江漢為近以漢廣推之則汝墳染紂之俗必深以本篇推之則不特染其惡且必有遭其虐而怨叛者矣文王率殷之叛國以事紂其身修之純徳事君之小心皆有以浹於人故汝墳之婦人未見君子憂之之意如彼既見而喜之之情如此其憂喜既得其正矣而又知王室之當尊文王之當親而以是美其夫蓋亦莫非義矣夫當商紂淫虐之時能使江漢之女子端莊静一難矣而汝墳之婦人既得性情之正又知倫誼之大豈不尤難歟故文王之徳化於漢廣見其及人之逺於汝墳見其入人之深此汝墳詩所以後於漢廣歟魴魚赬尾一句比與衛終風大雅緜同當類推之以上二詩皆見文王天下漸平之實文王三分天下有其二故曰漸平詩列風雅頌以寓修齊治平之法而二南諸詩之次第已具此法於其中此聖人之精意也程子謂二南猶易乾坤乾統坤坤承乾竊謂二卦不特見統承雖全易不出此二南亦然其説詳見後麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮麟之角振振公族于嗟麟兮案此篇永樂大典失載
