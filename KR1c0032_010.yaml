body:
  text: 詩纘緒卷十元劉玉汝撰小雅二我車既攻我馬既同四牡龐龐駕言徂東田車既好四牡孔阜東有甫草駕言行狩之子于苗選徒囂囂建旐設旄搏獸于敖駕彼四牡四牡奕奕赤芾金舄會同有繹決拾既佽弓矢既調射夫既同助我舉柴四黃既駕兩驂不猗不失其馳舍矢如破蕭蕭馬鳴悠悠旆旌徒御不驚大庖不盈之子于征有聞無聲允矣君子展也大成首章盛稱車馬言自鎬京王朝往東方蓋兼朝會田獵之意而未明言次章方言將往東都之圃田三章亦未明言獵時事四章言諸侯會同正此篇本意見為中興會朝而田獵也五六章正言狩獵七章言終事末總敘始終敘事次章最為明白此詩本美宣王而只稱有司此所以為美宣王也先後皆述有司中間乃述諸侯所以尊王朝也宣王當逐玁狁服蠻荆之後大會諸侯東都而田獵中興之盛舉也其至東都也百官景從六師扈從諸侯五方雲合而鱗集朝廷之盛禮方國之儀章軍旅之紀律搜田之軌物皆在於是固非西都歲時常制所可同尤非前日久廢之舊迹所可及有司之各庀其職豈有司所能自為哉然詩人稱之既極道其興盛尤深見其靜治蓋徒御車馬之堅好旗旐之鮮明芾舄之絡繹射御精而殺獲多則止見其興盛而已於興盛之中而有靜肅者存則典禮儀章紀律軌物之行乎其間者既可見其秩然而不紊粲然而可循尤可見其不勞而治不煩而成車攻之中興所以宛然成康周畢之盛者以此非徒謂其氣勢威靈之赫而已也故此詩始言選徒中言不驚終言無聲而蕭蕭悠悠尤極形容非詩人深知舊典親見當時何以發此哉讀車攻者尤當以此意觀之君子指有司其曰君子猶夫子言君子哉若人之意言信乎其為有德位之人也有司而有大成則王朝中興之事業其有大成也必矣故允矣展也對言所以深信之東都講武之詩盛時則有瞻彼洛矣中興則有車攻瞻彼則惟稱天子而頌禱之車攻則詳述田獵而形容之蓋出於久廢也詩之正變於此可見以久廢視中興則車攻盛矣以車攻視瞻彼洛矣則瞻彼洛矣之氣象又何如皆可以並觀吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其羣醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所瞻彼中原其祁孔有儦儦俟俟或羣或友悉率左右以燕天子既張我弓既挾我矢發彼小豝殪此大兕以御賔客且以酌醴篇首言獵前期事中言獵時事末言獵終時事一篇備見獵之始終從其羣醜有驅禽待射意悉率有競勸意於三品惟舉中而言有不敢自謂足充上殺之意此宣王西都四時之田本為常典然久廢而中興所以可美又此詩雖美田獵而最見中興之人心蓋周室中衰人心離散宣王中興能修政事一有田獵人即興起而樂趨之故詩人中間兩稱天子見其從天子而來首言可以從禽則有先事趨赴之心中言悉率以燕則有親上愛君之心末言獻禽則有尊君奉上之心人心如此此宣王所以中興中興所以可美也孟子云聞車馬之音見羽旄之美舉欣欣然有喜色東萊謂見上下之情者此篇最可見也鴻鴈于飛肅肅其羽之子于征劬勞于野爰及矜人哀此鰥寡鴻鴈于飛集于中澤之子于垣百堵皆作雖則劬勞其究安宅鴻鴈于飛哀鳴嗷嗷維此哲人謂我劬勞維彼愚人謂我宣驕此篇興比之例最為明白可以類其餘三章皆以劬勞言劬勞于野真可憐之劬勞也所謂劬勞惟在于此雖則劬勞不敢辭劬勞也蓋勞于築室乃所以為安也作歌出於劬勞不敢忘劬勞也其究安宅無復劬勞矣故追述安宅以前事而歌之於安宅之後所以始終劬勞之意也然歌聲可聞也歌辭未易通也而況所以歌之意非哲人其孰能知之哉築室必以築垣言者作室任匠築垣役衆以役衆之最勞者言以見其成此詩與前都人士篇先後相應前日萬民離散已不復見昔時之美矣至是宣王能勞來還定安集之故有此詩以此推之則都人士之非昔者其以厲王暴虐稼穡卒癢而致此具贅卒荒歟豈必如幽王戎狄之禍而後有此哉此言前都人士者指所移置都人士在六月前者言之見正雅夜如何其夜未央庭燎之光君子至止鸞聲將將夜如何其夜未艾庭燎晰晰君子至止鸞聲噦噦夜如何其夜鄉晨庭燎有輝君子至止言觀其旗如何問辭至止者想其將至其實未至也將將尚逺噦噦漸近觀旗則既至矣然皆想辭非真見真聞也所以見其勤此詩見王既勤於政而於諸侯猶有拳拳晉接之情故於君子之朝也想見之尤至待逺者既如此則近者可知曰聲曰觀皆想聞想見者也沔彼流水朝宗于海鴥彼飛隼載飛載止嗟我兄弟邦人諸友莫肯念亂誰無父母沔彼流水其流湯湯鴥彼飛隼載飛載揚念彼不迹載起載行心之憂矣不可弭忘鴥彼飛隼率彼中陵民之訛言寧莫之懲我友敬矣讒言其興此以四句興四句首章言亂而不言所以亂起語體也後章乃言不迹訛言蓋上不循道下有訛言亂之證也彼不肯念者豈無父母乎苟有父母則念矣誰無父母甚言朋友之不肯念也若我則念而不能不憂憂之則不能忘矣然憂之如何亦曰敬而已矣蓋朋友有莫念者有能敬者莫念者我則代為之憂矣能敬者我則反諸已而自修焉蓋念有思患預防之慮而敬則謹身逺害之要也念而能敬斯可免於亂世矣不然則雖念之至憂之深亦何益哉憂人而及其親反已而一於敬念亂而憂莫善於此矣末章六句毛鄭以前已脫兩句今首句猶可知次句不可知矣鶴鳴于九臯聲聞于野魚濳在淵或在于渚樂彼之園爰有樹檀其下維蘀他山之石可以為錯鶴鳴于九臯聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖他山之石可以攻玉陳善納誨或於君或於友不可知也不直言明告而託物為比者物顯理隱即物觀理而易曉也誠不可掩者知其存誠也理無定在者欲其窮理也愛當知惡憎當知善者欲其正心修身也所以知為正心修身者大學以忿懥好樂為正心以愛知其惡惡知其美為修身也程子言先立誠意以格之朱子言存心而後能致知故彼存誠在窮理之前又言致知而後能力行故此正心修身在窮理之後朱子又嘗言窮理修身斯學之大即此意也輔氏之説非也由是四者謂四物天下之理謂四事程子之説乃憎知其美之意但傳則處常之事程子則處變之事至曰義理生道德成則皆指身心而言矣祈父豫王之爪牙胡轉豫于恤靡所止居祈父豫王之爪士胡轉豫于恤靡所底止祈父亶不聰胡轉豫于恤有母之尸饔以國體言之豫王之爪牙所當留衛而久役于外汝豈無王乎此義之所不可者也以國法言之有父母而無兄弟者所當歸養而久役于外汝豈無父母乎此情之所不忍者也王衛不可使單弱天下之大義又祈父所當盡職者故一再言之于前父母不可使勞苦一已之至情故一言之於後蓋作此詩者亦為衛王之人故先公後私其言如此然靡止者已也已為輕故雖再言而意猶緩尸饔者母也親為重故雖一言而情則切矣其曰亶不聰切責之也而仍曰胡以繼之所以終致其婉曲之情而欲其聽之也怨而不怒此之謂矣皎皎白駒食我場苗縶之維之以永今朝所謂伊人於焉逍遙皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優遊勉爾遁思皎皎白駒在彼空谷生芻一束其人如玉毋金玉爾音而有遐心賢者將去而欲留之辭至于一再則其意已勤矣既而知其勢之不可羈志之不可奪也則多方百計以留之故思其來則欲縻以好爵庶乎其鑒禮賢之意而或可縻也萬一不可縻則但得其去之意少緩斯亦足矣故又欲其慎之勉之庶乎其去國遲遲忘世不果而可少淹也蓋謀所以留之計靡不至而後出此是以雖好爵不足縻而不自知雖其志不遂而不之恤其意蓋甚苦矣末章則賢者已去而在空谷矣然其人雖親勞賤之事而實有如玉之德使人愛惜而想慕之故雖其迹之已逺而猶望其音問之相聞云黃鳥黃鳥無集于榖無啄我粟此邦之人不我肯穀言旋言歸復我邦族黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄黃鳥黃鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父人生一本由一本而推之諸父諸兄宗族而莫不得其道則在平時而相睦處患而相扶持非他人之所能如也今舍其父兄宗族而適他人意謂他人之可依也而不思我能厚宗族何必去父母之邦不能厚父兄而能厚人乎人亦豈能厚我哉乂况世衰道微民心離散之時乎必致困窮而反然後知親者為可親天倫之不可薄如此是人也不知其人之不可與明而擇居之不智不責已而責人不仁知其不可不即去而猶言旋而言歸不勇蓋無一之足取矣夫子之存此詩政欲以為世戒也而時君使民之如此其政教亦可知矣然此世教衰微民不興行即有此俗不必亂亡流離而後有此也我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家我行其野言采其遂昏姻之故言就爾宿爾不我畜言歸思復我行其野言采其葍不思舊姻求爾新特成不以富亦祗以異此詩與前詩不同此人以貧故而依昏姻此昏姻所當念者而不見收恤此婚姻之薄也所謂不姻之刑正為此等設也然之人也不謂其以貧見厭止言其以新舊而異故見責人忠厚之意焉秩秩斯干幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣似續妣祖築室百堵西南其戶爰居爰處爰笑爰語約之閣閣椓之槖槖風雨攸除鳥鼠攸去君子攸芋如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖其庭有覺其楹噲噲其正噦噦其冥君子攸寧下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載寢之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王乃生女子載寢之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母詒罹按此篇永樂大典缺卷誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕或降于阿或飲于池或寢或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱三百九十言所成之多濈濈濕濕言所養之充孔子牛羊茁壯長而已矣角濈耳濕非茁壯乎其長固未已也詩人深得物理而巧於形狀如此或降六句承上文牛羊言牛羊隨所在而適其性牧者從所適以順其性三十維物専以色言若牲則色有騂黝白犉之等角有繭栗握尺之等而體必博大肥腯而後可為牲也具言其可為牲者無不有也用牲以祭祀為大爾牧來思承上文爾牧而言不特持雨具齎餱糧而無費事亦且取薪蒸搏禽獸而有餘力牧事之成可知既言爾牧又言爾羊與上章互文又専舉羊以見牛蓋羊比牛最易瘠易病今充肥者常堅強盛多者不騫崩麾之以肱羊亦知人之意而順其命來升固見羊之馴而畢既二字尤盡羊之性蓋羊來有一之或後入牢有一之不能則此羊即有病矣故畢既二字不特不羣疾乃無一病者也牧人乃夢實有此夢占者以為吉夢而獻之于王故詩人述之以為牧人既成牧事而得吉夢乃國家將有年豐民衆之祥不特牧事之成而已所以别發一意進一説以結此篇也前篇之夢非實有此夢詩人祝願其有此夢耳此篇乃實述此夢故傳於彼言頌禱而此不言云愚謂此篇言爾牧者乃親牧牛羊於山谷草野之人也故何蓑笠負餱糧取薪蒸皆賤者之事末章言牧人乃掌牧之官即周禮之牧人也其屬自有府史等安得身荷蓑笠負餱取薪之事哉惟其為掌牧之官故有以感天地隂陽之氣而夢而夢必有驗也況首言爾牧末言牧官斯見牧事之成節彼南山維石巖巖赫赫師尹民具爾瞻憂心如惔不敢戲談國既卒斬何用不監節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不宜空我師弗躬弗親庶民弗信弗問弗仕勿罔君子式夷式已無小人殆瑣瑣姻亞則無膴仕昊天不傭降此鞠訩昊天不惠降此大戾君子如屆俾民心闋君子如夷惡怒是違不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成不自為政卒勞百姓駕彼四牡四牡項領我瞻四方蹙蹙靡所騁方茂爾惡相爾矛矣既夷既懌如相酬矣昊天不平我王不寧不懲其心覆怨其正家父作誦以究王訩式訛爾心以畜萬邦首章言國卒斬而尹不察猶若非尹所致特尹不察耳緩辭而略責之未迫切也次章即明言尹之不平不平即尹之病根也一辭已盡其實又言天怒民怨而莫知懲則直辭而切責之矣次第而言詩之法也三章承上章不平之説而告之以當平也四章以王委任尹尹委任小人言尹使庶民弗信已不可況罔天子而可乎若能平其心而退小人逺姻婭則小人無由進而天下猶不至於危殆其曰勿曰無猶有戒之之意焉鞠訩大戾即前卒斬薦瘥等也言尹若能平其心必躬必親式夷式已則禍或可止也猶有告戒勸勉之意焉六章又據今喪亂靡定而言其日甚使人憂之然誰秉國成而不自為政乎言平其心以為政是在我而已初無難事也蓋猶教之以此欲其自反而自得之也此詩雖譏刺甚切而告戒亦至蓋家父大夫也故效忠於君相者如此七章言天災民亂隨處皆然無可逃者欲使尹氏知之而或有改也八章言尹任用小人所在布滿風俗人情俱為之變相矛之惡猶可制相酬之懌不可測欲尹知其情狀而逺之也九章言尹氏以不平致亂則王將不得寧矣然豈有他哉是在尹之心而已心即是而能懲則猶可及止也若不懲其心而反怨人之正已則使王之不寧也必矣至此而及王蓋亦所以諷王也正者家父自謂也末章言致亂者尹心之不平而用尹者王心之有蔽也故尹氏之亂本由其心之不懲王之亂本由其心之不訛王心之不訛又尹心不懲之本也以究王訩兼尹而言也欲訛王心者人臣格君之忠以畜萬邦尤人臣事君之職有所畏避而不言豈家父之本心哉正月繁霜我心憂傷民之訛言亦孔之將念我獨兮憂心京京哀我小心癙憂以癢父母生我胡俾我愈不自我先不自我後好言自口莠言自口憂心愈愈是以有侮憂心惸惸念我無祿民之無辜并其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊之占夢具曰豫聖誰知烏之雌雄謂天蓋高不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力心之憂矣如或結之今兹之正胡然厲矣燎之方揚寧或滅之赫赫宗周褒姒滅之終其永懷又窘隂雨其車既載乃棄爾輔載輸爾載將伯助豫無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意魚在于沼亦匪克樂濳雖伏矣亦孔之照憂心慘慘念國之為虐彼有旨酒又有嘉殽洽比其鄰昏姻孔云念我獨兮憂心殷殷佌佌彼有屋蓛蓛方有穀民今之無祿天天是椓哿矣富人哀此惸獨此詩述憂之辭為多蓋大夫見天變民訛國將亡而民益困已有言而人莫信其禍皆由於嬖妾幸而小人進故憂之又憂而作此詩首章言天變民訛皆可憂而民訛尤可憂蓋天道逺人道邇訛言變惑衆聽搖動人心禍亂將起於不測知者憂禍於將萌而為之成病矣次章言生值訛言之時已憂而衆不然是以反為所侮三章述已之憂民將囚虜而國將危亡也四章言民方困而天未定天若有定固能勝人然今上帝誰憎而未定耶蓋當未定之時而望其有定甚切也傳謂天非有所憎其福善禍淫乃自然之理若然則有以自解而不必憂矣此説於理甚精于情似踈蓋謂淫者固可憎而民何辜是以望之五章言天定既不可待則人有能止訛者惟故老明事之是非占夢決兆之吉凶此為可望而今皆自以為是竟莫知其言之是非則人之止訛者又不足恃矣此一章専為訛言而發六章言已處亂世畏懼之甚不得已而號斯言則皆倫理之言也然今之造訛喜亂者胡為肆毒害人亦且及于我乎是以使我局蹐如此即前所謂是以有侮者也作詩者為大夫故有當言者不得已也七章承上章言人之肆毒我者乃天欲扤我也蓋不特斯人雖昔嘗求我而不可得者今亦不能用其力即所謂念我獨兮者也八章乃言天變民訛國危民困之由皆由于褒姒此為可憂之大者故先言憂心以發之全盡為滅半滅為滅言將滅也燎之方揚或曰興也此當曰賦又興后夫人死而諡如曰文薑哀薑妾止稱國姓褒姒如稱齊薑宋子雖生存亦以是稱愚謂九章十章忽取物為比而欲其無棄賢臣與前章意既不屬于本章詞亦不類蓋上兩章方説褒姒不應遽舍而他説竊謂輔猶助也妻為內助內輔車輔正可為比疑此謂申后也內寵並后亂之本也褒姒賤故明言之申后尊貴故取比隱言之言王能毋棄嫡后數親賢臣則不特不傾爾載且可同濟艱險矣輻以比王之所行員輻言相其內行也以僕比賢臣屢顧言數視顧問之也十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧􅏎􅏎震電不寧不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲皇父卿士番維司徒家伯維宰仲允膳夫棸子內史蹶維趣馬楀維師氏豔妻煽方處抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰豫不戕禮則然矣皇父孔聖作都于向擇三有事亶侯多藏不憖遺一老俾守我王擇有車馬以居徂向黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢效我友自逸前二章言日食之變甚大繼言不特日食而災異疊見尤可懼而王不懲日食由不用善人所致王不能懲方且外任大臣內寵豔妻而未已也觀方處二字可見抑此而下専責皇父蓋皇父尤専而貪故已受害如此上章不時不謀而毁人居里則有車馬而徂向者其害可知矣此言皇父貪而自私上不顧王下不恤衆不特已受其害也七章已遭讒衆受禍皆由於人愚謂人兼皇父言天下病而我里病甚下乃言四方有羡民莫不逸而我友又有逸者辭若相反蓋詩人借彼以明此耳毋以辭害意也此詩詳言天地災異歷指臣妾姓名又専責皇父可謂切直而無婉曲矣然已雖受害而安於命蓋有田祿之賢者歟詩言災異此篇最詳七月盡天道之常十月之交盡天道之變所謂天道備於上二詩尤可觀有國所當鑒浩浩昊天不駿其德降喪飢饉斬伐四國旻天疾威弗慮弗圖舍彼有罪既伏其辜若此無罪淪胥以鋪周宗既滅靡所止戻正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆出為惡如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天戎成不退飢成不遂曾我􅉏御憯憯日瘁凡百君子莫肯用訊聽言則答譖言則退哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友謂爾遷于王都曰豫未有室家鼠思泣血無言不疾昔爾出居誰從作爾室飢饉全家死絶如斬死者衆多如伐兵戎環境米粟不通賑救不至民在死亡之地而不得出如淪相籍如鋪天所降曰斬伐人所受曰淪鋪非親見此厄者不能如此形容之周之族姓有遭飢饉死者有為兵戎所殺者而未有底止故有以兆易姓之禍莫知我勩去者不知留者勞苦也莫肯夙夜言在公之大夫但知避災害而去朝見曰朝夕見曰夕言諸侯無朝見而來者惟已獨留此詩所以作也敬兼信與畏言人有辟言而不信則行無所底故當各敬爾身能敬其身則辟言所當相畏若不相畏是不畏天也蓋將見其去而先欲其聽已言也莫肯用訊即莫肯夙夜之意人有辟言而已不信是不敬其身也已有辟言而不盡告王雖曰敬身畏禍而亦不當若是恝也於是責去者之意昭昭矣此章方兼兵戎飢饉言五章言王惡忠好佞而言之難六章言王好枉惡直而仕之難哀哉哿矣極難而深悲之孔棘且殆明言而極論之不能言即不可使者皆反辭以形容之二者之難誠難矣然彼已之所同而已未嘗去也故末章欲去者之復還焉無言不疾諒其懼禍之情誰從作爾室破其拒我之辭以庶幾其復返也詩人可謂忠君愛友之道兼盡矣吁當時之大夫君子邦君諸侯不若一暬御者多矣聞其言者能無愧乎旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄冰按此篇永樂大典缺卷宛彼鳴鳩翰飛戾天我心憂傷念昔先人明發不寐有懷二人人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又中原有菽庶民采之螟蛉有子蜾螺負之教誨爾子式穀似之題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生交交桑扈率場啄粟哀我填寡宜岸宜獄握粟出卜自何能穀溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄冰詩有起詞然後入事蓋詩體如是自然之法也傳以此章之語為相戒之端詩體便可見矣兄弟相戒而首及父母此同氣同體之真情不能自已者是相感動也二人字重意重韻次章便説時事正是此詩入事本旨蓋上飲酒而下化之時人昏醉之風日富必將有禍敗故我兄弟當各敬爾之儀不敬則天之所以與我者不可乂得蓋一失此理即有死之道矣可不懼哉前章既戒兄弟此章又戒諸子蓋昏亂沈醉之世兄弟固當各敬而子弟血氣方剛習俗易移尤所當戒故當用善教之則無不可使似已也四章而下復承前説而申致戒端言兄弟和平患難無不相須何可使日月虛度和平不及共樂患難不及相恤以詒無窮之悔以貽父母之羞故當勤夙夜以無忝父母則所以處亂世者宜無不盡矣此申述首章念二人之意五章申第二章第三章之意言彼醉酒而至于淫刑矣彼醉酒吾猶當敬況淫刑而及於鰥寡矣而可不求所以自善之道乎於是卜之而卜首亦謂自何而能善乎惟在自善而已此可見各敬用善之道無可疑也能穀與前式穀之辭相應傳釋自何二字為何自能善則為命卜之辭愚以自何為卜者之答辭謂自何而能善惟在於自善即楚辭善不由外來之意末章乃極言所以自善之道惟在敬謹畏慎如恭人之所為則善矣臨谷臨淵同意而異言辨彼鸒斯歸飛提提民莫不穀我獨于罹何辜于天我罪伊何心之憂矣云如之何踧踧周道鞠為茂草我心憂傷惄焉如搗假寐永歎維憂用老心之憂矣疢如疾首維桑與梓必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦淠淠譬彼舟流不知所屆心之憂矣不遑假寐鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知相彼投兔尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之君子信讒如或酬之君子不惠不舒究之伐木掎矣析薪扡矣舍彼有罪豫之他矣莫髙匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後首章言已得罪於天而不知以何罪蓋自傷之辭云如之何自歎已無以處此蓋共子職而怨不可親之過大而不怨亦不可故傷其無以自處以起後章次章猶不忍言惟反覆述其悲傷而不及乎他蓋孝子不忍遽言又詩體貴優柔也三章方説父然止説已無瞻依無屬離而歎已不時而已四章言已無瞻依如舟流五章言已無屬離如壞木皆無怨懟父母之辭皆無怨其見棄逐之意傳於二章言猶見棄逐者蓋詩本為棄逐而作故傳以作詩本意於此言之然詳其辭意不過承前申言已無瞻依屬離而極道其憂傷而已孟子所謂涕泣道之者正此也六七似微有怨父之意矣雖曰怨慕然恐終非宜臼惡傷其父之意竊謂此二章乃太子為其母之辭故皆稱君子而言其忍惠謂恩愛妻望夫之辭也稱豫者代母言也其曰加者明母無罪也母子一也又同得罪者也故不言母而言豫亦愛母之意也且母子俱逐而不能為母致涕泣之辭是知有父而不知有母亦豈若是恝哉末章亦為母言告王而本其初致亂之由耳屬於垣謂褒姒之黨末又為母言告褒姒戒其無居我之處無任我之事既又為母自嘆而為絶望之辭以寬褒姒之讒妬庶幾王之或悟母子之猶可保也故以此而終篇焉谷風去婦告新昏亦用此四句
